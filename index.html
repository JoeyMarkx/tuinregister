        <div style={{background:"#F3EBDD",borderRadius:14,padding:20,maxWidth:620,width:"100%",boxShadow:"0 20px 60px rgba(0,0,0,.25)"}}>
          <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:12}}>
            <div>
              <h3 style={{margin:0,fontSize:16,color:K.text}}>📍 {pinPrompt.naam} pinnen op plattegrond</h3>
              <p style={{margin:"3px 0 0",fontSize:12,color:K.muted}}>Klik op een vakje binnen de omtrek om de plant te pinnen.</p>
            </div>
            <button onClick={()=>setPinPrompt(null)} style={{background:"none",border:"none",fontSize:20,cursor:"pointer",color:K.muted,lineHeight:1,padding:4}}>✕</button>
          </div>
          {(()=>{
            const gm=gardenMap;
            const MCELL=22;
            const mc=gm.cols||20, mr=gm.rows||16;
            const moutline=(gm.outline||[]).map(p=>({x:p.x*(MCELL/28),y:p.y*(MCELL/28)}));
            const moutlinePts=moutline.map(p=>`${p.x.toFixed(1)},${p.y.toFixed(1)}`).join(" ");
            const mcells=gm.cells||{};
            const mpins=gm.pins||[];
            function mCellInOutline(r,c){
              if(moutline.length<3||!gm.outlineClosed) return true;
              return pointInPolygon(c*MCELL+MCELL/2,r*MCELL+MCELL/2,moutline);
            }
            function mGetZone(r,c){return mcells[`${r}_${c}`]||null;}
            function mGetPins(r,c){return mpins.filter(p=>p.r===r&&p.c===c);}
            const pinColor=plantPinColor(pinPrompt.id);
            const [hov,setHov]=useState(null);
            return(
              <div style={{overflowX:"auto",marginBottom:12}}>
                <svg viewBox={`0 0 ${mc*MCELL} ${mr*MCELL}`} style={{display:"block",width:"100%",minWidth:240,background:"#faf8f4",borderRadius:8,cursor:"cell"}}>
                  {gm.outlineClosed&&moutline.length>=3&&<polygon points={moutlinePts} fill="rgba(240,236,226,.8)" stroke="#2E5A3D" strokeWidth={1.5} strokeLinejoin="round"/>}
                  {Array.from({length:mr},(_,r)=>Array.from({length:mc},(_,c)=>{
                    const inOL=mCellInOutline(r,c);
                    const zk=mGetZone(r,c);
                    const zd=zk?ZONE_DEF[zk]:null;
                    const mps=mGetPins(r,c);
                    const isHov=hov?.r===r&&hov?.c===c;
                    return(<g key={`${r}_${c}`}
                      onMouseEnter={()=>inOL&&setHov({r,c})}
                      onMouseLeave={()=>setHov(null)}
                      onClick={()=>{
                        if(!inOL) return;
                        setGardenMap(prev=>({...prev,pins:[...(prev.pins||[]),{id:uid(),plantId:pinPrompt.id,naam:pinPrompt.naam,kleur:pinPrompt.kleur,color:pinColor,r,c}]}));
                        setPinPrompt(null);
                      }}
                      style={{cursor:inOL?"cell":"default"}}>
                      <rect x={c*MCELL} y={r*MCELL} width={MCELL} height={MCELL}
                        fill={!inOL?"rgba(0,0,0,.05)":zd?zd.fill:"transparent"}
                        stroke={!inOL?"rgba(0,0,0,.03)":K.border} strokeWidth={.4}/>
                      {inOL&&isHov&&<rect x={c*MCELL+1} y={r*MCELL+1} width={MCELL-2} height={MCELL-2}
                        fill={`${pinColor}44`} stroke={pinColor} strokeWidth={1} rx={2}/>}
                      {mps.map((p,pi)=>(
                        <circle key={p.id} cx={c*MCELL+(pi%2===0?6:MCELL-6)} cy={r*MCELL+(pi<2?6:MCELL-6)} r={4}
                          fill={p.color} stroke="#fff" strokeWidth={1}/>
                      ))}
                    </g>);
                  }))}
                  {/* Grid */}
                  {Array.from({length:mr+1},(_,r)=><line key={`h${r}`} x1={0} y1={r*MCELL} x2={mc*MCELL} y2={r*MCELL} stroke="#ddd" strokeWidth={.3}/>)}
                  {Array.from({length:mc+1},(_,c)=><line key={`v${c}`} x1={c*MCELL} y1={0} x2={c*MCELL} y2={mr*MCELL} stroke="#ddd" strokeWidth={.3}/>)}
                  {gm.outlineClosed&&moutline.length>=3&&<polygon points={moutlinePts} fill="none" stroke="#2E5A3D" strokeWidth={1.5} strokeLinejoin="round"/>}
                </svg>
              </div>
            );
          })()}
          <div style={{display:"flex",gap:8,justifyContent:"flex-end"}}>
            <button onClick={()=>setPinPrompt(null)} style={{padding:"8px 16px",borderRadius:8,border:`1px solid ${K.border}`,background:"#fff",fontSize:13,cursor:"pointer",fontFamily:"inherit"}}>Overslaan</button>
          </div>
        </div>
      </div>}
    </div>
  );
}

// ═══════════════════════════════════════════════════════════════════
// BLOEIKALENDER TAB — line chart day 1-365, one line per species
// ═══════════════════════════════════════════════════════════════════
const MONTH_STARTS=[0,31,59,90,120,151,181,212,243,273,304,334]; // day-of-year for Jan..Dec (non-leap)
const MONTH_LABELS=["Jan","Feb","Mrt","Apr","Mei","Jun","Jul","Aug","Sep","Okt","Nov","Dec"];

function dayOfYear(monthIdx){ return MONTH_STARTS[monthIdx]??0; }
function getMonthIdx(name){
  const n=(name||"").toLowerCase().trim();
  const MAP={januari:0,februari:1,maart:2,april:3,mei:4,juni:5,juli:6,augustus:7,september:8,oktober:9,november:10,december:11};
  return MAP[n]??-1;
}

// Build a smooth bell-curve path for a blooming species
// rises from startDay to peak at mid, falls back to endDay
function bloomPath(startDay, endDay, yMax, yBase, W, H){
  if(startDay<0||endDay<0||startDay>endDay) return null;
  const mid=(startDay+endDay)/2;
  // sample points
  const pts=[];
  const pad=10; // ramp-up/down in days
  // before bloom
  pts.push([startDay-pad, yBase]);
  pts.push([startDay, yBase]);
  // rise
  pts.push([(startDay+mid)/2, yBase+(yMax-yBase)*0.5]);
  // peak
  pts.push([mid, yMax]);
  // fall
  pts.push([(mid+endDay)/2, yBase+(yMax-yBase)*0.5]);
  pts.push([endDay, yBase]);
  pts.push([endDay+pad, yBase]);

  const xScale=(d)=>Math.max(0,Math.min(W, (d/365)*W));
  const yScale=(y)=>y; // already in SVG coords

  let d=`M ${xScale(pts[0][0])} ${yScale(pts[0][1])}`;
  for(let i=1;i<pts.length;i++){
    const prev=pts[i-1], cur=pts[i];
    const cpx=(xScale(prev[0])+xScale(cur[0]))/2;
    d+=` C ${cpx} ${yScale(prev[1])}, ${cpx} ${yScale(cur[1])}, ${xScale(cur[0])} ${yScale(cur[1])}`;
  }
  return d;
}

// Nice colors for lines
const LINE_COLORS=["#2E5A3D","#C4703A","#6B4A8A","#1A6A8A","#8A2A5A","#5A7A1A","#8A6A1A","#1A4A6A","#6A1A3A","#3A6A1A","#8A3A1A","#3A1A6A","#1A8A6A","#6A3A8A","#8A1A2A","#2A8A4A"];

function BloeikalenderTab({plants,bulbs,trees,pondPlants,veggies}){
  const [hovered,setHovered]=useState(null);
  const [tooltip,setTooltip]=useState(null);

  // Gather all species with bloom data from all collections
  const allSpecies=[];
  const addSpecies=(arr,label)=>(arr||[]).forEach(p=>{
    const si=getMonthIdx(p.bloeiStart), ei=getMonthIdx(p.bloeiEind);
    if(si<0||ei<0) return;
    allSpecies.push({id:`${label}-${p.id}`,naam:p.naam||p.latijn||"Onbekend",startDay:dayOfYear(si),endDay:dayOfYear(ei)+30,label});
  });
  addSpecies(plants,"Sierplant");
  addSpecies(bulbs,"Bol/knol");
  addSpecies(trees,"Boom");
  addSpecies(pondPlants,"Vijver");
  addSpecies(veggies,"Moestuin");

  // SVG dimensions
  const W=900, H=320, MARGIN={top:30,right:20,bottom:40,left:90};
  const chartW=W-MARGIN.left-MARGIN.right;
  const chartH=H-MARGIN.top-MARGIN.bottom;

  // Y: 0 = geen bloei (bottom), 1 = in bloei (top)
  const yBase=chartH; // SVG y for "geen bloei"
  const yTop=0;       // SVG y for "in bloei"

  // Build paths
  const paths=allSpecies.map((s,i)=>{
    const color=LINE_COLORS[i%LINE_COLORS.length];
    const d=bloomPath(s.startDay,s.endDay,yTop,yBase,chartW,chartH);
    return{...s,color,d};
  });

  // Today marker
  const now=new Date();
  const todayDoy=(function(){
    const start=new Date(now.getFullYear(),0,0);
    const diff=now-start;
    return Math.floor(diff/86400000);
  })();
  const todayX=(todayDoy/365)*chartW;

  // Currently blooming
  const blooming=paths.filter(p=>p.startDay<=todayDoy&&p.endDay>=todayDoy);

  return(<div>
    <div style={{marginBottom:16}}>
      <h2 style={{margin:0,fontSize:22,color:K.text}}>Bloeikalender</h2>
      <p style={{margin:"4px 0 0",fontSize:13,color:K.muted}}>{allSpecies.length} soorten met bloeigegevens{blooming.length>0?` · ${blooming.length} nu in bloei`:""}</p>
    </div>

    {allSpecies.length===0&&<Card><EmptyState icon={<Icons.flower size={32} color={K.accent}/>} title="Nog geen soorten met bloeigegevens" sub="Voeg planten toe met een bloeiperiode om ze hier te zien."/></Card>}

    {allSpecies.length>0&&<>
      {/* Currently blooming */}
      {blooming.length>0&&<Card style={{marginBottom:16,borderLeft:`3px solid ${K.accent}`}}>
        <div style={{fontSize:12,fontWeight:700,color:K.accent,textTransform:"uppercase",letterSpacing:.5,marginBottom:8}}>🌸 Nu in bloei</div>
        <div style={{display:"flex",gap:6,flexWrap:"wrap"}}>
          {blooming.map(b=><span key={b.id} style={{padding:"3px 10px",borderRadius:12,fontSize:12,fontWeight:600,color:"#fff",background:b.color}}>{b.naam}</span>)}
        </div>
      </Card>}

      {/* SVG chart */}
      <Card style={{padding:"12px 8px",overflowX:"auto"}}>
        <svg viewBox={`0 0 ${W} ${H}`} style={{width:"100%",minWidth:360,display:"block"}}>
          <g transform={`translate(${MARGIN.left},${MARGIN.top})`}>

            {/* Grid lines + month labels */}
            {MONTH_STARTS.map((d,i)=>{
              const x=(d/365)*chartW;
              return(<g key={i}>
                <line x1={x} y1={0} x2={x} y2={chartH} stroke="#E8DCC8" strokeWidth={1}/>
                <text x={x+2} y={chartH+14} fontSize={9} fill="#999" fontFamily="-apple-system,sans-serif">{MONTH_LABELS[i]}</text>
              </g>);
            })}
            {/* End tick */}
            <line x1={chartW} y1={0} x2={chartW} y2={chartH} stroke="#E8DCC8" strokeWidth={1}/>

            {/* Y axis labels */}
            <text x={-8} y={chartH} fontSize={10} fill="#666" textAnchor="end" fontFamily="-apple-system,sans-serif" dominantBaseline="middle">Geen bloei</text>
            <text x={-8} y={0} fontSize={10} fill="#2E5A3D" textAnchor="end" fontFamily="-apple-system,sans-serif" dominantBaseline="middle" fontWeight="600">In bloei</text>
            {/* Y axis line */}
            <line x1={0} y1={0} x2={0} y2={chartH} stroke="#E8DCC8" strokeWidth={1.5}/>
            {/* X axis line */}
            <line x1={0} y1={chartH} x2={chartW} y2={chartH} stroke="#E8DCC8" strokeWidth={1.5}/>

            {/* Bloom lines */}
            {paths.map((p)=>(
              <path
                key={p.id}
                d={p.d}
                fill="none"
                stroke={p.color}
                strokeWidth={hovered===p.id?3:1.5}
                opacity={hovered&&hovered!==p.id?0.25:0.85}
                style={{cursor:"pointer",transition:"all .15s"}}
                onMouseEnter={e=>{setHovered(p.id);setTooltip({x:e.clientX,y:e.clientY,naam:p.naam,start:MONTH_LABELS[MONTH_STARTS.findIndex((_,i)=>MONTH_STARTS[i+1]>p.startDay||i===11)],eind:MONTH_LABELS[MONTH_STARTS.findIndex((_,i)=>MONTH_STARTS[i+1]>p.endDay||i===11)],color:p.color});}}
                onMouseLeave={()=>{setHovered(null);setTooltip(null);}}
              />
            ))}

            {/* Today vertical line */}
            <line x1={todayX} y1={0} x2={todayX} y2={chartH} stroke="#C4703A" strokeWidth={1.5} strokeDasharray="4 3" opacity={0.7}/>
            <text x={todayX+3} y={8} fontSize={9} fill="#C4703A" fontFamily="-apple-system,sans-serif" fontWeight="600">Vandaag</text>

          </g>
        </svg>

        {/* Tooltip */}
        {tooltip&&<div style={{position:"fixed",left:tooltip.x+12,top:tooltip.y-10,background:"#1F3A2A",color:"#F3EBDD",padding:"6px 12px",borderRadius:8,fontSize:12,fontWeight:600,pointerEvents:"none",zIndex:9999,boxShadow:"0 4px 12px rgba(0,0,0,.3)",whiteSpace:"nowrap"}}>
          <div style={{display:"flex",alignItems:"center",gap:6}}><span style={{width:10,height:10,borderRadius:"50%",background:tooltip.color,flexShrink:0}}/>{tooltip.naam}</div>
          <div style={{fontSize:10,opacity:.8,marginTop:2}}>{tooltip.start} – {tooltip.eind}</div>
        </div>}
      </Card>

      {/* Legend */}
      <Card style={{marginTop:12}}>
        <div style={{fontSize:11,fontWeight:700,color:K.muted,textTransform:"uppercase",letterSpacing:.5,marginBottom:8}}>Legenda</div>
        <div style={{display:"grid",gridTemplateColumns:"repeat(auto-fill,minmax(160px,1fr))",gap:5}}>
          {paths.map(p=>(
            <div key={p.id} style={{display:"flex",alignItems:"center",gap:6,fontSize:12,cursor:"pointer",opacity:hovered&&hovered!==p.id?.35:1,transition:"opacity .15s"}}
              onMouseEnter={()=>setHovered(p.id)} onMouseLeave={()=>setHovered(null)}>
              <span style={{width:20,height:3,borderRadius:2,background:p.color,flexShrink:0,display:"inline-block"}}/>
              <span style={{overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap",color:K.text}}>{p.naam}</span>
            </div>
          ))}
        </div>
      </Card>
    </>}
  </div>);
}

// PLATTEGROND TAB — phase 1: draw outline | phase 2: fill grid + pins
// ═══════════════════════════════════════════════════════════════════

function plantPinColor(id){
  const P=["#E74C3C","#2ECC71","#3498DB","#F39C12","#9B59B6","#1ABC9C","#E67E22",
           "#E91E63","#00BCD4","#8BC34A","#FF5722","#607D8B","#795548","#FF9800",
           "#4CAF50","#2196F3","#9C27B0","#009688","#CDDC39","#FF5252"];
  const n=Math.abs(typeof id==="number"?id:String(id).split("").reduce((a,c)=>a+c.charCodeAt(0),0));
  return P[n%P.length];
}

const ZONE_DEF={
  zon:    {fill:"rgba(255,210,70,.38)", stroke:"#b8900a", label:"☀️ Zon"},
  halfzon:{fill:"rgba(130,190,100,.38)",stroke:"#4a7020", label:"⛅ Half zon"},
  schaduw:{fill:"rgba(90,110,155,.38)", stroke:"#304070", label:"🌑 Schaduw"},
  gazon:  {fill:"rgba(80,155,70,.30)",  stroke:"#2a6a20", label:"🌿 Gazon"},
  water:  {fill:"rgba(50,130,205,.38)", stroke:"#1a4888", label:"💧 Water"},
  pad:    {fill:"rgba(175,150,105,.44)",stroke:"#6a4818", label:"🪨 Pad"},
  terras: {fill:"rgba(185,170,140,.44)",stroke:"#7a6030", label:"🪵 Terras"},
  bed:    {fill:"rgba(140,90,60,.32)",  stroke:"#6a3818", label:"🌱 Bed"},
  kas:    {fill:"rgba(200,230,240,.55)",  stroke:"#1a7088", label:"🏡 Kas"},
};

// Check if grid cell centre is inside a polygon (ray-cast)
function pointInPolygon(px, py, poly){
  let inside=false;
  for(let i=0,j=poly.length-1;i<poly.length;j=i++){
    const xi=poly[i].x,yi=poly[i].y,xj=poly[j].x,yj=poly[j].y;
    if(((yi>py)!==(yj>py))&&(px<(xj-xi)*(py-yi)/(yj-yi)+xi)) inside=!inside;
  }
  return inside;
}

function PlattegrondTab({gardenMap,setGardenMap,allPlants,onNavigateInventaris}){
  const CELL = 28;   // px per 0.5 m cell
  const {cols=20, rows=16} = gardenMap;

  // outline = array of {x,y} in GRID pixel coords (col*CELL, row*CELL)
  const outline = gardenMap.outline || [];
  const outlineClosed = gardenMap.outlineClosed || false;

  // phase: "draw" (step 1 – outline) | "edit" (step 2 – zones + pins)
  const phase = outlineClosed ? (gardenMap.phase||"edit") : "draw";

  // garden size setup — shown when outline is empty and not yet sized
  const gardenSized = gardenMap.gardenSized || false;
  const [showSizeSetup, setShowSizeSetup] = useState(!gardenSized);
  const [sizeSetupForm, setSizeSetupForm] = useState({breedte:"10", hoogte:"8"});

  function applySizeSetup(){
    const b=Math.max(1,parseFloat(sizeSetupForm.breedte)||10);
    const h=Math.max(1,parseFloat(sizeSetupForm.hoogte)||8);
    // +4 m padding on each side = +8 m = +16 cells per axis
    const newCols=Math.round(b/0.5)+16;
    const newRows=Math.round(h/0.5)+16;
    setGardenMap(prev=>({...prev,cols:newCols,rows:newRows,gardenSized:true,
      gardenBreedte:b,gardenHoogte:h}));
    setShowSizeSetup(false);
  }

  // draw-phase state
  const [cursorPos, setCursorPos] = useState(null);  // mouse pos during drawing
  const [snapPt,    setSnapPt]    = useState(null);   // snapped grid intersection

  // edit-phase state
  const [tool,      setTool]      = useState("zon");
  const [painting,  setPainting]  = useState(false);
  const [showPinPicker, setShowPinPicker] = useState(false);
  const [pendingCell,   setPendingCell]   = useState(null);
  const [pinSearch,     setPinSearch]     = useState("");
  const [hoveredPin,    setHoveredPin]    = useState(null);
  const [hoveredCell,   setHoveredCell]   = useState(null);
  const [showSizeModal, setShowSizeModal] = useState(false);
  const [sizeForm,      setSizeForm]      = useState({cols, rows});
  const [selectedCell, setSelectedCell] = useState(null); // {r,c} for mouse inspect
  const [showCellInfo, setShowCellInfo] = useState(false);
  const svgRef = useRef();

  const cells = gardenMap.cells || {};
  const pins  = gardenMap.pins  || [];

  // ── helpers ──────────────────────────────────────────────────────
  function ck(r,c){ return `${r}_${c}`; }
  function getZone(r,c){ return cells[ck(r,c)]||null; }
  function getPin(r,c){ return pins.find(p=>p.r===r&&p.c===c)||null; }
  function getPinsAt(r,c){ return pins.filter(p=>p.r===r&&p.c===c); }

  // SVG coords from mouse event
  function svgPos(e){
    const svg=svgRef.current;
    if(!svg) return {x:0,y:0};
    const rect=svg.getBoundingClientRect();
    const cx=e.touches?e.touches[0].clientX:e.clientX;
    const cy=e.touches?e.touches[0].clientY:e.clientY;
    return{
      x:((cx-rect.left)/rect.width)*(cols*CELL),
      y:((cy-rect.top)/rect.height)*(rows*CELL),
    };
  }

  // Snap raw SVG pos to nearest grid intersection (multiples of CELL)
  function snapToGrid(x,y){
    return{
      x:Math.round(x/CELL)*CELL,
      y:Math.round(y/CELL)*CELL,
    };
  }

  // Is a cell inside the outline polygon?
  function cellInOutline(r,c){
    if(outline.length<3||!outlineClosed) return true; // no outline = allow all
    const cx=c*CELL+CELL/2, cy=r*CELL+CELL/2;
    return pointInPolygon(cx,cy,outline);
  }

  // ── PHASE 1: outline drawing ──────────────────────────────────────
  function handleOutlineMouseMove(e){
    const pos=svgPos(e);
    setCursorPos(pos);
    setSnapPt(snapToGrid(pos.x,pos.y));
  }

  function handleOutlineClick(e){
    if(!snapPt) return;
    // Check if clicking near first point to close
    if(outline.length>=3){
      const first=outline[0];
      const dist=Math.hypot(snapPt.x-first.x,snapPt.y-first.y);
      if(dist<=CELL*1.2){
        // Close the outline
        setGardenMap(prev=>({...prev,outlineClosed:true,phase:"edit"}));
        return;
      }
    }
    setGardenMap(prev=>({...prev,outline:[...prev.outline||[],snapPt]}));
  }

  function undoLastPoint(){
    setGardenMap(prev=>({...prev,outline:(prev.outline||[]).slice(0,-1)}));
  }

  function resetOutline(){
    setGardenMap(prev=>({...prev,outline:[],outlineClosed:false,phase:"draw",cells:{},pins:[]}));
  }

  function closeOutline(){
    if((gardenMap.outline||[]).length>=3){
      setGardenMap(prev=>({...prev,outlineClosed:true,phase:"edit"}));
    }
  }

  // ── PHASE 2: zone painting + pins ────────────────────────────────
  function paintCell(r,c){
    if(r<0||r>=rows||c<0||c>=cols) return;
    if(!cellInOutline(r,c)) return;   // outside outline = no paint
    setGardenMap(prev=>{
      const nc={...(prev.cells||{})};
      if(tool==="eraser"){ delete nc[ck(r,c)]; }
      else { nc[ck(r,c)]=tool; }
      const np=tool==="eraser"?(prev.pins||[]).filter(p=>!(p.r===r&&p.c===c)):(prev.pins||[]);
      return {...prev,cells:nc,pins:np};
    });
  }

  function clickCell(r,c){
    if(!cellInOutline(r,c)) return;
    if(tool==="muis"){
      setSelectedCell({r,c});
      setShowCellInfo(true);
      return;
    }
    if(tool==="pin"){
      // Multiple pins per cell: always open picker (no auto-remove)
      setPendingCell({r,c});
      setShowPinPicker(true);
      setPinSearch("");
    }
  }

  function placePin(plant){
    if(!pendingCell) return;
    const {r,c}=pendingCell;
    const color=plantPinColor(plant.id);
    setGardenMap(prev=>({...prev,
      pins:[...(prev.pins||[]),{id:uid(),plantId:plant.id,naam:plant.naam,kleur:plant.kleur,color,r,c}]
    }));
    setShowPinPicker(false);
    setPendingCell(null);
  }

  function resizeGrid(){
    const nc=parseInt(sizeForm.cols)||20;
    const nr=parseInt(sizeForm.rows)||16;
    setGardenMap(prev=>{
      const cleanCells={};
      Object.entries(prev.cells||{}).forEach(([k,v])=>{
        const [r,c]=k.split("_").map(Number);
        if(r<nr&&c<nc) cleanCells[k]=v;
      });
      return{...prev,cols:nc,rows:nr,cells:cleanCells,pins:(prev.pins||[]).filter(p=>p.r<nr&&p.c<nc)};
    });
    setShowSizeModal(false);
  }

  function clearAll(){
    if(!window.confirm("Weet je zeker dat je de hele plattegrond wilt wissen?")) return;
    setGardenMap(prev=>({...prev,outline:[],outlineClosed:false,phase:"draw",cells:{},pins:[],gardenSized:false,gardenBreedte:null,gardenHoogte:null}));
    setShowSizeSetup(true);
  }

  // ── derived ──────────────────────────────────────────────────────
  const paintedCount=Object.keys(cells).length;
  const totalM2=(paintedCount*.25).toFixed(2);
  const outlinePts = outline.map(p=>`${p.x},${p.y}`).join(" ");
  const pinnedSpecies=[...new Map(pins.map(p=>[p.plantId,p])).values()];
  const filteredPlants=allPlants.filter(p=>{
    const q=pinSearch.toLowerCase();
    return !q||p.naam?.toLowerCase().includes(q)||p.latijn?.toLowerCase().includes(q);
  });

  // ── RENDER ───────────────────────────────────────────────────────
  return(<div>

    {/* Header */}
    <div style={{display:"flex",justifyContent:"space-between",alignItems:"flex-start",marginBottom:12}}>
      <div>
        <h2 style={{margin:0,fontSize:22,color:K.text}}>Tuinplattegrond</h2>
        <p style={{margin:"4px 0 0",fontSize:13,color:K.muted}}>
          {!outlineClosed
            ? `Stap 1 van 2 — omtrek intekenen · ${outline.length} punt${outline.length!==1?"en":""} geplaatst`
            : `Stap 2 van 2 — ${cols}×${rows} raster · ${paintedCount} vakken · ${totalM2} m² · ${pins.length} pin${pins.length!==1?"s":""}`
          }
        </p>
      </div>
      <div style={{display:"flex",gap:6,flexWrap:"wrap",justifyContent:"flex-end"}}>
        {!outlineClosed&&<Button small variant="secondary" onClick={()=>setShowSizeSetup(true)}>📐 Afmeting</Button>}
        {outlineClosed&&<Button small variant="secondary" onClick={()=>{setSizeForm({cols,rows});setShowSizeModal(true);}}>⚙ Grootte</Button>}
        {(outline.length>0||paintedCount>0)&&<Button small variant="danger" onClick={clearAll}>🗑 Wissen</Button>}
      </div>
    </div>

    {/* ── SIZE SETUP MODAL ── */}
    {showSizeSetup&&!gardenSized&&<div style={{position:"fixed",inset:0,background:"rgba(0,0,0,.5)",zIndex:2000,display:"flex",alignItems:"center",justifyContent:"center",padding:16}}>
      <div style={{background:"#F3EBDD",borderRadius:14,padding:24,maxWidth:420,width:"100%",boxShadow:"0 20px 60px rgba(0,0,0,.25)"}}>
        <div style={{fontSize:28,marginBottom:8}}>📐</div>
        <h3 style={{margin:"0 0 6px",fontSize:18,color:K.text}}>Hoe groot is je tuin?</h3>
        <p style={{fontSize:13,color:K.muted,margin:"0 0 18px",lineHeight:1.6}}>
          Vul de maximale afmetingen in. Het tekenraster wordt hierop afgestemd — je krijgt <strong>2 meter</strong> extra ruimte aan elke kant.
        </p>
        <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:14,marginBottom:14}}>
          <div>
            <label style={{display:"block",fontSize:11,fontWeight:700,color:K.muted,marginBottom:5,textTransform:"uppercase",letterSpacing:.4}}>Breedte (m)</label>
            <input type="number" min="1" max="200" step="0.5" value={sizeSetupForm.breedte}
              onChange={e=>setSizeSetupForm(p=>({...p,breedte:e.target.value}))}
              style={{width:"100%",padding:"10px 12px",border:`2px solid ${K.border}`,borderRadius:8,
                fontSize:18,fontFamily:"inherit",boxSizing:"border-box",outline:"none",textAlign:"center",fontWeight:700}}/>
            <div style={{fontSize:10,color:K.muted,marginTop:3,textAlign:"center"}}>{Math.round((parseFloat(sizeSetupForm.breedte)||0)/0.5)+16} kolommen</div>
          </div>
          <div>
            <label style={{display:"block",fontSize:11,fontWeight:700,color:K.muted,marginBottom:5,textTransform:"uppercase",letterSpacing:.4}}>Hoogte (m)</label>
            <input type="number" min="1" max="200" step="0.5" value={sizeSetupForm.hoogte}
              onChange={e=>setSizeSetupForm(p=>({...p,hoogte:e.target.value}))}
              style={{width:"100%",padding:"10px 12px",border:`2px solid ${K.border}`,borderRadius:8,
                fontSize:18,fontFamily:"inherit",boxSizing:"border-box",outline:"none",textAlign:"center",fontWeight:700}}/>
            <div style={{fontSize:10,color:K.muted,marginTop:3,textAlign:"center"}}>{Math.round((parseFloat(sizeSetupForm.hoogte)||0)/0.5)+16} rijen</div>
          </div>
        </div>
        <div style={{padding:"10px 14px",borderRadius:8,background:"#E8F5E8",border:`1px solid ${K.accent}`,fontSize:12,color:K.accent,marginBottom:16}}>
          📐 Raster wordt <strong>{(Math.round((parseFloat(sizeSetupForm.breedte)||0)/0.5)+16)*0.5}m × {(Math.round((parseFloat(sizeSetupForm.hoogte)||0)/0.5)+16)*0.5}m</strong> — je tuin heeft 2m speling aan alle kanten.
        </div>
        <div style={{display:"flex",gap:8}}>
          <button onClick={()=>setShowSizeSetup(false)} style={{flex:1,padding:"10px",borderRadius:8,border:`1px solid ${K.border}`,background:"#fff",fontSize:13,cursor:"pointer",fontFamily:"inherit",color:K.muted}}>Overslaan</button>
          <button onClick={applySizeSetup} style={{flex:2,padding:"10px",borderRadius:8,border:"none",background:K.accent,color:"#fff",fontSize:13,fontWeight:700,cursor:"pointer",fontFamily:"inherit"}}>✅ Raster aanmaken</button>
        </div>
      </div>
    </div>}

    {/* ── PHASE 1: Draw outline ── */}
    {!outlineClosed&&<>
      <Card style={{marginBottom:10,padding:"10px 14px",background:"#FFF8E8",borderLeft:`3px solid #C4703A`}}>
        <div style={{fontSize:13,fontWeight:700,color:"#C4703A",marginBottom:4}}>✏️ Stap 1 — Tuin omtrek intekenen</div>
        <div style={{fontSize:12,color:K.muted,lineHeight:1.6}}>
          Klik op de rastersnijpunten om punten te plaatsen.<br/>
          De punten worden automatisch verbonden. <strong>Sluit de omtrek</strong> door op het eerste punt te klikken (groene cirkel) of gebruik de knop hieronder.
        </div>
        <div style={{display:"flex",gap:8,marginTop:10,flexWrap:"wrap"}}>
          {outline.length>=3&&<button onClick={closeOutline} style={{padding:"6px 14px",borderRadius:8,border:"none",background:K.accent,color:"#fff",fontSize:12,fontWeight:700,cursor:"pointer"}}>✅ Omtrek sluiten</button>}
          {outline.length>0&&<button onClick={undoLastPoint} style={{padding:"6px 12px",borderRadius:8,border:`1px solid ${K.border}`,background:"#fff",fontSize:12,cursor:"pointer",color:K.muted}}>↩ Ongedaan</button>}
          {outline.length>0&&<button onClick={resetOutline} style={{padding:"6px 12px",borderRadius:8,border:`1px solid ${K.border}`,background:"#fff",fontSize:12,cursor:"pointer",color:K.danger}}>🗑 Opnieuw</button>}
        </div>
      </Card>

      {/* Outline SVG */}
      <Card style={{padding:0,overflow:"hidden"}}>
        {/* Scrollable SVG */}
        <div style={{overflowX:"auto"}}>
        <svg ref={svgRef}
          viewBox={`0 0 ${cols*CELL} ${rows*CELL}`}
          style={{display:"block",width:"100%",minWidth:Math.min(cols*CELL,600),cursor:"crosshair",background:"#faf8f4"}}
          onMouseMove={handleOutlineMouseMove}
          onMouseLeave={()=>{setCursorPos(null);setSnapPt(null);}}
          onClick={handleOutlineClick}
          onTouchStart={e=>{e.preventDefault();const pos=svgPos(e);setSnapPt(snapToGrid(pos.x,pos.y));}}
          onTouchEnd={e=>{e.preventDefault();if(snapPt)handleOutlineClick({touches:[{clientX:snapPt.x,clientY:snapPt.y}]});}}
        >
          {/* Grid dots at intersections */}
          {Array.from({length:rows+1},(_,r)=>Array.from({length:cols+1},(_,c)=>(
            <circle key={`d${r}_${c}`} cx={c*CELL} cy={r*CELL} r={1.5}
              fill={snapPt&&snapPt.x===c*CELL&&snapPt.y===r*CELL?"#2E5A3D":"#c8bfb0"}/>
          )))}
          {/* Grid lines */}
          {Array.from({length:rows+1},(_,r)=>(
            <line key={`h${r}`} x1={0} y1={r*CELL} x2={cols*CELL} y2={r*CELL} stroke="#e5dfd6" strokeWidth={.5}/>
          ))}
          {Array.from({length:cols+1},(_,c)=>(
            <line key={`v${c}`} x1={c*CELL} y1={0} x2={c*CELL} y2={rows*CELL} stroke="#e5dfd6" strokeWidth={.5}/>
          ))}
          {/* Metre labels */}
          {Array.from({length:Math.floor(cols/2)+1},(_,i)=>(
            <text key={`m${i}`} x={i*2*CELL} y={rows*CELL+10} fontSize={8} fill="#aaa" textAnchor="middle">{i}m</text>
          ))}
          {Array.from({length:Math.floor(rows/2)+1},(_,i)=>(
            <text key={`mr${i}`} x={-4} y={i*2*CELL+3} fontSize={8} fill="#aaa" textAnchor="end">{i}m</text>
          ))}

          {/* Drawn outline segments */}
          {outline.length>1&&<polyline points={outlinePts} fill="none" stroke="#2E5A3D" strokeWidth={2} strokeLinejoin="round"/>}
          {/* Preview segment to cursor + distance label */}
          {outline.length>0&&snapPt&&!outlineClosed&&(()=>{
            const last=outline[outline.length-1];
            const dx=(snapPt.x-last.x)/CELL*0.5; // metres
            const dy=(snapPt.y-last.y)/CELL*0.5;
            const distM=Math.sqrt(dx*dx+dy*dy);
            const mx=(last.x+snapPt.x)/2;
            const my=(last.y+snapPt.y)/2;
            // Perpendicular offset for label (avoid overlapping the line)
            const len=Math.hypot(snapPt.x-last.x,snapPt.y-last.y)||1;
            const nx=-(snapPt.y-last.y)/len*10;
            const ny= (snapPt.x-last.x)/len*10;
            const lx=mx+nx, ly=my+ny;
            const label=distM<0.05?"":""+distM.toFixed(1)+"m";
            return(<g>
              <line x1={last.x} y1={last.y} x2={snapPt.x} y2={snapPt.y}
                stroke="#2E5A3D" strokeWidth={1.5} strokeDasharray="5 4" opacity={.7}/>
              {label&&<>
                <rect x={lx-14} y={ly-8} width={28} height={14} rx={4}
                  fill="#1F3A2A" opacity={.82}/>
                <text x={lx} y={ly+4} textAnchor="middle" fontSize={9}
                  fill="#F3EBDD" fontWeight="700" fontFamily="-apple-system,sans-serif">
                  {label}
                </text>
              </>}
            </g>);
          })()}
          {/* Closing preview to first point + distance */}
          {outline.length>=2&&snapPt&&(()=>{
            const first=outline[0];
            const distPx=Math.hypot(snapPt.x-first.x,snapPt.y-first.y);
            if(distPx<=CELL*1.2){
              const last=outline[outline.length-1];
              const dx=(first.x-last.x)/CELL*0.5;
              const dy=(first.y-last.y)/CELL*0.5;
              const distM=Math.sqrt(dx*dx+dy*dy);
              const mx=(last.x+first.x)/2, my=(last.y+first.y)/2;
              const len=Math.hypot(first.x-last.x,first.y-last.y)||1;
              const nx=-(first.y-last.y)/len*10, ny=(first.x-last.x)/len*10;
              const label=distM<0.05?"":distM.toFixed(1)+"m";
              return(<g>
                <line x1={last.x} y1={last.y} x2={first.x} y2={first.y}
                  stroke="#2E5A3D" strokeWidth={1.5} strokeDasharray="5 4" opacity={.8}/>
                {label&&<>
                  <rect x={mx+nx-14} y={my+ny-8} width={28} height={14} rx={4} fill="#1F3A2A" opacity={.82}/>
                  <text x={mx+nx} y={my+ny+4} textAnchor="middle" fontSize={9}
                    fill="#F3EBDD" fontWeight="700" fontFamily="-apple-system,sans-serif">{label}</text>
                </>}
              </g>);
            }
            return null;
          })()}

          {/* Placed points */}
          {outline.map((pt,i)=>{
            const isFirst=i===0;
            const isNearSnap=isFirst&&snapPt&&Math.hypot(snapPt.x-pt.x,snapPt.y-pt.y)<=CELL*1.2;
            return(<g key={i}>
              <circle cx={pt.x} cy={pt.y} r={isFirst?8:5}
                fill={isFirst?"#2E5A3D":"#5b7c4f"} stroke="#fff" strokeWidth={1.5}
                opacity={isNearSnap?1:.85}/>
              {isFirst&&<text x={pt.x} y={pt.y+4} textAnchor="middle" fontSize={9} fill="#fff" fontWeight="bold">1</text>}
              {isFirst&&isNearSnap&&<circle cx={pt.x} cy={pt.y} r={12} fill="none" stroke="#2E5A3D" strokeWidth={1.5} strokeDasharray="4 3" opacity={.7}/>}
              {!isFirst&&<text x={pt.x+7} y={pt.y-5} fontSize={8} fill="#5b7c4f" fontWeight="600">{i+1}</text>}
            </g>);
          })}

          {/* Snap highlight */}
          {snapPt&&!outline.some(p=>p.x===snapPt.x&&p.y===snapPt.y)&&(
            <circle cx={snapPt.x} cy={snapPt.y} r={5} fill="none" stroke="#2E5A3D" strokeWidth={2}/>
          )}

          {/* Tuin zone highlight — dashed rect showing the actual garden area (without padding) */}
          {gardenMap.gardenBreedte&&gardenMap.gardenHoogte&&outline.length===0&&(()=>{
            const padCells=4; // 2m ÷ 0.5m = 4 cells
            const tw=Math.round(gardenMap.gardenBreedte/0.5);
            const th=Math.round(gardenMap.gardenHoogte/0.5);
            const x=padCells*CELL, y=padCells*CELL;
            const w=tw*CELL, h=th*CELL;
            return(<g>
              <rect x={x} y={y} width={w} height={h}
                fill="rgba(46,90,61,.06)" stroke="#2E5A3D" strokeWidth={1.5}
                strokeDasharray="8 4" rx={4}/>
              <text x={x+w/2} y={y+h/2-8} textAnchor="middle" fontSize={11}
                fill="#2E5A3D" fontWeight="700" fontFamily="-apple-system,sans-serif" opacity={.7}>
                {gardenMap.gardenBreedte}m × {gardenMap.gardenHoogte}m
              </text>
              <text x={x+w/2} y={y+h/2+8} textAnchor="middle" fontSize={9}
                fill="#2E5A3D" fontFamily="-apple-system,sans-serif" opacity={.5}>
                Teken je omtrek binnen dit vlak
              </text>
            </g>);
          })()}
          {/* Hint when no size set */}
          {outline.length===0&&!gardenMap.gardenBreedte&&(
            <text x={(cols*CELL)/2} y={(rows*CELL)/2} textAnchor="middle" fontSize={13}
              fill="#c0b8a8" fontFamily="-apple-system,sans-serif">
              Klik op een snijpunt om te beginnen
            </text>
          )}
          {outline.length===0&&gardenMap.gardenBreedte&&(
            <text x={(cols*CELL)/2} y={(rows*CELL)/2+28} textAnchor="middle" fontSize={11}
              fill="#c0b8a8" fontFamily="-apple-system,sans-serif">
              Klik op een snijpunt om te beginnen
            </text>
          )}
        </svg>
        </div>{/* end scroll div */}
      </Card>
    </>}

    {/* ── PHASE 2: Grid edit ── */}
    {outlineClosed&&<>
      {/* Step 2 banner with back button */}
      <Card style={{marginBottom:10,padding:"8px 14px",background:"#E8F5E8",borderLeft:`3px solid ${K.accent}`,display:"flex",justifyContent:"space-between",alignItems:"center"}}>
        <div>
          <div style={{fontSize:12,fontWeight:700,color:K.accent}}>✅ Stap 2 — Zones en planten intekenen</div>
          <div style={{fontSize:11,color:K.muted,marginTop:2}}>Omtrek opgeslagen. Kleur vakken in en voeg pins toe. Alleen vakken binnen de omtrek zijn bewerkbaar.</div>
        </div>
        <button onClick={()=>setGardenMap(prev=>({...prev,outlineClosed:false,phase:"draw"}))}
          style={{padding:"5px 10px",borderRadius:8,border:`1px solid ${K.border}`,background:"#fff",
            fontSize:11,cursor:"pointer",color:K.muted,whiteSpace:"nowrap",marginLeft:10}}>
          ✏️ Omtrek aanpassen
        </button>
      </Card>

      {/* Tool palette */}
      <Card style={{padding:"10px 12px",marginBottom:10}}>
        <div style={{fontSize:11,fontWeight:700,color:K.muted,textTransform:"uppercase",letterSpacing:.5,marginBottom:7}}>Gereedschap</div>
        {/* Zone tools */}
        <div style={{marginBottom:8}}>
          <div style={{fontSize:10,fontWeight:700,color:K.muted,textTransform:"uppercase",letterSpacing:.4,marginBottom:5}}>Zones intekenen</div>
          <div style={{display:"flex",gap:5,flexWrap:"wrap"}}>
            {Object.entries(ZONE_DEF).map(([k,v])=>(
              <button key={k} onClick={()=>setTool(k)} style={{
                padding:"5px 11px",borderRadius:16,fontSize:11,fontWeight:600,cursor:"pointer",
                border:`2px solid ${tool===k?v.stroke:K.border}`,
                background:tool===k?v.stroke:"#fff",color:tool===k?"#fff":K.text,transition:"all .15s"}}>
                {v.label}
              </button>
            ))}
            <button onClick={()=>setTool("eraser")} style={{
              padding:"5px 11px",borderRadius:16,fontSize:11,fontWeight:600,cursor:"pointer",
              border:`2px solid ${tool==="eraser"?K.danger:K.border}`,
              background:tool==="eraser"?K.danger:"#fff",color:tool==="eraser"?"#fff":K.text,transition:"all .15s"}}>
              🧹 Wissen
            </button>
          </div>
        </div>
        {/* Divider */}
        <div style={{height:1,background:K.border,margin:"8px 0"}}/>
        {/* Pin + Mouse tools — distinct section */}
        <div>
          <div style={{fontSize:10,fontWeight:700,color:K.muted,textTransform:"uppercase",letterSpacing:.4,marginBottom:5}}>Planten & inspectie</div>
          <div style={{display:"flex",gap:5,flexWrap:"wrap"}}>
            <button onClick={()=>setTool("pin")} style={{
              padding:"6px 14px",borderRadius:8,fontSize:12,fontWeight:700,cursor:"pointer",
              border:`2px solid ${tool==="pin"?K.accent:K.border}`,
              background:tool==="pin"?K.accent:"#fff",color:tool==="pin"?"#fff":K.text,
              transition:"all .15s",boxShadow:tool==="pin"?"0 2px 8px rgba(46,90,61,.3)":"none"}}>
              📍 Plant pinnen
            </button>
            <button onClick={()=>setTool("muis")} style={{
              padding:"6px 14px",borderRadius:8,fontSize:12,fontWeight:700,cursor:"pointer",
              border:`2px solid ${tool==="muis"?"#5A3A8A":K.border}`,
              background:tool==="muis"?"#5A3A8A":"#fff",color:tool==="muis"?"#fff":K.text,
              transition:"all .15s",boxShadow:tool==="muis"?"0 2px 8px rgba(90,58,138,.3)":"none"}}>
              🖱️ Inspecteer cel
            </button>
          </div>
        </div>
        <div style={{marginTop:6,fontSize:11,color:K.muted}}>
          {tool==="pin"?"Klik op een vakje om een plant te pinnen. Je kunt meerdere planten per cel pinnen."
            :tool==="muis"?"Klik op een cel om te zien wat er staat (zone, planten)."
            :tool==="eraser"?"Klik en sleep om vakken + pins te wissen."
            :`Klik en sleep om vakken in te kleuren als ${ZONE_DEF[tool]?.label||tool}.`}
        </div>
      </Card>

      {/* Grid SVG */}
      <Card style={{padding:0,overflow:"hidden"}}>
        {/* Scrollable grid */}
        <div style={{overflowX:"auto"}}>
        <div style={{display:"inline-block",userSelect:"none"}}>
          <svg ref={svgRef}
            viewBox={`-16 0 ${cols*CELL+20} ${rows*CELL+14}`}
            style={{display:"block",width:"100%",minWidth:Math.min(cols*CELL,600),background:"#faf8f4",
              cursor:tool==="pin"?"cell":tool==="muis"?"default":"crosshair"}}
            onMouseDown={e=>{
              if(tool==="pin"||tool==="muis") return;
              e.preventDefault();
              setPainting(true);
              // paint starting cell
              const svg=svgRef.current;
              if(!svg) return;
              const rect=svg.getBoundingClientRect();
              const vbW=cols*CELL+36, vbH=rows*CELL+14; // matches viewBox width/height
              const svgX=((e.clientX-rect.left)/rect.width)*vbW - 16; // -16 for viewBox offset
              const svgY=((e.clientY-rect.top)/rect.height)*vbH;
              const r=Math.floor(svgY/CELL), c=Math.floor(svgX/CELL);
              setHoveredCell({r,c});
              paintCell(r,c);
            }}
            onMouseMove={e=>{
              const svg=svgRef.current;
              if(!svg) return;
              const rect=svg.getBoundingClientRect();
              const vbW=cols*CELL+36, vbH=rows*CELL+14;
              const svgX=((e.clientX-rect.left)/rect.width)*vbW - 16;
              const svgY=((e.clientY-rect.top)/rect.height)*vbH;
              const r=Math.floor(svgY/CELL), c=Math.floor(svgX/CELL);
              setHoveredCell({r,c});
              if(painting&&tool!=="pin"&&tool!=="muis") paintCell(r,c);
            }}
            onMouseUp={()=>setPainting(false)}
            onMouseLeave={()=>{setPainting(false);setHoveredCell(null);}}
          >

            {/* Garden outline filled area */}
            {outline.length>=3&&(
              <polygon points={outlinePts}
                fill="rgba(240,236,226,.8)" stroke="#2E5A3D" strokeWidth={2}
                strokeLinejoin="round"/>
            )}

            {/* Cells */}
            {Array.from({length:rows},(_,r)=>Array.from({length:cols},(_,c)=>{
              const inOL=cellInOutline(r,c);
              const z=getZone(r,c);
              const zd=z?ZONE_DEF[z]:null;
              const pin=getPin(r,c);
              const isHov=hoveredCell?.r===r&&hoveredCell?.c===c;
              return(
                <g key={ck(r,c)}
                  onClick={e=>{if(tool==="pin"||tool==="muis")clickCell(r,c);}}
                  style={{cursor:inOL?(tool==="pin"||tool==="muis"?"cell":"crosshair"):"default",pointerEvents:inOL?"auto":"none"}}
                >
                  <rect x={c*CELL} y={r*CELL} width={CELL} height={CELL}
                    fill={!inOL?"rgba(0,0,0,.06)":zd?zd.fill:"transparent"}
                    stroke={!inOL?"rgba(0,0,0,.04)":zd?zd.stroke:K.border}
                    strokeWidth={zd?1.2:0.4}
                    opacity={!inOL?.6:1}/>
                  {inOL&&isHov&&!pin&&(
                    <rect x={c*CELL+1} y={r*CELL+1} width={CELL-2} height={CELL-2}
                      fill={tool==="eraser"?"rgba(192,58,63,.18)":"rgba(46,90,61,.16)"} rx={2}/>
                  )}
                  {(()=>{
                    const cellPins=getPinsAt(r,c);
                    if(cellPins.length===0) return null;
                    const isHovCell=hoveredCell?.r===r&&hoveredCell?.c===c;
                    // Show up to 4 mini-dots for multi-pin, or single large pin
                    if(cellPins.length===1){
                      const p=cellPins[0];
                      return(<g>
                        <ellipse cx={c*CELL+CELL/2} cy={r*CELL+CELL-3} rx={4} ry={2} fill="rgba(0,0,0,.18)"/>
                        <path d={`M${c*CELL+CELL/2} ${r*CELL+CELL-4} C${c*CELL+CELL/2-5} ${r*CELL+CELL-9} ${c*CELL+CELL/2-6} ${r*CELL+4} ${c*CELL+CELL/2} ${r*CELL+3} C${c*CELL+CELL/2+6} ${r*CELL+4} ${c*CELL+CELL/2+5} ${r*CELL+CELL-9} ${c*CELL+CELL/2} ${r*CELL+CELL-4}Z`}
                          fill={p.color} stroke="#fff" strokeWidth={1.5}/>
                        <circle cx={c*CELL+CELL/2} cy={r*CELL+7} r={3} fill="#fff" opacity={.9}/>
                        {isHovCell&&(tool==="pin"||tool==="muis")&&<>
                          <circle cx={c*CELL+CELL-3} cy={r*CELL+3} r={5} fill={tool==="muis"?"#5A3A8A":K.danger} stroke="#fff" strokeWidth={1}/>
                          <text x={c*CELL+CELL-3} y={r*CELL+6.5} textAnchor="middle" fontSize={7} fill="#fff" fontWeight="bold">{tool==="muis"?"i":"✕"}</text>
                        </>}
                      </g>);
                    }
                    // Multiple pins: show colored dot cluster
                    const positions=[[.25,.25],[.75,.25],[.25,.75],[.75,.75]];
                    return(<g>
                      {cellPins.slice(0,4).map((p,pi)=>{
                        const [fx,fy]=positions[pi]||[.5,.5];
                        return(<circle key={p.id} cx={c*CELL+fx*CELL} cy={r*CELL+fy*CELL} r={4}
                          fill={p.color} stroke="#fff" strokeWidth={1.2}/>);
                      })}
                      {cellPins.length>4&&<text x={c*CELL+CELL-3} y={r*CELL+CELL-2} fontSize={8} fill={K.muted} textAnchor="end">+{cellPins.length-4}</text>}
                      {isHovCell&&(tool==="pin"||tool==="muis")&&<>
                        <rect x={c*CELL+CELL-13} y={r*CELL} width={13} height={10} rx={3} fill={tool==="muis"?"#5A3A8A":K.danger}/>
                        <text x={c*CELL+CELL-6.5} y={r*CELL+7.5} textAnchor="middle" fontSize={7} fill="#fff" fontWeight="bold">{tool==="muis"?"i":"✕"}</text>
                      </>}
                    </g>);
                  })()}
                </g>
              );
            }))}

            {/* Outline border on top */}
            {outline.length>=3&&(
              <polygon points={outlinePts}
                fill="none" stroke="#2E5A3D" strokeWidth={2}
                strokeLinejoin="round"/>
            )}

            {/* Grid lines */}
            {Array.from({length:rows+1},(_,r)=>(
              <line key={`h${r}`} x1={0} y1={r*CELL} x2={cols*CELL} y2={r*CELL}
                stroke={r%2===0?"#c8c0b0":"#ddd8ce"} strokeWidth={r%2===0?.6:.3}/>
            ))}
            {Array.from({length:cols+1},(_,c)=>(
              <line key={`v${c}`} x1={c*CELL} y1={0} x2={c*CELL} y2={rows*CELL}
                stroke={c%2===0?"#c8c0b0":"#ddd8ce"} strokeWidth={c%2===0?.6:.3}/>
            ))}

            {/* Axes labels */}
            {Array.from({length:Math.floor(cols/2)+1},(_,i)=>(
              <text key={`ml${i}`} x={i*2*CELL} y={rows*CELL+10} fontSize={8} fill={K.muted} textAnchor="middle">{i}m</text>
            ))}
            {Array.from({length:Math.floor(rows/2)+1},(_,i)=>(
              <text key={`mr${i}`} x={-4} y={i*2*CELL+3} fontSize={8} fill={K.muted} textAnchor="end">{i}m</text>
            ))}

            {/* Hover → set hoveredPin */}
            {hoveredCell&&tool==="pin"&&(()=>{const p=getPin(hoveredCell.r,hoveredCell.c);if(p&&hoveredPin!==p.id)setHoveredPin(p.id);else if(!p&&hoveredPin)setHoveredPin(null);return null;})()}
          </svg>
        </div>{/* end grid div */}
        </div>{/* end scroll div */}
      </Card>

      {/* Pin legend */}
      {pinnedSpecies.length>0&&<Card style={{marginTop:10}}>
        <div style={{fontSize:11,fontWeight:700,color:K.muted,textTransform:"uppercase",letterSpacing:.5,marginBottom:7}}>
          Geplante soorten — {pinnedSpecies.length} soort{pinnedSpecies.length!==1?"en":""}
        </div>
        <div style={{display:"flex",gap:6,flexWrap:"wrap"}}>
          {pinnedSpecies.map(pin=>(
            <div key={pin.plantId} style={{display:"flex",alignItems:"center",gap:5,
              padding:"4px 10px",borderRadius:12,background:"#fff",border:`1.5px solid ${pin.color}`,fontSize:12}}>
              <span style={{width:10,height:10,borderRadius:"50%",background:pin.color,flexShrink:0}}/>
              {pin.naam}
              <span style={{fontSize:10,color:K.muted,marginLeft:2}}>×{pins.filter(p=>p.plantId===pin.plantId).length}</span>
            </div>
          ))}
        </div>
      </Card>}
    </>}

    {/* ── FLOATING SCALE + DISTANCE INDICATOR — fixed to bottom of screen ── */}
    <div style={{
      position:"fixed",
      bottom:16,
      left:"50%",
      transform:"translateX(-50%)",
      zIndex:500,
      background:"rgba(31,58,42,.92)",
      backdropFilter:"blur(8px)",
      color:"#F3EBDD",
      borderRadius:24,
      padding:"7px 18px",
      display:"flex",
      alignItems:"center",
      gap:14,
      boxShadow:"0 4px 20px rgba(0,0,0,.35)",
      fontSize:12,
      fontWeight:600,
      pointerEvents:"none",
      whiteSpace:"nowrap",
    }}>
      {/* Scale bar: 1m */}
      <div style={{display:"flex",alignItems:"center",gap:5}}>
        <svg width={CELL*2} height={10} style={{flexShrink:0}}>
          <line x1={0} y1={5} x2={CELL*2} y2={5} stroke="#F3EBDD" strokeWidth={2}/>
          <line x1={0} y1={2} x2={0} y2={8} stroke="#F3EBDD" strokeWidth={1.5}/>
          <line x1={CELL*2} y1={2} x2={CELL*2} y2={8} stroke="#F3EBDD" strokeWidth={1.5}/>
        </svg>
        <span style={{opacity:.85}}>1 m</span>
      </div>
      <span style={{opacity:.4}}>|</span>
      {/* Scale bar: 0.5m */}
      <div style={{display:"flex",alignItems:"center",gap:5}}>
        <svg width={CELL} height={10} style={{flexShrink:0}}>
          <line x1={0} y1={5} x2={CELL} y2={5} stroke="#F3EBDD" strokeWidth={1.5} opacity={.7}/>
          <line x1={0} y1={3} x2={0} y2={7} stroke="#F3EBDD" strokeWidth={1.5} opacity={.7}/>
          <line x1={CELL} y1={3} x2={CELL} y2={7} stroke="#F3EBDD" strokeWidth={1.5} opacity={.7}/>
        </svg>
        <span style={{opacity:.65}}>0,5 m</span>
      </div>
      {/* Live distance — phase 1 */}
      {!outlineClosed&&snapPt&&outline.length>0&&(()=>{
        const last=outline[outline.length-1];
        const dx=(snapPt.x-last.x)/CELL*0.5;
        const dy=(snapPt.y-last.y)/CELL*0.5;
        const distM=Math.sqrt(dx*dx+dy*dy);
        if(distM<0.05) return null;
        return(<>
          <span style={{opacity:.4}}>|</span>
          <span style={{
            background:"rgba(255,255,255,.18)",
            borderRadius:12,
            padding:"2px 10px",
            fontSize:13,
            fontWeight:700,
            letterSpacing:.3,
          }}>📏 {distM.toFixed(1)} m</span>
        </>);
      })()}
      {/* Phase 2 stats */}
      {outlineClosed&&<>
        <span style={{opacity:.4}}>|</span>
        <span style={{opacity:.85}}>{paintedCount} vakken · {totalM2} m²</span>
      </>}
    </div>

    {/* Cell Info Modal */}
    {showCellInfo&&selectedCell&&<Modal open={showCellInfo} onClose={()=>setShowCellInfo(false)} title={`Cel (${selectedCell.c+1}, ${selectedCell.r+1}) — ${((selectedCell.c)*.5).toFixed(1)}m × ${((selectedCell.r)*.5).toFixed(1)}m`}>
      {(()=>{
        const {r,c}=selectedCell;
        const zone=getZone(r,c);
        const cellPins=getPinsAt(r,c);
        const zoneDef=zone?ZONE_DEF[zone]:null;
        return(<div>
          <div style={{marginBottom:12}}>
            <div style={{fontSize:11,fontWeight:700,color:K.muted,textTransform:"uppercase",letterSpacing:.4,marginBottom:6}}>Zone</div>
            {zoneDef
              ?<div style={{display:"inline-flex",alignItems:"center",gap:8,padding:"6px 14px",borderRadius:10,
                  background:zoneDef.fill,border:`1.5px solid ${zoneDef.stroke}`,fontSize:13,fontWeight:600}}>
                  {zoneDef.label}
                </div>
              :<div style={{fontSize:13,color:K.muted,fontStyle:"italic"}}>Geen zone ingekleurd</div>
            }
          </div>
          <div style={{marginBottom:16}}>
            <div style={{fontSize:11,fontWeight:700,color:K.muted,textTransform:"uppercase",letterSpacing:.4,marginBottom:6}}>Planten in deze cel ({cellPins.length})</div>
            {cellPins.length===0
              ?<div style={{fontSize:13,color:K.muted,fontStyle:"italic"}}>Geen planten gepind</div>
              :<div style={{display:"flex",flexDirection:"column",gap:6}}>
                {cellPins.map(p=>(
                  <div key={p.id} style={{display:"flex",alignItems:"center",gap:10,padding:"8px 10px",
                    borderRadius:8,background:"#fff",border:`1.5px solid ${p.color}`}}>
                    <span style={{width:12,height:12,borderRadius:"50%",background:p.color,flexShrink:0}}/>
                    <span style={{flex:1,fontSize:13,fontWeight:600}}>{p.naam}</span>
                    <button onClick={()=>{setGardenMap(prev=>({...prev,pins:(prev.pins||[]).filter(x=>x.id!==p.id)}));}}
                      style={{padding:"2px 8px",borderRadius:6,border:"none",background:K.dangerLight,
                        color:K.danger,fontSize:11,cursor:"pointer",fontWeight:600}}>
                      Verwijderen
                    </button>
                  </div>
                ))}
              </div>
            }
          </div>
          <div style={{display:"flex",gap:8,justifyContent:"space-between"}}>
            <Button small onClick={()=>{setShowCellInfo(false);setTool("pin");setPendingCell(selectedCell);setShowPinPicker(true);setPinSearch("");}}>
              📍 Pin toevoegen
            </Button>
            <Button small variant="secondary" onClick={()=>setShowCellInfo(false)}>Sluiten</Button>
          </div>
        </div>);
      })()}
    </Modal>}

    {/* Pin plant picker modal */}
    <Modal open={showPinPicker} onClose={()=>{setShowPinPicker(false);setPendingCell(null);}} title="Plant kiezen voor pin">
      <div style={{marginBottom:10}}>
        <input value={pinSearch} onChange={e=>setPinSearch(e.target.value)} placeholder="Zoek soort..." autoFocus
          style={{width:"100%",padding:"8px 12px",border:`2px solid ${K.border}`,borderRadius:8,
            fontSize:13,fontFamily:"inherit",boxSizing:"border-box",outline:"none"}}/>
      </div>
      {allPlants.length===0&&<div style={{padding:"20px",textAlign:"center",fontSize:13,color:K.muted}}>
        Nog geen planten.{" "}
        <span onClick={()=>{setShowPinPicker(false);onNavigateInventaris&&onNavigateInventaris();}}
          style={{color:K.accent,cursor:"pointer",fontWeight:600}}>Voeg er eerst een toe →</span>
      </div>}
      <div style={{maxHeight:340,overflowY:"auto"}}>
        {filteredPlants.map(p=>{
          const color=plantPinColor(p.id);
          const cnt=pins.filter(pin=>pin.plantId===p.id).length;
          return(
            <div key={p.id} onClick={()=>placePin(p)}
              style={{display:"flex",alignItems:"center",gap:10,padding:"9px 6px",cursor:"pointer",
                borderBottom:`1px solid ${K.border}`}}
              onMouseEnter={e=>e.currentTarget.style.background=K.bL}
              onMouseLeave={e=>e.currentTarget.style.background="transparent"}>
              <span style={{width:14,height:14,borderRadius:"50%",background:color,
                border:"2px solid #fff",boxShadow:"0 1px 4px rgba(0,0,0,.2)",flexShrink:0}}/>
              <div style={{flex:1,minWidth:0}}>
                <div style={{fontSize:13,fontWeight:600}}>{p.naam}</div>
                {p.latijn&&<div style={{fontSize:11,color:K.muted,fontStyle:"italic"}}>{p.latijn}</div>}
              </div>
              {cnt>0&&<span style={{fontSize:10,fontWeight:700,padding:"1px 7px",
                borderRadius:10,background:K.accentLight,color:K.accent}}>{cnt}×</span>}
            </div>
          );
        })}
        {filteredPlants.length===0&&allPlants.length>0&&
          <div style={{padding:16,textAlign:"center",fontSize:13,color:K.muted}}>Geen resultaten</div>}
      </div>
    </Modal>

    {/* Resize modal */}
    <Modal open={showSizeModal} onClose={()=>setShowSizeModal(false)} title="Raster formaat">
      <p style={{fontSize:13,color:K.muted,marginBottom:14}}>Stel de afmeting in van het raster. Elk vakje = 0,5×0,5 meter.</p>
      <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:12}}>
        <Input label="Breedte (kolommen)" type="number" value={sizeForm.cols}
          onChange={e=>setSizeForm(p=>({...p,cols:e.target.value}))} min={4} max={60}/>
        <Input label="Hoogte (rijen)" type="number" value={sizeForm.rows}
          onChange={e=>setSizeForm(p=>({...p,rows:e.target.value}))} min={4} max={50}/>
      </div>
      <p style={{fontSize:11,color:K.muted,margin:"0 0 14px"}}>
        → {(sizeForm.cols*.5).toFixed(1)} m breed × {(sizeForm.rows*.5).toFixed(1)} m hoog
        = {(sizeForm.cols*sizeForm.rows*.25).toFixed(1)} m²
      </p>
      <div style={{display:"flex",gap:8,justifyContent:"flex-end"}}>
        <Button variant="secondary" onClick={()=>setShowSizeModal(false)}>Annuleren</Button>
        <Button onClick={resizeGrid}>Opslaan</Button>
      </div>
    </Modal>
  </div>);
}

// ═══════════════════════════════════════════════════════════════════
// FOTOJOURNAAL TAB
// ═══════════════════════════════════════════════════════════════════
function FotojournaalTab({journal,setJournal}){
  const [showCapture,setShowCapture]=useState(false);
  const [spots,setSpots]=useState(()=>{
    // spots are stored inside journal as a separate key
    try{const v=localStorage.getItem("tr_spots");return v?JSON.parse(v):[];}catch(e){return [];}
  });
  const [selectedSpot,setSelectedSpot]=useState(null);
  const [showAddSpot,setShowAddSpot]=useState(false);
  const [spotForm,setSpotForm]=useState({naam:"",beschrijving:"",referencePhoto:null});
  const [captureSpot,setCaptureSpot]=useState(null);
  const [capturePhoto,setCapturePhoto]=useState(null);
  const [showTimelapse,setShowTimelapse]=useState(null); // spot id
  const [tlFrame,setTlFrame]=useState(0);
  const tlRef=useRef();
  const frRef=useRef();
  const capRef=useRef();
  const today_str=today();

  // Save spots separately
  useEffect(()=>{try{localStorage.setItem("tr_spots",JSON.stringify(spots));}catch(e){};},[spots]);

  function handleSpotPhoto(e,setter){
    const f=e.target.files?.[0];if(!f)return;
    const r=new FileReader();r.onload=ev=>setter(ev.target.result);r.readAsDataURL(f);e.target.value="";
  }

  function saveSpot(){
    if(!spotForm.naam.trim()) return;
    setSpots(prev=>[...prev,{id:uid(),naam:spotForm.naam,beschrijving:spotForm.beschrijving,referencePhoto:spotForm.referencePhoto,created:today_str}]);
    setSpotForm({naam:"",beschrijving:"",referencePhoto:null});
    setShowAddSpot(false);
  }

  function savePhoto(){
    if(!capturePhoto||!captureSpot) return;
    setJournal(prev=>[...prev,{id:uid(),spotId:captureSpot.id,date:today_str,photo:capturePhoto,time:new Date().toLocaleTimeString("nl",{hour:"2-digit",minute:"2-digit"})}]);
    setCapturePhoto(null);
    setCaptureSpot(null);
    setShowCapture(false);
  }

  function deleteEntry(id){setJournal(prev=>prev.filter(e=>e.id!==id));}
  function deleteSpot(id){
    setSpots(prev=>prev.filter(s=>s.id!==id));
    setJournal(prev=>prev.filter(e=>e.spotId!==id));
  }

  // Timelapse viewer
  function startTimelapse(spot){
    setShowTimelapse(spot.id);
    setTlFrame(0);
  }
  const tlEntries=showTimelapse?journal.filter(e=>e.spotId===showTimelapse).sort((a,b)=>a.date.localeCompare(b.date)):[];

  useEffect(()=>{
    if(!showTimelapse||tlEntries.length===0) return;
    const iv=setInterval(()=>setTlFrame(f=>(f+1)%tlEntries.length),800);
    return()=>clearInterval(iv);
  },[showTimelapse,tlEntries.length]);

  // Check which spots have a photo today
  const todayPhotos=new Set(journal.filter(e=>e.date===today_str).map(e=>e.spotId));

  return(<div>
    <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:16}}>
      <div>
        <h2 style={{margin:0,fontSize:22,color:K.text}}>Fotojournaal</h2>
        <p style={{margin:"4px 0 0",fontSize:13,color:K.muted}}>{spots.length} vaste hoek{spots.length!==1?"en":""} · {journal.length} foto's totaal</p>
      </div>
      <Button onClick={()=>setShowAddSpot(true)}><Icons.plus size={14}/>Nieuwe hoek</Button>
    </div>

    {/* Daily reminder banner */}
    {spots.length>0&&spots.some(s=>!todayPhotos.has(s.id))&&(
      <Card style={{marginBottom:16,background:"#FFF8E8",borderLeft:`3px solid #C4703A`}}>
        <div style={{fontSize:13,fontWeight:600,color:"#C4703A",marginBottom:4}}>📸 Dagelijkse foto herinnering</div>
        <div style={{fontSize:12,color:K.muted}}>
          {spots.filter(s=>!todayPhotos.has(s.id)).map(s=>s.naam).join(", ")} — nog geen foto vandaag.
        </div>
        <div style={{display:"flex",gap:8,marginTop:10,flexWrap:"wrap"}}>
          {spots.filter(s=>!todayPhotos.has(s.id)).map(s=>(
            <button key={s.id} onClick={()=>{setCaptureSpot(s);setShowCapture(true);}}
              style={{padding:"5px 12px",borderRadius:8,border:"none",background:"#C4703A",color:"#fff",fontSize:12,fontWeight:700,cursor:"pointer"}}>
              📷 {s.naam}
            </button>
          ))}
        </div>
      </Card>
    )}

    {spots.length===0&&<Card><EmptyState icon={<Icons.camera2 size={32} color={K.muted}/>} title="Nog geen vaste hoeken" sub="Maak een vaste hoek aan om dagelijks een foto te maken vanuit dezelfde positie."/></Card>}

    {/* Spots grid */}
    <div style={{display:"grid",gridTemplateColumns:"repeat(auto-fill,minmax(280px,1fr))",gap:16}}>
      {spots.map(spot=>{
        const entries=journal.filter(e=>e.spotId===spot.id).sort((a,b)=>b.date.localeCompare(a.date));
        const hasToday=todayPhotos.has(spot.id);
        const lastEntry=entries[0];
        return(
          <Card key={spot.id} style={{borderLeft:`3px solid ${hasToday?K.accent:"#E8DCC8"}`}}>
            <div style={{display:"flex",justifyContent:"space-between",alignItems:"flex-start",marginBottom:10}}>
              <div>
                <div style={{fontSize:15,fontWeight:700,color:K.text}}>{spot.naam}</div>
                {spot.beschrijving&&<div style={{fontSize:12,color:K.muted}}>{spot.beschrijving}</div>}
                <div style={{fontSize:11,color:K.muted,marginTop:2}}>{entries.length} foto's</div>
              </div>
              <div style={{display:"flex",gap:4}}>
                {entries.length>=2&&<button onClick={()=>startTimelapse(spot)} style={{padding:"4px 8px",borderRadius:6,border:`1px solid ${K.border}`,background:"#fff",fontSize:10,cursor:"pointer",color:K.accent,fontWeight:700}}>▶ Timelaps</button>}
                <button onClick={()=>deleteSpot(spot.id)} style={{padding:"4px 8px",borderRadius:6,border:`1px solid ${K.border}`,background:"#fff",fontSize:10,cursor:"pointer",color:K.danger}}>✕</button>
              </div>
            </div>

            {/* Latest photo */}
            {lastEntry&&<div style={{width:"100%",height:160,borderRadius:8,overflow:"hidden",marginBottom:8,position:"relative"}}>
              <img src={lastEntry.photo} alt="" style={{width:"100%",height:"100%",objectFit:"cover"}}/>
              <div style={{position:"absolute",bottom:4,left:6,background:"rgba(0,0,0,.55)",color:"#fff",fontSize:10,padding:"2px 6px",borderRadius:4}}>{lastEntry.date} {lastEntry.time}</div>
              {hasToday&&<div style={{position:"absolute",top:6,right:6,background:K.accent,color:"#fff",fontSize:10,padding:"2px 8px",borderRadius:10,fontWeight:700}}>✓ Vandaag</div>}
            </div>}

            {/* Reference overlay button */}
            {spot.referencePhoto&&!lastEntry&&<div style={{width:"100%",height:120,borderRadius:8,overflow:"hidden",marginBottom:8,position:"relative"}}>
              <img src={spot.referencePhoto} alt="" style={{width:"100%",height:"100%",objectFit:"cover",opacity:.5}}/>
              <div style={{position:"absolute",inset:0,display:"flex",alignItems:"center",justifyContent:"center",fontSize:11,color:"#666",fontStyle:"italic"}}>Referentiefoto</div>
            </div>}

            <button onClick={()=>{setCaptureSpot(spot);setCapturePhoto(null);setShowCapture(true);}}
              style={{width:"100%",padding:"8px",borderRadius:8,border:`2px dashed ${K.accent}`,background:K.accentLight,color:K.accent,fontSize:12,fontWeight:700,cursor:"pointer"}}>
              📷 Foto maken
            </button>

            {/* Recent strip */}
            {entries.length>1&&<div style={{display:"flex",gap:4,marginTop:8,overflowX:"auto"}}>
              {entries.slice(0,8).map(e=>(
                <div key={e.id} style={{position:"relative",flexShrink:0}}>
                  <img src={e.photo} alt="" style={{width:44,height:44,objectFit:"cover",borderRadius:5,border:`1px solid ${K.border}`}}/>
                  <button onClick={()=>deleteEntry(e.id)} style={{position:"absolute",top:-4,right:-4,width:14,height:14,borderRadius:"50%",background:K.danger,border:"none",color:"#fff",fontSize:8,cursor:"pointer",display:"flex",alignItems:"center",justifyContent:"center",lineHeight:1}}>✕</button>
                </div>
              ))}
            </div>}
          </Card>
        );
      })}
    </div>

    {/* Capture modal */}
    <Modal open={showCapture} onClose={()=>{setShowCapture(false);setCapturePhoto(null);}} title={`📷 ${captureSpot?.naam||""}`}>
      {captureSpot?.referencePhoto&&<div style={{marginBottom:12}}>
        <div style={{fontSize:11,fontWeight:600,color:K.muted,marginBottom:4,textTransform:"uppercase",letterSpacing:.3}}>Referentie (maak foto vanuit dezelfde hoek)</div>
        <img src={captureSpot.referencePhoto} alt="" style={{width:"100%",maxHeight:160,objectFit:"cover",borderRadius:8,opacity:.7,border:`1px solid ${K.border}`}}/>
      </div>}
      <input ref={capRef} type="file" accept="image/*" capture="environment" onChange={e=>handleSpotPhoto(e,setCapturePhoto)} style={{display:"none"}}/>
      {capturePhoto
        ?<div style={{position:"relative",marginBottom:12}}>
          <img src={capturePhoto} alt="" style={{width:"100%",maxHeight:220,objectFit:"cover",borderRadius:10}}/>
          <button onClick={()=>setCapturePhoto(null)} style={{position:"absolute",top:6,right:6,background:"rgba(0,0,0,.5)",border:"none",borderRadius:"50%",width:26,height:26,color:"#fff",cursor:"pointer",fontSize:14}}>✕</button>
        </div>
        :<div onClick={()=>capRef.current?.click()} style={{width:"100%",height:140,borderRadius:10,border:`2px dashed ${K.accent}`,display:"flex",flexDirection:"column",alignItems:"center",justifyContent:"center",cursor:"pointer",background:K.accentLight,marginBottom:12,gap:6}}>
          <Icons.camera2 size={28} color={K.accent}/>
          <span style={{fontSize:13,color:K.accent,fontWeight:600}}>Foto maken / uploaden</span>
        </div>
      }
      <div style={{display:"flex",gap:8,justifyContent:"flex-end"}}>
        <Button variant="secondary" onClick={()=>{setShowCapture(false);setCapturePhoto(null);}}>Annuleren</Button>
        <Button onClick={savePhoto} disabled={!capturePhoto}><Icons.plus size={14}/>Opslaan</Button>
      </div>
    </Modal>

    {/* Add spot modal */}
    <Modal open={showAddSpot} onClose={()=>setShowAddSpot(false)} title="Nieuwe vaste hoek">
      <Input label="Naam van de hoek" value={spotForm.naam} onChange={e=>setSpotForm(p=>({...p,naam:e.target.value}))} placeholder="Bijv. Voortuin links, Perenboom, Perk A..."/>
      <TextArea label="Beschrijving (optioneel)" value={spotForm.beschrijving} onChange={e=>setSpotForm(p=>({...p,beschrijving:e.target.value}))} placeholder="Bijv. Vanuit het tuinhek richting het huis"/>
      <div style={{marginBottom:12}}>
        <label style={{display:"block",fontSize:12,fontWeight:600,color:K.muted,marginBottom:4,letterSpacing:.3,textTransform:"uppercase"}}>Referentiefoto (optioneel)</label>
        <input ref={frRef} type="file" accept="image/*" capture="environment" onChange={e=>handleSpotPhoto(e,v=>setSpotForm(p=>({...p,referencePhoto:v})))} style={{display:"none"}}/>
        {spotForm.referencePhoto
          ?<div style={{position:"relative"}}>
            <img src={spotForm.referencePhoto} alt="" style={{width:"100%",height:120,objectFit:"cover",borderRadius:8}}/>
            <button onClick={()=>setSpotForm(p=>({...p,referencePhoto:null}))} style={{position:"absolute",top:4,right:4,background:"rgba(0,0,0,.5)",border:"none",borderRadius:"50%",width:22,height:22,color:"#fff",cursor:"pointer",fontSize:12}}>✕</button>
          </div>
          :<div onClick={()=>frRef.current?.click()} style={{width:"100%",height:80,borderRadius:8,border:`2px dashed ${K.border}`,display:"flex",alignItems:"center",justifyContent:"center",cursor:"pointer",background:K.bL,fontSize:12,color:K.muted,gap:6}}>
            <Icons.camera size={16}/> Referentiefoto uploaden
          </div>
        }
      </div>
      <div style={{display:"flex",gap:8,justifyContent:"flex-end"}}>
        <Button variant="secondary" onClick={()=>setShowAddSpot(false)}>Annuleren</Button>
        <Button onClick={saveSpot} disabled={!spotForm.naam.trim()}><Icons.plus size={14}/>Aanmaken</Button>
      </div>
    </Modal>

    {/* Timelapse viewer */}
    {showTimelapse&&<div style={{position:"fixed",inset:0,background:"rgba(0,0,0,.9)",zIndex:3000,display:"flex",flexDirection:"column",alignItems:"center",justifyContent:"center"}} onClick={()=>setShowTimelapse(null)}>
      <div onClick={e=>e.stopPropagation()} style={{maxWidth:600,width:"95%"}}>
        <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:12}}>
          <div style={{color:"#fff",fontWeight:700,fontSize:16}}>{spots.find(s=>s.id===showTimelapse)?.naam} — Timelaps</div>
          <button onClick={()=>setShowTimelapse(null)} style={{background:"rgba(255,255,255,.2)",border:"none",borderRadius:"50%",width:32,height:32,color:"#fff",cursor:"pointer",fontSize:18}}>✕</button>
        </div>
        {tlEntries[tlFrame]&&<>
          <img src={tlEntries[tlFrame].photo} alt="" style={{width:"100%",borderRadius:10,maxHeight:"60vh",objectFit:"contain"}}/>
          <div style={{color:"rgba(255,255,255,.7)",textAlign:"center",marginTop:8,fontSize:13}}>{tlEntries[tlFrame].date} {tlEntries[tlFrame].time} — {tlFrame+1}/{tlEntries.length}</div>
          <div style={{display:"flex",gap:3,marginTop:8,justifyContent:"center",flexWrap:"wrap"}}>
            {tlEntries.map((_,i)=>(
              <div key={i} onClick={()=>setTlFrame(i)} style={{width:8,height:8,borderRadius:"50%",background:i===tlFrame?"#fff":"rgba(255,255,255,.3)",cursor:"pointer"}}/>
            ))}
          </div>
        </>}
      </div>
    </div>}
  </div>);
}

// ── localStorage persistence helpers ──
function lsGet(key,fallback){try{const v=localStorage.getItem(key);return v?JSON.parse(v):fallback;}catch(e){return fallback;}}
function lsSet(key,val){try{localStorage.setItem(key,JSON.stringify(val));}catch(e){}}

const INITIAL_TASKS=[
  {id:"d1",title:"Snoeien vaste planten",description:"Oude stengels terugsnoeien",category:"Snoeien",startDate:"2026-02-01",endDate:"2026-03-15",repeat:"jaarlijks",plantRef:"groep:Alle vaste planten",plantLabel:"Alle vaste planten",gardenCategory:"sierplanten"},
  {id:"d2",title:"Dahlia knollen voorkiemen",description:"In vochtig zaagsel bij 15°C",category:"Planten/Uitplanten",startDate:"2026-03-01",endDate:"2026-04-01",repeat:"jaarlijks",plantRef:"bol:100",plantLabel:"Dahlia 'Café au Lait'",gardenCategory:"sierplanten"},
  {id:"d3",title:"Tomaten zaaien",description:"Binnen zaaien, zaaigrond",category:"Zaaien",startDate:"2026-02-15",endDate:"2026-03-15",repeat:"jaarlijks",plantRef:"",plantLabel:"",gardenCategory:"moestuin"},
  {id:"d4",title:"Bollen planten (najaar)",description:"Tulpen, narcissen, krokussen",category:"Planten/Uitplanten",startDate:"2026-10-01",endDate:"2026-11-30",repeat:"jaarlijks",plantRef:"groep:Alle bollen & knollen",plantLabel:"Alle bollen & knollen",gardenCategory:"sierplanten"},
  {id:"d5",title:"Eerste bemesting",description:"Organische mest rond vaste planten",category:"Bemesten",startDate:"2026-03-15",endDate:"2026-04-15",repeat:"jaarlijks",plantRef:"groep:Alle vaste planten",plantLabel:"Alle vaste planten",gardenCategory:"sierplanten"},
];

function CottageGardenApp(){
  const [tab,setTab]=useState(0);
  const [plants,setPlants]=useState(()=>lsGet("tr_plants",INITIAL_PLANTS));
  const [bulbs,setBulbs]=useState(()=>lsGet("tr_bulbs",INITIAL_BULBS));
  const [seeds,setSeeds]=useState(()=>lsGet("tr_seeds",[]));
  const [trees,setTrees]=useState(()=>lsGet("tr_trees",[]));
  const [pondPlants,setPondPlants]=useState(()=>lsGet("tr_pond",[]));
  const [veggies,setVeggies]=useState(()=>lsGet("tr_veggies",[]));
  const [tasks,setTasks]=useState(()=>lsGet("tr_tasks",INITIAL_TASKS));
  const [completions,setCompletions]=useState(()=>lsGet("tr_completions",[]));
  const [wishlist,setWishlist]=useState(()=>lsGet("tr_wishlist",[]));
  const [gardenMap,setGardenMap]=useState(()=>lsGet("tr_gardenmap",{outline:[],outlineClosed:false,phase:"draw",cells:{},pins:[],cols:20,rows:16,gardenSized:false,gardenBreedte:null,gardenHoogte:null}));
  const [journal,setJournal]=useState(()=>lsGet("tr_journal",[]));

  // ── Persist all state to localStorage ──
  useEffect(()=>{lsSet("tr_plants",plants);},[plants]);
  useEffect(()=>{lsSet("tr_bulbs",bulbs);},[bulbs]);
  useEffect(()=>{lsSet("tr_seeds",seeds);},[seeds]);
  useEffect(()=>{lsSet("tr_trees",trees);},[trees]);
  useEffect(()=>{lsSet("tr_pond",pondPlants);},[pondPlants]);
  useEffect(()=>{lsSet("tr_veggies",veggies);},[veggies]);
  useEffect(()=>{lsSet("tr_tasks",tasks);},[tasks]);
  useEffect(()=>{lsSet("tr_completions",completions);},[completions]);
  useEffect(()=>{lsSet("tr_wishlist",wishlist);},[wishlist]);
  useEffect(()=>{lsSet("tr_gardenmap",gardenMap);},[gardenMap]);
  useEffect(()=>{lsSet("tr_journal",journal);},[journal]);

  // ── Auto-purge: verlopen taken ouder dan 7 dagen ──
  useEffect(()=>{
    const cutoff=new Date();cutoff.setDate(cutoff.getDate()-7);
    const cutStr=cutoff.toISOString().split("T")[0];
    setTasks(prev=>prev.filter(t=>{
      if(!t.startDate) return true;
      if(t.endDate&&t.endDate>=cutStr) return true;
      if(!t.endDate&&t.startDate>=cutStr) return true;
      return false;
    }));
  },[]);

  const [showApiModal,setShowApiModal]=useState(false);
  const [apiKeyInput,setApiKeyInput]=useState(()=>{try{return localStorage.getItem("cg_apikey")||"";}catch(e){return "";}});
  function saveApiKey(){const k=apiKeyInput.trim();window.__CG_API_KEY=k;try{localStorage.setItem("cg_apikey",k);}catch(e){}setShowApiModal(false);}
  React.useEffect(()=>{try{const k=localStorage.getItem("cg_apikey")||"";window.__CG_API_KEY=k;setApiKeyInput(k);}catch(e){};},[]);
  const hasKey=!!(apiKeyInput.trim());

  const tabs=[
    {icon:Icons.dashboard,label:"Dashboard"},

    {icon:Icons.tasks,label:"Taken"},
    {icon:Icons.camera2,label:"Journaal"},
    {icon:Icons.heart,label:"Wishlist"},
