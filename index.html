function formatDate(d) { if(!d) return ""; const dt=new Date(d); return `${dt.getDate()} ${MONTH_SHORT[dt.getMonth()]} ${dt.getFullYear()}`; }
function uid() { return Date.now().toString(36)+Math.random().toString(36).slice(2,8); }

// EXCEL EXPORT (using SheetJS)
// ═══════════════════════════════════════════════════════════════════
async function exportToExcel(sheetName, headers, rows, filePrefix) {
  // SheetJS is loaded globally via script tag
  const wb = XLSX.utils.book_new();
  const data = [headers, ...rows];
  const ws = XLSX.utils.aoa_to_sheet(data);
  // Auto column widths
  ws["!cols"] = headers.map((h, i) => {
    let max = h.length;
    rows.forEach(r => { if (r[i] && String(r[i]).length > max) max = String(r[i]).length; });
    return { wch: Math.min(max + 2, 40) };
  });
  XLSX.utils.book_append_sheet(wb, ws, sheetName);
  const d = new Date();
  const dateStr = `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,"0")}-${String(d.getDate()).padStart(2,"0")}`;
  XLSX.writeFile(wb, `${filePrefix}_${dateStr}.xlsx`);
}

      {label || "Exporteer"}

}

function Button({children,onClick,variant="primary",small,style,disabled,...p}){
  const b={border:"none",cursor:disabled?"not-allowed":"pointer",borderRadius:8,fontFamily:"inherit",fontWeight:600,fontSize:small?12:13,display:"inline-flex",alignItems:"center",gap:6,transition:"all .15s",opacity:disabled?.5:1};
  const v={primary:{...b,background:K.accent,color:"#F3EBDD",padding:small?"6px 14px":"10px 20px",boxShadow:"0 2px 6px rgba(46,90,61,.3)"},secondary:{...b,background:"#FFFFFF",color:K.accentDark,border:`2px solid ${K.border}`,padding:small?"6px 14px":"10px 20px"},danger:{...b,background:K.dangerLight,color:K.danger,padding:small?"6px 14px":"10px 20px"},ghost:{...b,background:"transparent",color:K.muted,padding:small?"4px 8px":"6px 12px"}};
  return <button onClick={disabled?undefined:onClick} style={{...v[variant],...style}} {...p}>{children}</button>;
}

function Input({label,...p}){return(<div style={{marginBottom:12}}>{label&&<label style={{display:"block",fontSize:12,fontWeight:600,color:K.muted,marginBottom:4,letterSpacing:.3,textTransform:"uppercase"}}>{label}</label>}<input style={{width:"100%",padding:"9px 12px",border:`2px solid ${K.border}`,borderRadius:8,fontSize:14,fontFamily:"inherit",background:"#FFFFFF",color:K.text,boxSizing:"border-box",outline:"none"}} {...p}/></div>);}
function Select({label,options,...p}){return(<div style={{marginBottom:12}}>{label&&<label style={{display:"block",fontSize:12,fontWeight:600,color:K.muted,marginBottom:4,letterSpacing:.3,textTransform:"uppercase"}}>{label}</label>}<select style={{width:"100%",padding:"9px 12px",border:`2px solid ${K.border}`,borderRadius:8,fontSize:14,fontFamily:"inherit",background:"#FFFFFF",color:K.text,boxSizing:"border-box"}} {...p}>{options.map(o=><option key={o.value??o} value={o.value??o}>{o.label??o}</option>)}</select></div>);}
function TextArea({label,...p}){return(<div style={{marginBottom:12}}>{label&&<label style={{display:"block",fontSize:12,fontWeight:600,color:K.muted,marginBottom:4,letterSpacing:.3,textTransform:"uppercase"}}>{label}</label>}<textarea style={{width:"100%",padding:"9px 12px",border:`2px solid ${K.border}`,borderRadius:8,fontSize:14,fontFamily:"inherit",background:"#FFFFFF",color:K.text,boxSizing:"border-box",resize:"vertical",minHeight:60,outline:"none"}} {...p}/></div>);}

function Modal({open,onClose,title,children,wide}){
  if(!open)return null;
  // Prevent background scroll when modal is open
  useEffect(()=>{
    if(open){document.body.style.overflow="hidden";}
    return()=>{document.body.style.overflow="";};
  },[open]);
  return(
    <div style={{position:"fixed",inset:0,background:"rgba(0,0,0,.4)",zIndex:1000,display:"flex",alignItems:"flex-start",justifyContent:"center",overflowY:"auto",WebkitOverflowScrolling:"touch",padding:"40px 0 40px"}} onMouseDown={e=>{if(e.target===e.currentTarget)onClose();}}>
      <div onMouseDown={e=>e.stopPropagation()} style={{background:"#F3EBDD",borderRadius:12,width:"100%",maxWidth:wide?720:500,margin:"0 8px",boxShadow:"0 20px 60px rgba(0,0,0,.2)",flexShrink:0}}>
        <div style={{padding:"14px 16px",borderBottom:`1px solid ${K.border}`,display:"flex",justifyContent:"space-between",alignItems:"center",position:"sticky",top:0,background:K.bg,borderRadius:"16px 16px 0 0",zIndex:1}}>
          <h3 style={{margin:0,fontSize:16,color:K.text}}>{title}</h3>
          <button onClick={onClose} style={{border:"none",background:"none",cursor:"pointer",color:K.muted,padding:8,minHeight:36,minWidth:36,display:"flex",alignItems:"center",justifyContent:"center"}}><Icons.x/></button>
        </div>
        <div style={{padding:"16px 16px 24px"}}>{children}</div>
      </div>
    </div>
  );
}

const EmptyState=({icon,title,sub})=><div style={{textAlign:"center",padding:"40px 20px",color:K.muted}}><div style={{marginBottom:12,opacity:.4}}>{icon}</div><div style={{fontSize:15,fontWeight:600,marginBottom:4}}>{title}</div><div style={{fontSize:13}}>{sub}</div></div>;

function SearchBar({value,onChange,placeholder}){return(<div style={{position:"relative",marginBottom:16}}><div style={{position:"absolute",left:12,top:"50%",transform:"translateY(-50%)",color:K.muted}}><Icons.search/></div><input value={value} onChange={e=>onChange(e.target.value)} placeholder={placeholder||"Zoeken..."} style={{width:"100%",padding:"10px 12px 10px 40px",border:`1px solid ${K.border}`,borderRadius:10,fontSize:14,fontFamily:"inherit",background:"#fff",boxSizing:"border-box",outline:"none"}}/></div>);}

const Spinner=({text})=><div style={{textAlign:"center",padding:20}}><div style={{display:"inline-block",width:32,height:32,border:`3px solid ${K.border}`,borderTopColor:K.accent,borderRadius:"50%",animation:"spin 1s linear infinite"}}/><div style={{marginTop:8,fontSize:13,color:K.muted}}>{text||"Laden..."}</div></div>;

// PHOTO GALLERY with lightbox
// ═══════════════════════════════════════════════════════════════════
function PhotoGallery({photos=[],onAddPhoto,mainPhoto}){
  const [lb,setLb]=useState(null);
  const fr=useRef();
  const all=[...(mainPhoto?[mainPhoto]:null)||[],...photos];
  function handleFile(e){const f=e.target.files?.[0];if(!f)return;const r=new FileReader();r.onload=ev=>onAddPhoto?.(ev.target.result);r.readAsDataURL(f);e.target.value="";}
  return(<div>
    <div style={{display:"flex",gap:8,flexWrap:"wrap",marginBottom:8}}>
      {all.map((src,i)=><div key={i} onClick={()=>setLb(i)} style={{width:80,height:80,borderRadius:8,overflow:"hidden",cursor:"pointer",border:`2px solid ${K.border}`,flexShrink:0}}><img src={src} alt="" style={{width:"100%",height:"100%",objectFit:"cover"}}/></div>)}
      {onAddPhoto&&<div onClick={()=>fr.current?.click()} style={{width:80,height:80,borderRadius:8,border:`2px dashed ${K.border}`,display:"flex",flexDirection:"column",alignItems:"center",justifyContent:"center",cursor:"pointer",flexShrink:0,background:K.bL}}><Icons.plus size={18} color={K.muted}/><span style={{fontSize:9,color:K.muted,marginTop:2}}>Foto</span></div>}
      <input ref={fr} type="file" accept="image/*" capture="environment" onChange={handleFile} style={{display:"none"}}/>
    </div>
    {all.length===0&&!onAddPhoto&&<div style={{fontSize:12,color:K.muted,fontStyle:"italic"}}>Geen foto's</div>}
    {lb!==null&&<div style={{position:"fixed",inset:0,background:"rgba(0,0,0,.85)",zIndex:2000,display:"flex",alignItems:"center",justifyContent:"center"}} onClick={()=>setLb(null)}>
      <div onClick={e=>e.stopPropagation()} style={{position:"relative",maxWidth:"90vw",maxHeight:"85vh"}}>
        <img src={all[lb]} alt="" style={{maxWidth:"90vw",maxHeight:"85vh",borderRadius:8,objectFit:"contain"}}/>
        {all.length>1&&<><button onClick={()=>setLb((lb-1+all.length)%all.length)} style={{position:"absolute",left:-50,top:"50%",transform:"translateY(-50%)",background:"rgba(255,255,255,.2)",border:"none",borderRadius:"50%",width:40,height:40,cursor:"pointer",display:"flex",alignItems:"center",justifyContent:"center"}}><Icons.left color="#fff"/></button><button onClick={()=>setLb((lb+1)%all.length)} style={{position:"absolute",right:-50,top:"50%",transform:"translateY(-50%)",background:"rgba(255,255,255,.2)",border:"none",borderRadius:"50%",width:40,height:40,cursor:"pointer",display:"flex",alignItems:"center",justifyContent:"center"}}><Icons.right color="#fff"/></button></>}
        <button onClick={()=>setLb(null)} style={{position:"absolute",top:-40,right:0,background:"none",border:"none",cursor:"pointer"}}><Icons.x color="#fff"/></button>
        <div style={{textAlign:"center",color:"#fff",fontSize:12,marginTop:8,opacity:.7}}>{lb+1}/{all.length}</div>
      </div>
    </div>}
  </div>);
}

// PLANT PICKER: searchable dropdown for tasks
// ═══════════════════════════════════════════════════════════════════
function PlantPicker({value,onChange,plants,bulbs,trees,pondPlants,veggies,gardenCategory}){
  const [open,setOpen]=useState(false);
  const [q,setQ]=useState("");
  const ref=useRef();

  // Build items based on selected garden category
  let items=[{value:"",label:"Geen specifieke plant",type:"none"}];

  if(!gardenCategory||gardenCategory==="sierplanten"){
    const GROUPS_S=["Alle vaste planten","Alle bollen & knollen","Alle bomen & struiken","Alle eenjarigen","Alle kruiden"];
    items=[...items,...GROUPS_S.map(g=>({value:`groep:${g}`,label:g,type:"group"}))];
    if(plants?.length) items=[...items,...plants.map(p=>({value:`plant:${p.id}`,label:`${p.naam}${p.latijn?" ("+p.latijn+")":""}`,type:"plant",sub:p.type}))];
    if(bulbs?.length) items=[...items,...bulbs.map(b=>({value:`bol:${b.id}`,label:`${b.naam}${b.latijn?" ("+b.latijn+")":""}`,type:"bulb",sub:b.type}))];
  }
  if(!gardenCategory||gardenCategory==="bomen"){
    if(!gardenCategory) items=[...items,{value:"groep:Alle bomen",label:"Alle bomen",type:"group"}];
    if(trees?.length) items=[...items,...trees.map(t=>({value:`boom:${t.id}`,label:`${t.naam}${t.latijn?" ("+t.latijn+")":""}`,type:"tree",sub:t.type}))];
  }
  if(!gardenCategory||gardenCategory==="vijver"){
    if(!gardenCategory) items=[...items,{value:"groep:Alle vijverplanten",label:"Alle vijverplanten",type:"group"}];
    if(pondPlants?.length) items=[...items,...pondPlants.map(p=>({value:`vijver:${p.id}`,label:`${p.naam}${p.latijn?" ("+p.latijn+")":""}`,type:"pond",sub:p.type}))];
  }
  if(!gardenCategory||gardenCategory==="moestuin"){
    if(!gardenCategory) items=[...items,{value:"groep:Alle moestuinplanten",label:"Alle moestuinplanten",type:"group"}];
    if(veggies?.length) items=[...items,...veggies.map(v=>({value:`moes:${v.id}`,label:`${v.naam}${v.latijn?" ("+v.latijn+")":""}`,type:"veggie",sub:v.type}))];
  }

  const filtered=items.filter(i=>!q||i.label.toLowerCase().includes(q.toLowerCase()));
  const sel=items.find(i=>i.value===value);
  useEffect(()=>{if(!open)return;const h=e=>{if(ref.current&&!ref.current.contains(e.target))setOpen(false)};document.addEventListener("mousedown",h);return()=>document.removeEventListener("mousedown",h);},[open]);
  return(
    <div style={{marginBottom:12}} ref={ref}>
      <label style={{display:"block",fontSize:12,fontWeight:600,color:K.muted,marginBottom:4,letterSpacing:.3,textTransform:"uppercase"}}>Gekoppelde plant (optioneel)</label>
      <div onClick={()=>setOpen(!open)} style={{width:"100%",padding:"9px 12px",border:`1px solid ${open?K.accent:K.border}`,borderRadius:8,fontSize:14,fontFamily:"inherit",background:"#fff",color:value?K.text:K.muted,boxSizing:"border-box",cursor:"pointer",display:"flex",justifyContent:"space-between",alignItems:"center"}}>
        <span style={{overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>{sel?.label||"Geen specifieke plant"}</span>
        <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke={K.muted} strokeWidth="2"><path d="M6 9l6 6 6-6"/></svg>
      </div>
      {open&&<div style={{position:"relative",zIndex:50}}><div style={{position:"absolute",top:4,left:0,right:0,background:"#fff",border:`1px solid ${K.border}`,borderRadius:10,boxShadow:"0 8px 32px rgba(0,0,0,.12)",maxHeight:300,overflow:"hidden",display:"flex",flexDirection:"column"}}>
        <div style={{padding:8,borderBottom:`1px solid ${K.bL}`}}><input autoFocus value={q} onChange={e=>setQ(e.target.value)} placeholder="Zoek plant of groep..." style={{width:"100%",padding:"7px 10px",border:`1px solid ${K.border}`,borderRadius:6,fontSize:13,fontFamily:"inherit",boxSizing:"border-box",outline:"none"}}/></div>
        <div style={{overflow:"auto",maxHeight:240}}>
          {filtered.map(item=>(
            <div key={item.value} onClick={()=>{onChange(item.value);setOpen(false);setQ("");}} style={{padding:"8px 12px",cursor:"pointer",fontSize:13,display:"flex",alignItems:"center",gap:8,borderBottom:`1px solid ${K.bL}`,background:item.value===value?K.accentLight:"transparent"}}>
              {item.type==="none"&&<span style={{color:K.muted}}>—</span>}
              {item.type==="group"&&<span style={{width:8,height:8,borderRadius:2,background:K.warm,flexShrink:0}}/>}
              {item.type==="plant"&&<span style={{width:8,height:8,borderRadius:"50%",background:K.accent,flexShrink:0}}/>}
              {item.type==="bulb"&&<span style={{width:8,height:8,borderRadius:"50%",background:K.bulb,flexShrink:0}}/>}
              {item.type==="tree"&&<span style={{width:8,height:8,borderRadius:"50%",background:K.tree,flexShrink:0}}/>}
              {item.type==="pond"&&<span style={{width:8,height:8,borderRadius:"50%",background:K.pond,flexShrink:0}}/>}
              {item.type==="veggie"&&<span style={{width:8,height:8,borderRadius:"50%",background:K.veggie,flexShrink:0}}/>}
              <div style={{flex:1,overflow:"hidden"}}><div style={{fontWeight:item.type==="group"?600:400,color:item.type==="none"?K.muted:K.text,whiteSpace:"nowrap",overflow:"hidden",textOverflow:"ellipsis"}}>{item.label}</div>{item.sub&&<div style={{fontSize:11,color:K.muted}}>{item.sub}</div>}</div>
            </div>
          ))}
          {filtered.length===0&&<div style={{padding:16,textAlign:"center",fontSize:13,color:K.muted}}>Geen resultaten</div>}
        </div>
      </div></div>}
    </div>
  );
}

// ═══════════════════════════════════════════════════════════════════
// ADD ITEM MODAL: 1-2 photos -> scan via API -> editable form -> save
// ═══════════════════════════════════════════════════════════════════
function AddItemModal({open,onClose,title,description,prompt,fields,onAdd}){
  const [step,setStep]=useState("choose"); // choose | photos | scanning | form
  const [images,setImages]=useState([]); // array of dataURLs (max 2)
  const [loading,setLoading]=useState(false);
  const [form,setForm]=useState({});
  const [scanError,setScanError]=useState("");
  const fr=useRef();

  function reset(){setStep("choose");setImages([]);setForm({});setLoading(false);setScanError("");}
  function initEmptyForm(){const f={};fields.forEach(fd=>f[fd.key]="");setForm(f);setStep("form");}

  function handleFiles(e){
    const fileList=Array.from(e.target.files||[]).slice(0,2);
    if(!fileList.length)return;
    let loaded=[];
    let count=0;
    fileList.forEach((file,i)=>{
      const r=new FileReader();
      r.onload=ev=>{
        loaded[i]=ev.target.result;
        count++;
        if(count===fileList.length){
          setImages(prev=>[...prev,...loaded].slice(0,2));
        }
      };
      r.readAsDataURL(file);
    });
    e.target.value="";
  }

  function addMorePhotos(){fr.current?.click();}

  function removeImage(idx){setImages(prev=>prev.filter((_,i)=>i!==idx));}

  function startScan(){
    if(images.length===0){initEmptyForm();return;}
    analyzePhotos(images);
  }

  async function analyzePhotos(imgs){
    setStep("scanning");setLoading(true);setScanError("");
    try{
      // Build content array with all images + prompt
      const content=[];
      imgs.forEach((imgData,i)=>{
        const b64=imgData.split(",")[1],mt=imgData.split(";")[0].split(":")[1];
        content.push({type:"image",source:{type:"base64",media_type:mt,data:b64}});
      });
      const photoLabel=imgs.length===1?"deze foto":"beide foto's (voor- en achterkant)";
      content.push({type:"text",text:`Analyseer ${photoLabel}. ${prompt}

EXTRA INSTRUCTIE OVER AANVULLEN:
- Velden die je DIRECT van de foto('s) kunt aflezen: vul normaal in.
- Velden die je NIET op de foto kunt vinden maar WEL weet uit je eigen kennis of van internet: vul in met een ★ sterretje VOOR de waarde. Bijvoorbeeld: "★Juni" of "★Zon/Halfzon" of "★40-60".
- Dit helpt de gebruiker onderscheiden wat van de foto komt en wat aangevuld is.
- Laat GEEN veld leeg als je de informatie uit je kennis kunt aanvullen — vul het dan in met ★.`});

      const apiKey=window.__CG_API_KEY||"";
      if(!apiKey){setScanError("Voer eerst je Anthropic API-sleutel in via het 🔑 icoon rechtsboven.");setStep("form");setLoading(false);return;}
      const resp=await fetch("https://api.anthropic.com/v1/messages",{
        method:"POST",
        headers:{
          "Content-Type":"application/json",
          "x-api-key":apiKey,
          "anthropic-version":"2023-06-01",
          "anthropic-dangerous-direct-browser-access":"true"
        },
        body:JSON.stringify({
          model:"claude-sonnet-4-20250514",
          max_tokens:2000,
          tools:[{type:"web_search_20250305",name:"web_search"}],
          messages:[{role:"user",content:content}]
        })
      });

      if(!resp.ok){
        const errText=await resp.text().catch(()=>"");
        throw new Error(`API fout (${resp.status}): ${errText.slice(0,100)}`);
      }

      const data=await resp.json();
      // When web_search is used, response has mixed content blocks (text, tool_use, tool_result).
      // We need to find the text block that contains JSON.
      const textBlocks=data.content?.filter(i=>i.type==="text").map(i=>i.text)||[];
      const allText=textBlocks.join("\n");
      if(!allText.trim()) throw new Error("Geen antwoord ontvangen van de API.");

      // Extract JSON from the response - find the JSON object in the text
      const jsonMatch=allText.match(/\{[\s\S]*\}/);
      if(!jsonMatch) throw new Error("Geen JSON gevonden in het antwoord.");
      const cleaned=jsonMatch[0].replace(/```json|```/g,"").trim();
      const parsed=JSON.parse(cleaned);

      if(parsed.error){
        setScanError(parsed.error);
        initEmptyForm();
        setLoading(false);
        return;
      }
      // Merge into form
      const f={};
      fields.forEach(fd=>{f[fd.key]=parsed[fd.key]||"";});
      setForm(f);setStep("form");
    }catch(err){
      console.error("Scan error:",err);
      const msg=err.message||"";
      let userMsg="Kon de foto('s) niet analyseren. ";
      if(msg.includes("Failed to fetch")||msg.includes("NetworkError")||msg.includes("ERR_")){
        userMsg+="Geen verbinding met de Claude API. Dit werkt alleen vanuit claude.ai of met een geldige API-key. Je kunt de gegevens hieronder handmatig invoeren.";
      } else if(msg.includes("401")||msg.includes("403")){
        userMsg+="Geen toegang tot de API (authenticatie vereist). Voer de gegevens handmatig in.";
      } else {
        userMsg+=msg+" Voer de gegevens handmatig in.";
      }
      setScanError(userMsg);
      initEmptyForm();
    }
    setLoading(false);
  }

  function handleSave(){
    if(!form.naam?.trim())return;
    onAdd(form,images);onClose();reset();
  }

  function setField(key,val){setForm(prev=>({...prev,[key]:val}));}

  return(
    <Modal open={open} onClose={()=>{onClose();reset();}} title={title} wide>
      {step==="choose"&&<div>
        <p style={{fontSize:14,color:K.muted,margin:"0 0 16px"}}>{description}</p>
        {scanError&&<Card style={{background:K.dangerLight,marginBottom:12}}><div style={{fontSize:13,color:K.danger}}>{scanError}</div></Card>}
        <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:12}}>
          <div onClick={()=>setStep("photos")} style={{border:`2px dashed ${K.border}`,borderRadius:12,padding:30,textAlign:"center",cursor:"pointer",background:K.bL}}>
            <Icons.camera size={36} color={K.muted}/>
            <div style={{marginTop:8,fontSize:14,fontWeight:600,color:K.text}}>Foto('s) scannen</div>
            <div style={{fontSize:12,color:K.muted,marginTop:4}}>1 of 2 foto's (bijv. voor- en achterkant). Claude vult de velden in.</div>
          </div>
          <div onClick={initEmptyForm} style={{border:`2px dashed ${K.border}`,borderRadius:12,padding:30,textAlign:"center",cursor:"pointer",background:K.bL}}>
            <Icons.edit size={36} color={K.muted}/>
            <div style={{marginTop:8,fontSize:14,fontWeight:600,color:K.text}}>Handmatig invoeren</div>
            <div style={{fontSize:12,color:K.muted,marginTop:4}}>Vul zelf alle gegevens in zonder foto.</div>
          </div>
        </div>
      </div>}

      {step==="photos"&&<div>
        <p style={{fontSize:14,color:K.muted,margin:"0 0 16px"}}>Voeg 1 of 2 foto's toe (bijv. voorkant en achterkant van een label of zakje). Claude analyseert alle foto's samen.</p>
        <input ref={fr} type="file" accept="image/*" capture="environment" multiple onChange={handleFiles} style={{display:"none"}}/>
        <div style={{display:"flex",gap:12,flexWrap:"wrap",marginBottom:16}}>
          {images.map((src,i)=>(
            <div key={i} style={{position:"relative",width:140,height:140,borderRadius:10,overflow:"hidden",border:`2px solid ${K.accent}`,flexShrink:0}}>
              <img src={src} alt="" style={{width:"100%",height:"100%",objectFit:"cover"}}/>
              <button onClick={()=>removeImage(i)} style={{position:"absolute",top:4,right:4,width:24,height:24,borderRadius:"50%",background:"rgba(0,0,0,.6)",border:"none",cursor:"pointer",display:"flex",alignItems:"center",justifyContent:"center"}}><Icons.x size={14} color="#fff"/></button>
              <div style={{position:"absolute",bottom:0,left:0,right:0,background:"rgba(0,0,0,.5)",color:"#fff",fontSize:11,textAlign:"center",padding:2}}>Foto {i+1}</div>
            </div>
          ))}
          {images.length<2&&(
            <div onClick={()=>fr.current?.click()} style={{width:140,height:140,borderRadius:10,border:`2px dashed ${K.border}`,display:"flex",flexDirection:"column",alignItems:"center",justifyContent:"center",cursor:"pointer",background:K.bL,flexShrink:0}}>
              <Icons.camera size={28} color={K.muted}/>
              <span style={{fontSize:12,color:K.muted,marginTop:6,textAlign:"center"}}>{images.length===0?"Foto toevoegen":"2e foto toevoegen"}</span>
              <span style={{fontSize:10,color:K.muted}}>(bijv. achterkant)</span>
            </div>
          )}
        </div>
        <div style={{display:"flex",gap:8,justifyContent:"space-between",alignItems:"center"}}>
          <Button variant="secondary" onClick={()=>{setImages([]);setStep("choose");}}>Terug</Button>
          <div style={{display:"flex",gap:8}}>
            {images.length>0&&<Button variant="secondary" onClick={()=>{initEmptyForm();}}>Overslaan, handmatig</Button>}
            <Button onClick={startScan} disabled={images.length===0}><Icons.search size={14}/> Analyseren ({images.length} foto{images.length!==1?"'s":""})</Button>
          </div>
        </div>
      </div>}

      {step==="scanning"&&<div>
        <div style={{display:"flex",gap:8,justifyContent:"center",marginBottom:16}}>
          {images.map((src,i)=><img key={i} src={src} alt="" style={{width:100,height:80,objectFit:"cover",borderRadius:8,border:`2px solid ${K.accent}`}}/>)}
        </div>
        <Spinner text={`${images.length} foto${images.length>1?"'s worden":"wordt"} geanalyseerd door Claude AI...`}/>
      </div>}

      {step==="form"&&<div>
        {images.length>0&&<div style={{marginBottom:16}}>
          <label style={{display:"block",fontSize:12,fontWeight:600,color:K.muted,marginBottom:4,letterSpacing:.3,textTransform:"uppercase"}}>Foto's ({images.length})</label>
          <div style={{display:"flex",gap:8}}>{images.map((src,i)=><img key={i} src={src} alt="" style={{width:80,height:60,objectFit:"cover",borderRadius:6,border:`2px solid ${K.border}`}}/>)}</div>
        </div>}
        {scanError&&<Card style={{background:K.dangerLight,marginBottom:12}}><div style={{fontSize:13,color:K.danger}}>{scanError}</div></Card>}
        <div style={{padding:"8px 12px",background:K.accentLight,borderRadius:8,marginBottom:8,fontSize:13,color:K.accent}}>
          {images.length>0&&!scanError?"Velden zijn ingevuld op basis van de scan. Controleer en pas aan waar nodig.":"Vul de gegevens van de soort in."}
        </div>
        {images.length>0&&!scanError&&<div style={{padding:"6px 12px",background:K.warmLight,borderRadius:8,marginBottom:16,fontSize:12,color:K.warm}}>
          ★ = aangevuld met kennis van internet/database (niet direct van de foto afgelezen). Controleer deze velden extra.
        </div>}
        <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:"0 12px"}}>
          {fields.map(fd=>{
            const fullWidth=fd.full;
            const wrapper={gridColumn:fullWidth?"1 / -1":undefined};
            if(fd.type==="select"){
              return <div key={fd.key} style={wrapper}><Select label={fd.label} value={form[fd.key]||""} onChange={e=>setField(fd.key,e.target.value)} options={[{value:"",label:`— ${fd.label} —`},...(fd.options||[]).map(o=>typeof o==="string"?{value:o,label:o}:o)]}/></div>;
            }
            if(fd.type==="textarea"){
              return <div key={fd.key} style={wrapper}><TextArea label={fd.label} value={form[fd.key]||""} onChange={e=>setField(fd.key,e.target.value)} placeholder={fd.placeholder||""}/></div>;
            }
            return <div key={fd.key} style={wrapper}><Input label={fd.label} value={form[fd.key]||""} onChange={e=>setField(fd.key,e.target.value)} placeholder={fd.placeholder||""}/></div>;
          })}
        </div>
        <div style={{display:"flex",gap:8,justifyContent:"flex-end",marginTop:8}}>
          <Button variant="secondary" onClick={()=>{reset();}}>Annuleren</Button>
          <Button onClick={handleSave} disabled={!form.naam?.trim()}><Icons.plus size={14}/> Opslaan</Button>
        </div>
      </div>}
    </Modal>
  );
}

// ═══════════════════════════════════════════════════════════════════
// TAB 1: DASHBOARD
// ═══════════════════════════════════════════════════════════════════
function Dashboard({tasks,setTasks,completions,setCompletions,plants,seeds,bulbs}){
  const [noteModal,setNoteModal]=useState(null);
  const [noteText,setNoteText]=useState("");
  const [editModal,setEditModal]=useState(null);
  const [editForm,setEditForm]=useState({});
  const td=today();

  // Helper: get end-of-week (Sunday) and start/end of next week
  function getWeekBounds(){
    const now=new Date(td);const dow=now.getDay();
    const endThisWeek=new Date(now);endThisWeek.setDate(now.getDate()+(7-dow));
    const startNextWeek=new Date(endThisWeek);startNextWeek.setDate(endThisWeek.getDate()+1);
    const endNextWeek=new Date(startNextWeek);endNextWeek.setDate(startNextWeek.getDate()+6);
    return {endThisWeek:endThisWeek.toISOString().split("T")[0],startNextWeek:startNextWeek.toISOString().split("T")[0],endNextWeek:endNextWeek.toISOString().split("T")[0]};
  }
  const wb=getWeekBounds();

  function classify(startDate,endDate){
    const end=endDate||startDate;
    if(end<td) return "verlopen";
    if(startDate<=td) return "vandaag";
    if(startDate<=wb.endThisWeek) return "dezeweek";
    if(startDate<=wb.endNextWeek) return "volgweek";
    return null;
  }

  const sched=tasks.filter(t=>t.startDate);
  const isDone=(t)=>completions.find(c=>c.taskId===t.id&&c.date>=t.startDate);

  const catTasks={verlopen:[],vandaag:[],dezeweek:[],volgweek:[]};
  sched.forEach(t=>{if(isDone(t))return;const c=classify(t.startDate,t.endDate);if(c)catTasks[c].push(t);});

  seeds.forEach(s=>{if(!s.zaaiStart)return;const mi=getMonthIndex(s.zaaiStart);if(mi<0)return;const n=new Date(),st=new Date(n.getFullYear(),mi,1),ds=st.toISOString().split("T")[0],d=getDaysDiff(ds);
    if(d>=-30&&d<=14){const c=classify(ds,ds);if(c&&!completions.find(x=>x.taskId===`seed-${s.id}-zaai`))catTasks[c].push({id:`seed-${s.id}-zaai`,naam:`Zaai ${s.naam}`,startDate:ds,source:"zaad"});}});

  bulbs.forEach(b=>{if(!b.plantPeriode)return;const p=b.plantPeriode.split("-")[0]?.trim(),mi=getMonthIndex(p);if(mi<0)return;const n=new Date(),st=new Date(n.getFullYear(),mi,1),ds=st.toISOString().split("T")[0];
    const c=classify(ds,ds);if(c&&!completions.find(x=>x.taskId===`bulb-${b.id}-plant`))catTasks[c].push({id:`bulb-${b.id}-plant`,naam:`${b.naam} planten`,startDate:ds,source:"bol"});});

  plants.forEach(p=>{const n=new Date(),cm=n.getMonth(),bs=getMonthIndex(p.bloeiStart),be=getMonthIndex(p.bloeiEind);
    if(bs>=0&&be>=0&&cm>=bs&&cm<=be&&!completions.find(c=>c.taskId===`plant-${p.id}-dh-${cm}`))catTasks.vandaag.push({id:`plant-${p.id}-dh-${cm}`,naam:`Uitgebloeide bloemen: ${p.naam}`,startDate:td,source:"plant"});});

  function handleComp(id){setNoteModal(id);setNoteText("");}
  function confirm(){setCompletions(prev=>[...prev,{taskId:noteModal,date:td,note:noteText,completedAt:new Date().toISOString()}]);setNoteModal(null);}
  function handleEdit(task){
    const isManual=!task.source;
    if(!isManual)return; // auto-taken kun je niet bewerken
    setEditForm({...task});
    setEditModal(task.id);
  }
  function saveEdit(){
    setTasks(prev=>prev.map(t=>t.id===editModal?{...editForm}:t));
    setEditModal(null);
  }
  function handleDelete(taskId, isAuto){
    if(isAuto){
      // Voor auto-taken: markeer als "verwijderd" via completions met speciale flag
      setCompletions(prev=>[...prev,{taskId,date:td,note:"Verwijderd",completedAt:new Date().toISOString(),deleted:true}]);
    } else {
      setTasks(prev=>prev.filter(t=>t.id!==taskId));
    }
  }

  const sections=[
    {key:"verlopen",label:"Verlopen",color:K.overdue,icon:<Icons.alert color={K.overdue}/>,emptyMsg:"Geen verlopen taken."},
    {key:"vandaag",label:"Vandaag",color:K.current,icon:<Icons.sun color={K.current}/>,emptyMsg:"Geen taken voor vandaag."},
    {key:"dezeweek",label:"Deze week",color:"#5a7fb5",icon:<Icons.clock color="#5a7fb5"/>,emptyMsg:"Geen taken deze week."},
    {key:"volgweek",label:"Volgende week",color:K.upcoming,icon:<Icons.clock color={K.upcoming}/>,emptyMsg:"Geen taken volgende week."},
  ];
  const secBg={verlopen:K.dangerLight,vandaag:K.accentLight,dezeweek:"#e4edf6",volgweek:"#f5f0df"};

  const TR=({task,status})=>{
    const s=sections.find(x=>x.key===status);
    const isAuto=["zaad","plant","bol"].includes(task.source);
    const done=completions.find(c=>c.taskId===task.id);
    const isScheduled=!!task.repeat||!!task.endDate;
    return(
      <div style={{display:"flex",alignItems:"center",gap:8,padding:"8px 10px",marginBottom:7,borderRadius:8,borderLeft:`3px solid ${s.color}`,background:done?"rgba(0,0,0,.03)":"#FFFFFF",opacity:done?.55:1,boxShadow:"0 1px 4px rgba(0,0,0,.06)"}}>
        {/* colored dot */}
        <div style={{width:8,height:8,borderRadius:"50%",background:s.color,flexShrink:0}}/>
        {/* title + meta */}
        <div style={{flex:1,minWidth:0}}>
          <div style={{display:"flex",alignItems:"center",gap:6,flexWrap:"wrap"}}>
            <span style={{fontSize:13,fontWeight:600,color:done?K.muted:K.text,whiteSpace:"nowrap",overflow:"hidden",textOverflow:"ellipsis",maxWidth:"100%",textDecoration:done?"line-through":"none"}}>{task.naam||task.title}</span>
            {task.category&&<span style={{fontSize:10,fontWeight:600,padding:"1px 6px",borderRadius:10,background:K.accentLight,color:K.accent}}>{task.category}</span>}
            {task.plantLabel&&<span style={{fontSize:10,fontWeight:600,padding:"1px 6px",borderRadius:10,background:K.bulbL,color:K.bulb}}>{task.plantLabel}</span>}
            {isAuto&&<span style={{fontSize:10,padding:"1px 6px",borderRadius:10,background:K.warmLight,color:K.warm}}>Auto</span>}
          </div>
          <div style={{fontSize:10,color:K.muted,marginTop:1,display:"flex",gap:6,flexWrap:"wrap",alignItems:"center"}}>
            {task.startDate&&<span>{formatDate(task.startDate)}{task.endDate?` – ${formatDate(task.endDate)}`:""}</span>}
            {task.repeat&&<span>↺ {task.repeat}</span>}
            {task.description&&<span style={{fontStyle:"italic",opacity:.8}}>· {task.description}</span>}
          </div>
        </div>
        {/* actions */}
        {!done&&<div style={{display:"flex",gap:4,flexShrink:0,alignItems:"center"}}>
          <button onClick={e=>{e.stopPropagation();handleComp(task.id);}} style={{padding:"4px 8px",borderRadius:6,border:`1px solid ${K.accent}`,background:K.accent,color:"#F3EBDD",fontSize:10,fontWeight:700,cursor:"pointer",whiteSpace:"nowrap"}}>✓ Klaar</button>
          {!isAuto&&<button onClick={e=>{e.stopPropagation();handleEdit(task);}} style={{padding:"4px 8px",borderRadius:6,border:`1px solid ${K.border}`,background:"#fff",color:K.muted,fontSize:10,cursor:"pointer"}}>📅</button>}
          <button onClick={e=>{e.stopPropagation();handleDelete(task.id,isAuto);}} style={{padding:"4px 8px",borderRadius:6,border:`1px solid ${K.border}`,background:"#fff",color:K.danger,fontSize:10,cursor:"pointer"}}>✕</button>
        </div>}
        {done&&<span style={{fontSize:10,fontWeight:700,padding:"2px 8px",borderRadius:10,background:K.accentLight,color:K.accent,flexShrink:0}}>✓ Klaar</span>}
      </div>
    );
  };

  return(<div>
    <div style={{marginBottom:20}}>
      <h2 style={{margin:0,fontSize:16,color:K.text}}>Dashboard</h2>
      <p style={{margin:"4px 0 0",fontSize:12,color:K.muted}}>{formatDate(td)} — {plants.length} planten · {bulbs.length} bollen · {seeds.length} zaden</p>
    </div>
    <div style={{display:"grid",gridTemplateColumns:"repeat(4,1fr)",gap:6,marginBottom:16}}>
      {sections.map(s=><div key={s.key} style={{textAlign:"center",borderTop:`3px solid ${s.color}`,padding:"8px 4px",background:"#FFFFFF",borderRadius:8,boxShadow:"0 1px 4px rgba(0,0,0,.06)"}}><div style={{fontSize:20,fontWeight:700,color:s.color}}>{catTasks[s.key].length}</div><div style={{fontSize:10,color:K.muted,fontWeight:600}}>{s.label}</div></div>)}
    </div>

    {sections.map(s=>{const items=catTasks[s.key];if(items.length===0)return null;return(
      <div key={s.key} style={{marginBottom:12}}>
        <div style={{display:"flex",alignItems:"center",gap:6,marginBottom:4,paddingLeft:2}}>
          {s.icon}<span style={{fontSize:12,fontWeight:700,color:s.color,textTransform:"uppercase",letterSpacing:.5}}>{s.label}</span><span style={{fontSize:11,color:K.muted,fontWeight:400}}>({items.length})</span>
        </div>
        <div style={{background:"#FFFFFF",borderRadius:10,padding:"4px 6px",boxShadow:"0 1px 4px rgba(0,0,0,.06)"}}>
          {items.map(t=><TR key={t.id} task={t} status={s.key}/>)}
        </div>
      </div>
    );})}
    {/* ── NU IN BLOEI ── */}
    {(()=>{
      // Build 4 weeks starting from this Monday
      const now=new Date(td);
      const dayOfWeek=now.getDay();
      const monday=new Date(now);monday.setDate(now.getDate()-(dayOfWeek===0?6:dayOfWeek-1));

      const weeks=[];
      for(let w=0;w<4;w++){
        const weekStart=new Date(monday);weekStart.setDate(monday.getDate()+w*7);
        const weekEnd=new Date(weekStart);weekEnd.setDate(weekStart.getDate()+6);
        const weekMonth=weekStart.getMonth(); // 0-based

        // Find plants blooming this week
        const blooming=[];
        [...plants,...bulbs].forEach(p=>{
          const bs=getMonthIndex(p.bloeiStart),be=getMonthIndex(p.bloeiEind);
          if(bs<0||be<0)return;
          // Check if this week's month falls in bloom range
          const startM=weekStart.getMonth(),endM=weekEnd.getMonth();
          const inBloom=(m)=>bs<=be?(m>=bs&&m<=be):(m>=bs||m<=be);
          if(inBloom(startM)||inBloom(endM)){
            blooming.push(p);
          }
        });
        if(blooming.length>0){
          weeks.push({weekStart,weekEnd,blooming,isThisWeek:w===0});
        }
      }

      // Color mapping for bloom colors
      const colorMap={"wit":"#e8e8e8","geel":"#f0d54a","goud":"#daa520","oranje":"#e8922f","roze":"#e8a0b8","rood":"#d44444","paars":"#9b6fb0","violet":"#8b5ec0","lila":"#b088c8","blauw":"#5a8fc0","staalblauw":"#6088a0","crème":"#f5e6c8","groen":"#6aa84f",
        "donkerpaars":"#5c2d82","zwart":"#333","diverse":"linear-gradient(90deg,#d44,#f0d54a,#5a8fc0,#9b6fb0)"};
      function getColor(kleur){
        if(!kleur)return K.accent;
        const kl=kleur.toLowerCase();
        for(const[key,val] of Object.entries(colorMap)){
          if(kl.includes(key))return val;
        }
        // Try to handle "blauw-paars" etc
        const parts=kl.split(/[\/\-,\s]+/);
        for(const part of parts){
          for(const[key,val] of Object.entries(colorMap)){
            if(part.includes(key))return val;
          }
        }
        return K.accent;
      }

      if(weeks.length===0)return null;
      return(
        <div style={{marginBottom:24}}>
          <h3 style={{margin:"0 0 12px",fontSize:14,color:K.text,display:"flex",alignItems:"center",gap:6}}><Icons.flower color={K.accent}/>Nu in bloei</h3>
          {weeks.map((wk,wi)=>{
            const label=`${wk.weekStart.getDate()} ${MONTH_SHORT[wk.weekStart.getMonth()]} – ${wk.weekEnd.getDate()} ${MONTH_SHORT[wk.weekEnd.getMonth()]}`;
            return(
              <Card key={wi} style={{padding:"10px 14px",borderLeft:wk.isThisWeek?`3px solid ${K.accent}`:undefined,background:wk.isThisWeek?"#f0f7ec":K.card}}>
                <div style={{fontSize:12,fontWeight:700,color:wk.isThisWeek?K.accent:K.muted,marginBottom:8,textTransform:"uppercase",letterSpacing:.5}}>
                  {wk.isThisWeek?"Deze week":"Week"} · {label}
                </div>
                <div style={{display:"flex",gap:6,flexWrap:"wrap"}}>
                  {wk.blooming.map((p,pi)=>{
                    const bg=getColor(p.kleur);
                    const isGradient=typeof bg==="string"&&bg.includes("gradient");
                    const isDark=["#333","#5c2d82","#d44444","#9b6fb0","#8b5ec0","#5a8fc0","#6088a0"].some(c=>bg.includes?.(c));
                    const textColor=isDark||isGradient?"#fff":bg==="#e8e8e8"?"#555":"#fff";
                    return(
                      <span key={pi} style={{display:"inline-flex",alignItems:"center",gap:4,padding:"3px 10px",borderRadius:20,fontSize:11,fontWeight:600,color:textColor,background:isGradient?undefined:bg,backgroundImage:isGradient?bg:undefined,border:bg==="#e8e8e8"?`1px solid ${K.border}`:undefined,whiteSpace:"nowrap"}}>
                        <span style={{width:8,height:8,borderRadius:"50%",background:isGradient?"#fff":textColor==="#fff"?"rgba(255,255,255,.4)":"rgba(0,0,0,.2)",flexShrink:0}}/>
                        {p.naam}
                      </span>
                    );
                  })}
                </div>
              </Card>
            );
          })}
        </div>
      );
    })()}

    {/* Afvinken modal */}
    <Modal open={!!noteModal} onClose={()=>setNoteModal(null)} title="Taak afvinken">
      <p style={{fontSize:14,color:K.muted,margin:"0 0 12px"}}>Optioneel: voeg een notitie toe.</p>
      <TextArea label="Notitie" value={noteText} onChange={e=>setNoteText(e.target.value)} placeholder="Bijv. extra bemest..."/>
      <div style={{display:"flex",gap:8,justifyContent:"flex-end",marginTop:16}}>
        <Button variant="secondary" onClick={()=>setNoteModal(null)}>Annuleren</Button>
        <Button onClick={confirm}><Icons.check size={14}/>Afvinken</Button>
      </div>
    </Modal>
    {/* Datum bewerken modal - alleen datum, niet de taak zelf */}
    <Modal open={!!editModal} onClose={()=>setEditModal(null)} title="Datum wijzigen">
      <div style={{padding:"8px 12px",background:K.accentLight,borderRadius:8,marginBottom:16,fontSize:13,color:K.accent}}>
        <strong>{editForm.title}</strong>
        {editForm.repeat&&<span style={{marginLeft:8,fontSize:12,color:K.muted}}>({editForm.repeat})</span>}
      </div>
      <p style={{fontSize:13,color:K.muted,margin:"0 0 12px"}}>Verschuif de datum voor deze specifieke uitvoering. De herhaling en overige instellingen blijven ongewijzigd.</p>
      <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:12}}>
        <Input label="Startdatum" type="date" value={editForm.startDate||""} onChange={e=>setEditForm(p=>({...p,startDate:e.target.value}))}/>
        <Input label="Einddatum" type="date" value={editForm.endDate||""} onChange={e=>setEditForm(p=>({...p,endDate:e.target.value}))}/>
      </div>
      <div style={{display:"flex",gap:8,justifyContent:"flex-end",marginTop:16}}>
        <Button variant="secondary" onClick={()=>setEditModal(null)}>Annuleren</Button>
        <Button onClick={saveEdit}>Opslaan</Button>
      </div>
    </Modal>
  </div>);
}

// ═══════════════════════════════════════════════════════════════════
// TAB 2: TAKENBEHEER
// ═══════════════════════════════════════════════════════════════════
function TaskManager({tasks,setTasks,plants,bulbs,trees,pondPlants,veggies}){
  const [search,setSearch]=useState("");
  const [editId,setEditId]=useState(null);
  const [showForm,setShowForm]=useState(false);
  const [gardenCategory,setGardenCategory]=useState(""); // step 1 choice
  const [step,setStep]=useState("cat"); // "cat" | "form"
  const CATS=["Zaaien","Planten/Uitplanten","Snoeien","Oogsten","Bemesten","Water geven","Onkruid wieden","Verwerken","Onderhoud","Overig"];
  const REPS=[{value:"",label:"Geen herhaling"},{value:"dagelijks",label:"Dagelijks"},{value:"wekelijks",label:"Wekelijks"},{value:"tweewekelijks",label:"Tweewekelijks"},{value:"maandelijks",label:"Maandelijks"},{value:"jaarlijks",label:"Jaarlijks"}];
  const empty={id:"",title:"",description:"",category:"Overig",startDate:"",endDate:"",repeat:"",plantRef:"",plantLabel:"",gardenCategory:""};
  const [form,setForm]=useState(empty);

  function getLabel(ref){
    if(!ref)return"";
    if(ref.startsWith("groep:"))return ref.replace("groep:","");
    if(ref.startsWith("plant:")){const p=plants.find(x=>x.id===+ref.split(":")[1]);return p?p.naam:"";}
    if(ref.startsWith("bol:")){const b=bulbs.find(x=>x.id===+ref.split(":")[1]);return b?b.naam:"";}
    if(ref.startsWith("boom:")){const t=trees.find(x=>x.id===+ref.split(":")[1]);return t?t.naam:"";}
    if(ref.startsWith("vijver:")){const p=pondPlants.find(x=>x.id===+ref.split(":")[1]);return p?p.naam:"";}
    if(ref.startsWith("moes:")){const v=veggies.find(x=>x.id===+ref.split(":")[1]);return v?v.naam:"";}
    return ref;
  }

  function openNew(){setForm({...empty,id:uid()});setEditId(null);setGardenCategory("");setStep("cat");setShowForm(true);}
  function openEdit(t){setForm({...t});setEditId(t.id);setGardenCategory(t.gardenCategory||"");setStep("form");setShowForm(true);}
  function save(){if(!form.title.trim())return;const t={...form,gardenCategory,plantLabel:getLabel(form.plantRef)};if(editId)setTasks(p=>p.map(x=>x.id===editId?t:x));else setTasks(p=>[...p,t]);setShowForm(false);}
  function del(id){setTasks(p=>p.filter(t=>t.id!==id));}
  const flt=tasks.filter(t=>{const q=search.toLowerCase();return!q||t.title?.toLowerCase().includes(q)||t.category?.toLowerCase().includes(q)||t.plantLabel?.toLowerCase().includes(q);});

  function exportTasks(){exportToExcel("Taken",["Naam","Beschrijving","Categorie","Plant","Startdatum","Einddatum","Herhaling"],tasks.map(t=>[t.title,t.description||"",t.category||"",t.plantLabel||"",t.startDate||"",t.endDate||"",t.repeat||""]),"Taken_export");}

  const GARDEN_CATS=[
    {value:"sierplanten",label:"Sierplanten",icon:"🌸",color:K.accent,bg:K.accentLight,desc:"Vaste planten, bollen & knollen"},
    {value:"bomen",label:"Bomen",icon:"🌳",color:K.tree,bg:K.treeL,desc:"Bomen & struiken"},
    {value:"vijver",label:"Vijver",icon:"💧",color:K.pond,bg:K.pondL,desc:"Vijverplanten & waterplanten"},
    {value:"moestuin",label:"Moestuin",icon:"🥕",color:K.veggie,bg:K.veggieL,desc:"Groenten, kruiden & fruit"},
  ];

  return(<div>
    <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:16}}><h2 style={{margin:0,fontSize:22,color:K.text}}>Takenbeheer</h2><div style={{display:"flex",gap:8}}><ExportBtn onClick={exportTasks} label="Excel"/><Button onClick={openNew}><Icons.plus size={14}/>Nieuwe taak</Button></div></div>
    <SearchBar value={search} onChange={setSearch} placeholder="Zoek taken..."/>
    {flt.length===0?<Card><EmptyState icon={<Icons.tasks size={32}/>} title="Geen taken" sub="Maak een nieuwe taak."/></Card>:
      flt.map(t=><Card key={t.id}><div style={{display:"flex",justifyContent:"space-between",alignItems:"flex-start",gap:8}}>
        <div style={{flex:1}}>
          <div style={{display:"flex",gap:6,flexWrap:"wrap",marginBottom:4}}>{t.category&&<Badge>{t.category}</Badge>}{t.gardenCategory&&<Badge color={t.gardenCategory==="bomen"?K.tree:t.gardenCategory==="vijver"?K.pond:t.gardenCategory==="moestuin"?K.veggie:K.accent} bg={t.gardenCategory==="bomen"?K.treeL:t.gardenCategory==="vijver"?K.pondL:t.gardenCategory==="moestuin"?K.veggieL:K.accentLight}>{GARDEN_CATS.find(g=>g.value===t.gardenCategory)?.label||t.gardenCategory}</Badge>}{t.startDate&&<Badge color={K.accent} bg={K.accentLight}>Gepland</Badge>}{t.repeat&&<Badge color={K.warm} bg={K.warmLight}>{t.repeat}</Badge>}{t.plantLabel&&<Badge color={K.bulb} bg={K.bulbL}>{t.plantLabel}</Badge>}</div>
          <div style={{fontSize:15,fontWeight:600,marginBottom:2}}>{t.title}</div>
          {t.description&&<div style={{fontSize:13,color:K.muted}}>{t.description}</div>}
          <div style={{fontSize:12,color:K.muted,marginTop:4}}>{t.startDate&&<span>Start: {formatDate(t.startDate)}</span>}{t.endDate&&<span> — Einde: {formatDate(t.endDate)}</span>}</div>
        </div>
        <div style={{display:"flex",gap:4}}><Button small variant="ghost" onClick={()=>openEdit(t)}><Icons.edit/></Button><Button small variant="ghost" onClick={()=>del(t.id)} style={{color:K.danger}}><Icons.trash/></Button></div>
      </div></Card>)}
    <Modal open={showForm} onClose={()=>setShowForm(false)} title={editId?"Taak bewerken":"Nieuwe taak"}>
      {step==="cat"&&!editId&&<div>
        <p style={{fontSize:14,color:K.muted,marginBottom:16}}>Voor welk deel van de tuin is deze taak?</p>
        <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:12,marginBottom:16}}>
          {GARDEN_CATS.map(gc=><div key={gc.value} onClick={()=>{setGardenCategory(gc.value);setStep("form");}} style={{padding:"16px 12px",borderRadius:12,border:`2px solid ${gardenCategory===gc.value?gc.color:K.border}`,background:gardenCategory===gc.value?gc.bg:"#fff",cursor:"pointer",textAlign:"center",transition:"all .15s"}}>
            <div style={{fontSize:28,marginBottom:6}}>{gc.icon}</div>
            <div style={{fontWeight:700,fontSize:14,color:gc.color}}>{gc.label}</div>
            <div style={{fontSize:11,color:K.muted,marginTop:2}}>{gc.desc}</div>
          </div>)}
        </div>
        <div style={{display:"flex",justifyContent:"flex-end"}}><Button variant="secondary" onClick={()=>setShowForm(false)}>Annuleren</Button></div>
      </div>}
      {step==="form"&&<div>
        {gardenCategory&&<div style={{padding:"6px 12px",borderRadius:8,marginBottom:12,fontSize:13,background:GARDEN_CATS.find(g=>g.value===gardenCategory)?.bg||K.bL,color:GARDEN_CATS.find(g=>g.value===gardenCategory)?.color||K.muted,display:"flex",alignItems:"center",gap:8}}>
          <span>{GARDEN_CATS.find(g=>g.value===gardenCategory)?.icon}</span>
          <span style={{fontWeight:600}}>{GARDEN_CATS.find(g=>g.value===gardenCategory)?.label}</span>
          {!editId&&<button onClick={()=>setStep("cat")} style={{marginLeft:"auto",fontSize:11,background:"none",border:"none",cursor:"pointer",color:K.muted,textDecoration:"underline"}}>wijzigen</button>}
        </div>}
        <Input label="Taaknaam" value={form.title} onChange={e=>setForm({...form,title:e.target.value})} placeholder="Bijv. Tomaten zaaien"/>
        <TextArea label="Beschrijving" value={form.description} onChange={e=>setForm({...form,description:e.target.value})} placeholder="Beschrijving..."/>
        <Select label="Categorie" value={form.category} onChange={e=>setForm({...form,category:e.target.value})} options={CATS}/>
        <PlantPicker value={form.plantRef||""} onChange={v=>setForm({...form,plantRef:v})} plants={plants} bulbs={bulbs} trees={trees} pondPlants={pondPlants} veggies={veggies} gardenCategory={gardenCategory}/>
        <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:12}}>
          <Input label="Startdatum" type="date" value={form.startDate} onChange={e=>setForm({...form,startDate:e.target.value})}/>
          <Input label="Einddatum" type="date" value={form.endDate} onChange={e=>setForm({...form,endDate:e.target.value})}/>
        </div>
        <Select label="Herhaling" value={form.repeat} onChange={e=>setForm({...form,repeat:e.target.value})} options={REPS}/>
        <div style={{display:"flex",gap:8,justifyContent:"flex-end",marginTop:16}}><Button variant="secondary" onClick={()=>setShowForm(false)}>Annuleren</Button><Button onClick={save} disabled={!form.title.trim()}>{editId?"Opslaan":"Toevoegen"}</Button></div>
      </div>}
    </Modal>
  </div>);
}

const PLANT_TYPES=["Vaste plant","Tweejarige","Eenjarige","Boom/struik","Struik","siergras","kruid/vaste plant","halfheester","bodembedekker/vaste","Bol/knol"];
const PLANT_FIELDS=[
  {key:"naam",label:"Nederlandse naam",placeholder:"Bijv. Duizendblad"},
  {key:"latijn",label:"Latijnse naam",placeholder:"Bijv. Achillea millefolium"},
  {key:"type",label:"Type",type:"select",options:PLANT_TYPES},
  {key:"licht",label:"Lichtstand",type:"select",options:["Zon","Zon/Halfzon","Halfzon","Halfzon/Schaduw","Schaduw"]},
  {key:"hoogte",label:"Hoogte (cm)",placeholder:"Bijv. 40-60"},
  {key:"breedte",label:"Breedte (cm)",placeholder:"Bijv. 30-45"},
  {key:"bloeiStart",label:"Bloei start (maand)",type:"select",options:["Januari","Februari","Maart","April","Mei","Juni","Juli","Augustus","September","Oktober","November","December"]},
  {key:"bloeiEind",label:"Bloei eind (maand)",type:"select",options:["Januari","Februari","Maart","April","Mei","Juni","Juli","Augustus","September","Oktober","November","December"]},
  {key:"kleur",label:"Bloeikleur",placeholder:"Bijv. Wit/roze"},
  {key:"inheems",label:"Inheems",type:"select",options:["Ja","Nee","Nee (wel ingeburgerd)"]},
  {key:"droogte",label:"Droogtetolerantie",placeholder:"Bijv. Ja / Nee / een beetje"},
  {key:"dracht",label:"Drachtplant (bestuivers)",placeholder:"Bijv. Ja, bijen/vlinders"},
  {key:"geur",label:"Geur",placeholder:"Bijv. Ja, sterk / Nee"},
  {key:"eetbaar",label:"Eetbaar",placeholder:"Bijv. Ja, blad/bloem / Nee"},
  {key:"bessen",label:"Bessen",type:"select",options:["Ja","Nee"]},
  {key:"perM2",label:"Aanplant per m²",placeholder:"Bijv. 7-9 / Solitair"},
  {key:"snoeien",label:"Snoeien",placeholder:"Wanneer en hoe snoeien",full:true},
  {key:"oogsten",label:"Oogsten",placeholder:"Wanneer oogsten (indien van toepassing)",full:true},
];
const PLANT_PROMPT=`Analyseer deze foto EXTREEM GRONDIG. Lees ALLE tekst, icoontjes, symbolen en afbeeldingen.

=== MAANDCIRKELS CORRECT LEZEN ===
Labels tonen vaak twee rijen: J F M A M J J A S O N D (Januari t/m December).
Elke letter heeft een rondje: INGEVULD/DICHT rondje = actieve maand, LEEG/OPEN = niet actief.
Loop elke letter stap voor stap af. Kijk naar de VULLING, niet de letter.
- Rij bij "Semis/Zaai" = zaaiperiode
- Rij bij "Floraison/Bloei" = bloeiperiode
Rapporteer EERSTE en LAATSTE ingevulde maand.

=== SOORT/TYPE ===
- "Vivace"/"Meerjarige" icoontje = VASTE PLANT (niet eenjarig!)
- "Annuelle" = Eenjarige, "Bisannuelle" = Tweejarige
- "Mellifère"/"Honingrijk" = drachtplant

Geef JSON (alleen JSON, GEEN markdown backticks):
{"naam":"Nederlandse naam","latijn":"Latijnse naam","type":"Vaste plant/Tweejarige/Eenjarige/Boom-struik/Struik/siergras/kruid/halfheester/bodembedekker - Vivace=Vaste plant!","licht":"Zon/Zon-Halfzon/Halfzon/Halfzon-Schaduw/Schaduw","hoogte":"cm","breedte":"cm","bloeiStart":"EERSTE maand met ingevuld rondje bloeirij, volledige NL naam","bloeiEind":"LAATSTE maand met ingevuld rondje bloeirij, volledige NL naam","kleur":"bloeikleur","inheems":"Ja/Nee/Nee (wel ingeburgerd)","droogte":"tolerantie","dracht":"bestuivers info - kijk naar mellifère/honingrijk","geur":"Ja/Nee + beschrijving","eetbaar":"Ja/Nee + welk deel","bessen":"Ja/Nee","perM2":"per m2 of Solitair","snoeien":"wanneer en hoe","oogsten":"wanneer"}
Combineer foto-info MET eigen kennis over de soort.`;

function PlantTab({plants,setPlants,bulbs,setBulbs,tasks,setTasks,onAfterAdd}){
  const [search,setSearch]=useState("");
  const [selected,setSelected]=useState(null);
  const [selectedKind,setSelectedKind]=useState(null); // "plant" | "bulb"
  const [showAdd,setShowAdd]=useState(false);
  const [addKind,setAddKind]=useState(null); // "plant" | "bulb" | null = ask
  const [filter,setFilter]=useState("alle");

  // Merge plants + bulbs into one list with a kind marker
  const allItems=[
    ...plants.map(p=>({...p,_kind:"plant"})),
    ...bulbs.map(b=>({...b,_kind:"bulb"})),
  ];

  // Filter logic: "Bol/knol" filter matches bulbs; other filters match plant type
  const BULB_FILTER="Bol/knol";
  const flt=allItems.filter(item=>{
    const q=search.toLowerCase();
    const matchSearch=!q||item.naam?.toLowerCase().includes(q)||item.latijn?.toLowerCase().includes(q)||item.type?.toLowerCase().includes(q);
    let matchFilter=true;
    if(filter!=="alle"){
      if(filter===BULB_FILTER) matchFilter=item._kind==="bulb";
      else matchFilter=item._kind==="plant"&&(item.type?.toLowerCase().includes(filter.toLowerCase()));
    }
    return matchSearch&&matchFilter;
  });

  function addPhoto(id,kind,d){
    if(kind==="plant"){setPlants(p=>p.map(x=>x.id===id?{...x,photos:[...(x.photos||[]),d]}:x));}
    else{setBulbs(p=>p.map(x=>x.id===id?{...x,photos:[...(x.photos||[]),d]}:x));}
    if(selected?.id===id) setSelected(p=>({...p,photos:[...(p.photos||[]),d]}));
  }
  function onAddedPlant(formData,images){const np={id:Date.now(),...formData,photo:images?.[0]||null,photos:images?.slice(1)||[]};setPlants(p=>[...p,np]);setAddKind(null);onAfterAdd&&onAfterAdd(np);}
  function onAddedBulb(formData,images){const nb={id:Date.now(),...formData,photo:images?.[0]||null,photos:images?.slice(1)||[]};setBulbs(p=>[...p,nb]);setAddKind(null);onAfterAdd&&onAfterAdd(nb);}

  function handleAdd(){setAddKind(null);setShowAdd(true);}
  function doExport(){
    exportToExcel("Sierplanten",["Naam","Latijns","Type","Lichtstand","Hoogte","Breedte","Bloei start","Bloei eind","Kleur","Inheems","Droogte","Dracht","Geur","Eetbaar","Bessen","Per m²"],
      plants.map(p=>[p.naam,p.latijn,p.type,p.licht,p.hoogte,p.breedte,p.bloeiStart,p.bloeiEind,p.kleur,p.inheems,p.droogte,p.dracht,p.geur,p.eetbaar,p.bessen,p.perM2]),"Sierplanten_inventaris");
  }

  const isBulb=selected&&selectedKind==="bulb";

  return(<div>
    <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:16}}>
      <div><h2 style={{margin:0,fontSize:22,color:K.text}}>Sierplanten</h2><p style={{margin:"4px 0 0",fontSize:13,color:K.muted}}>{plants.length} planten · {bulbs.length} bollen & knollen</p></div>
      <div style={{display:"flex",gap:8}}><ExportBtn onClick={doExport} label="Excel"/><Button onClick={handleAdd}><Icons.plus size={14}/>Toevoegen</Button></div>
    </div>
    <SearchBar value={search} onChange={setSearch} placeholder="Zoek op naam, Latijns, type..."/>
    <div style={{display:"flex",gap:6,flexWrap:"wrap",marginBottom:16}}>
      {["alle","Vaste plant","Tweejarige","Boom/struik","Struik","Eenjarige","siergras","Bol/knol"].map(t=>(
        <button key={t} onClick={()=>setFilter(t)} style={{padding:"5px 14px",borderRadius:20,border:`1px solid ${filter===t?K.accent:K.border}`,background:filter===t?K.accentLight:"transparent",color:filter===t?K.accent:K.muted,fontSize:12,fontWeight:600,cursor:"pointer",fontFamily:"inherit"}}>
          {t==="alle"?"Alle":t}
        </button>
      ))}
    </div>
    {flt.length===0
      ?<Card><EmptyState icon={<Icons.plant size={32}/>} title="Geen resultaten" sub="Pas de zoekterm of het filter aan."/></Card>
      :<div style={{display:"grid",gridTemplateColumns:"repeat(auto-fill,minmax(260px,1fr))",gap:12}}>
        {flt.map(item=>{
          const isBulbCard=item._kind==="bulb";
          return(<Card key={`${item._kind}-${item.id}`} onClick={()=>{setSelected(item);setSelectedKind(item._kind);}} style={{cursor:"pointer",borderLeft:isBulbCard?`3px solid ${K.bulb}`:"none"}}>
            {(item.photo||item.photos?.[0])&&<div style={{width:"100%",height:120,borderRadius:8,overflow:"hidden",marginBottom:8}}><img src={item.photo||item.photos[0]} alt="" style={{width:"100%",height:"100%",objectFit:"cover"}}/></div>}
            <div style={{fontSize:15,fontWeight:600,color:K.text}}>{item.naam}</div>
            <div style={{fontSize:12,color:K.muted,fontStyle:"italic",marginBottom:6}}>{item.latijn}</div>
            <div style={{display:"flex",gap:4,flexWrap:"wrap"}}>
              <Badge color={isBulbCard?K.bulb:K.accent} bg={isBulbCard?K.bulbL:K.accentLight}>{item.type}</Badge>
              {item.kleur&&<Badge color={K.warm} bg={K.warmLight}>{item.kleur}</Badge>}
              {isBulbCard&&item.winterhard==="Nee"&&<Badge color={K.danger} bg={K.dangerLight}>Niet winterhard</Badge>}
              {!isBulbCard&&(item.photos?.length>0)&&<Badge color={K.muted} bg={K.bL}>{(item.photo?1:0)+item.photos.length} foto's</Badge>}
            </div>
            {isBulbCard&&item.plantPeriode&&<div style={{marginTop:6,fontSize:12,color:K.muted}}>Planten: {item.plantPeriode}</div>}
          </Card>);
        })}
      </div>
    }

    {/* Detail modal — plant */}
    <DetailModal item={selected&&selectedKind==="plant"?selected:null} onClose={()=>setSelected(null)} onAddPhoto={d=>addPhoto(selected.id,"plant",d)}
      fields={selected?[["Type",selected.type],["Lichtstand",selected.licht],["Hoogte",selected.hoogte?`${selected.hoogte} cm`:""],["Breedte",selected.breedte?`${selected.breedte} cm`:""],["Bloeiperiode",selected.bloeiStart?`${selected.bloeiStart} – ${selected.bloeiEind}`:""],["Bloeikleur",selected.kleur],["Inheems",selected.inheems],["Droogte",selected.droogte],["Dracht",selected.dracht],["Geur",selected.geur],["Eetbaar",selected.eetbaar],["Bessen",selected.bessen],["Per m²",selected.perM2],["Snoeien",selected.snoeien],["Oogsten",selected.oogsten]]:[]}
      extra={selected?.teler&&<div style={{marginTop:12,padding:"8px 12px",background:K.warmLight,borderRadius:8}}><div style={{fontSize:11,fontWeight:600,color:K.muted,textTransform:"uppercase"}}>Biologische telers</div><div style={{fontSize:13,color:K.text,marginTop:4}}>{selected.teler}</div></div>}
    />
    {/* Detail modal — bulb */}
    <DetailModal item={selected&&selectedKind==="bulb"?selected:null} onClose={()=>setSelected(null)} onAddPhoto={d=>addPhoto(selected.id,"bulb",d)}
      fields={selected?[["Type",selected.type],["Lichtstand",selected.licht],["Hoogte",selected.hoogte?`${selected.hoogte} cm`:""],["Bloeiperiode",selected.bloeiStart?`${selected.bloeiStart} – ${selected.bloeiEind}`:""],["Bloeikleur",selected.kleur],["Plantperiode",selected.plantPeriode],["Plantdiepte",selected.diepte],["Oprooien",selected.ropiePeriode],["Opslag",selected.opslag],["Winterhard",selected.winterhard],["Bijzonderheden",selected.bijzonderheden]]:[]}
    />

    {/* Add modal — choose type first */}
    <Modal open={showAdd&&addKind===null} onClose={()=>{setShowAdd(false);setAddKind(null);}} title="Wat wil je toevoegen?">
      <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:12,marginBottom:16}}>
        <div onClick={()=>setAddKind("plant")} style={{padding:"20px 16px",borderRadius:12,border:`2px solid ${K.border}`,cursor:"pointer",textAlign:"center",transition:"all .15s"}} onMouseEnter={e=>e.currentTarget.style.borderColor=K.accent} onMouseLeave={e=>e.currentTarget.style.borderColor=K.border}>
          <div style={{fontSize:32,marginBottom:8}}>🌿</div>
          <div style={{fontWeight:700,fontSize:14,color:K.accent}}>Sierplant</div>
          <div style={{fontSize:11,color:K.muted,marginTop:3}}>Vaste plant, eenjarige, struik...</div>
        </div>
        <div onClick={()=>setAddKind("bulb")} style={{padding:"20px 16px",borderRadius:12,border:`2px solid ${K.border}`,cursor:"pointer",textAlign:"center",transition:"all .15s"}} onMouseEnter={e=>e.currentTarget.style.borderColor=K.bulb} onMouseLeave={e=>e.currentTarget.style.borderColor=K.border}>
          <div style={{fontSize:32,marginBottom:8}}>🌷</div>
          <div style={{fontWeight:700,fontSize:14,color:K.bulb}}>Bol / Knol</div>
          <div style={{fontSize:11,color:K.muted,marginTop:3}}>Tulp, dahlia, krokus...</div>
        </div>
      </div>
      <div style={{display:"flex",justifyContent:"flex-end"}}><Button variant="secondary" onClick={()=>{setShowAdd(false);setAddKind(null);}}>Annuleren</Button></div>
    </Modal>
    <AddItemModal open={showAdd&&addKind==="plant"} onClose={()=>{setShowAdd(false);setAddKind(null);}} title="Sierplant toevoegen" description="Scan een label, etiket of foto van de plant, of voer de gegevens handmatig in." prompt={PLANT_PROMPT} fields={PLANT_FIELDS} onAdd={onAddedPlant}/>
    <AddItemModal open={showAdd&&addKind==="bulb"} onClose={()=>{setShowAdd(false);setAddKind(null);}} title="Bol / Knol toevoegen" description="Scan een label of foto, of voer handmatig in." prompt={BULB_PROMPT} fields={BULB_FIELDS} onAdd={onAddedBulb}/>
  </div>);
}

const MONTHS_NL=["Januari","Februari","Maart","April","Mei","Juni","Juli","Augustus","September","Oktober","November","December"];
const SEED_FIELDS=[
  {key:"naam",label:"Nederlandse naam",placeholder:"Bijv. Ridderspoor"},
  {key:"latijn",label:"Latijnse naam",placeholder:"Bijv. Delphinium elatum"},

const SEED_PROMPT=`Analyseer dit zadenzakje of label EXTREEM GRONDIG. Lees ALLE tekst, icoontjes, symbolen en afbeeldingen.

=== ALLERBELANGRIJKST: MAANDCIRKELS CORRECT LEZEN ===
Op zadenzakjes staan twee rijen met de 12 maandafkortingen: J F M A M J J A S O N D
(Januari, Februari, Maart, April, Mei, Juni, Juli, Augustus, September, Oktober, November, December)

Elke letter kan een INGEVULD RONDJE/CIRKEL hebben (= actieve maand) of een LEEG/OPEN rondje (= niet actief).
LET OP: Kijk naar de VULLING van het rondje/cirkel rond elke letter, NIET naar de letter zelf.
- Ingevuld/donker/dicht rondje = JA, deze maand is actief
- Leeg/open/licht rondje = NEE, deze maand is niet actief

Rij 1 (bij "Semis/Zaai" icoon) = ZAAIPERIODE
Rij 2 (bij "Floraison/Bloei" icoon) = BLOEIPERIODE

STAP VOOR STAP: Loop elke maand J,F,M,A,M,J,J,A,S,O,N,D af en bepaal of het rondje ingevuld is.
Rapporteer de EERSTE en LAATSTE ingevulde maand.

Voorbeeld Verbena bonariensis van Semailles:
- Zaairij: J(leeg) F(leeg) M(leeg) A(leeg) M(leeg) J(VOL) J(VOL) A(VOL) S(leeg)... = zaai Juni t/m Augustus  
- Bloeirij: J(leeg) F(leeg) M(leeg) A(leeg) M(leeg) J(VOL) J(VOL) A(VOL) S(VOL) O(VOL) N(VOL) D(leeg) = bloei Juni t/m November

=== SOORT/TYPE CORRECT LEZEN ===
- Icoontje met potje + "Vivace" of "Meerjarige" = dit is een VASTE PLANT. Vul "Vaste plant" in bij soort.
- "Annuelle"/"Eenjarige" = Eenjarige
- "Bisannuelle"/"Tweejarige" = Tweejarige  
- LET OP: Verbena bonariensis is een vaste plant die in koude klimaten als eenjarige wordt geteeld, maar als het label "Vivace/Meerjarige" zegt, gebruik dan "Vaste plant".

=== OVERIGE SYMBOLEN ===
- Bloem met bij + "Mellifère"/"Honingrijk" = drachtplant, trekt bijen/vlinders aan
- Thermometer icoon = kiemtemperatuur
- Klok/timer icoon = kiemtijd in dagen
- Hoogte-icoon met cm = planthoogte
- Zon-icoon = standplaats (zon/halfschaduw/schaduw)
- "Bio" / EU bio-logo / "Semences bio" = biologisch gecertificeerd
- "Pleine terre / In de grond" en "Godet / Potje" = zaaimethode

Geef JSON (alleen JSON, GEEN markdown backticks, GEEN uitleg):
{"naam":"Nederlandse naam","latijn":"Latijnse naam","soort":"Eenjarige/Tweejarige/Vaste plant/Groente/Kruid/Snijbloem - Vivace=Vaste plant!","zaaiStart":"EERSTE maand met ingevuld rondje in zaairij, volledige NL naam","zaaiEind":"LAATSTE maand met ingevuld rondje in zaairij, volledige NL naam","zaaiMethode":"Binnen/Buiten/Kas/Binnen + later buiten","kiemsoort":"Lichtkiem/Donkerkiem/Koukiem/Warmtekiem","kiemtemperatuur":"graden","kiemtijd":"dagen","zaaidiepte":"mm of cm - oppervlakkig als lichtkiem","zaaiafstand":"cm","standplaats":"Zon/Zon-Halfschaduw/Halfschaduw/Schaduw","grondsoort":"voorkeur","hoogte":"cm","breedte":"cm","verspeenMoment":"wanneer","uitplantMoment":"wanneer","bloeiStart":"EERSTE maand met ingevuld rondje in bloeirij, volledige NL naam","bloeiEind":"LAATSTE maand met ingevuld rondje in bloeirij, volledige NL naam","kleur":"bloeikleur","oogstperiode":"wanneer","winterhard":"Ja/Nee/Beperkt","bijzonderheden":"alle overige info: bio-certificering, honingrijk, beschrijvende tekst, etc.","houdbaarheid":"THT/validité datum indien zichtbaar","leverancier":"merk/leverancier"}
Combineer foto-info MET eigen kennis. Geef volledige Nederlandse maandnamen.`;

const SEED_LABELS={soort:"Soort",zaaiStart:"Zaai start",zaaiEind:"Zaai eind",zaaiMethode:"Methode",kiemsoort:"Kiemsoort",kiemtemperatuur:"Kiemtemp.",kiemtijd:"Kiemtijd",zaaidiepte:"Zaaidiepte",zaaiafstand:"Zaaiafstand",standplaats:"Standplaats",grondsoort:"Grond",hoogte:"Hoogte",breedte:"Breedte",verspeenMoment:"Verspenen",uitplantMoment:"Uitplanten",bloeiStart:"Bloei start",bloeiEind:"Bloei eind",kleur:"Kleur",oogstperiode:"Oogst",winterhard:"Winterhard",bijzonderheden:"Bijzonderheden",houdbaarheid:"Houdbaarheid",leverancier:"Leverancier"};

function SeedTab({seeds,setSeeds,onAfterAdd}){
  const [search,setSearch]=useState("");
  const [selected,setSelected]=useState(null);
  const [showAdd,setShowAdd]=useState(false);
  const flt=seeds.filter(s=>{const q=search.toLowerCase();return!q||s.naam?.toLowerCase().includes(q)||s.latijn?.toLowerCase().includes(q);});
  function onAdded(formData,images){const ns={id:Date.now(),...formData,photo:images?.[0]||null,photos:images?.slice(1)||[]};setSeeds(p=>[...p,ns]);onAfterAdd&&onAfterAdd(ns);}
  function del(id){setSeeds(p=>p.filter(s=>s.id!==id));setSelected(null);}

  function exportSeeds(){exportToExcel("Zaden",["Naam","Latijns","Soort","Zaai start","Zaai eind","Methode","Kiemsoort","Kiemtemp.","Kiemtijd","Zaaidiepte","Zaaiafstand","Standplaats","Grond","Hoogte","Breedte","Verspenen","Uitplanten","Bloei start","Bloei eind","Kleur","Oogst","Winterhard","Bijzonderheden","Houdbaarheid","Leverancier"],seeds.map(s=>[s.naam,s.latijn,s.soort,s.zaaiStart,s.zaaiEind,s.zaaiMethode,s.kiemsoort,s.kiemtemperatuur,s.kiemtijd,s.zaaidiepte,s.zaaiafstand,s.standplaats,s.grondsoort,s.hoogte,s.breedte,s.verspeenMoment,s.uitplantMoment,s.bloeiStart,s.bloeiEind,s.kleur,s.oogstperiode,s.winterhard,s.bijzonderheden,s.houdbaarheid,s.leverancier].map(v=>v||"")),"Zaden_inventaris");}

  return(<div>
    <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:16}}><div><h2 style={{margin:0,fontSize:22,color:K.text}}>Zadenbank</h2><p style={{margin:"4px 0 0",fontSize:13,color:K.muted}}>{seeds.length} soorten</p></div><div style={{display:"flex",gap:8}}><ExportBtn onClick={exportSeeds} label="Excel"/><Button onClick={()=>setShowAdd(true)} style={{background:K.warm}}><Icons.plus size={14}/>Zaad toevoegen</Button></div></div>
    <SearchBar value={search} onChange={setSearch} placeholder="Zoek zaden..."/>
    {flt.length===0?<Card><EmptyState icon={<Icons.seed size={32}/>} title={seeds.length===0?"Nog geen zaden":"Geen resultaten"} sub={seeds.length===0?"Voeg een zaad toe om te beginnen.":"Andere zoekterm."}/></Card>:
    <div style={{display:"grid",gridTemplateColumns:"repeat(auto-fill,minmax(260px,1fr))",gap:12}}>
      {flt.map(s=><Card key={s.id} onClick={()=>setSelected(s)} style={{cursor:"pointer"}}>
        {s.photo&&<div style={{width:"100%",height:100,borderRadius:8,overflow:"hidden",marginBottom:8}}><img src={s.photo} alt="" style={{width:"100%",height:"100%",objectFit:"cover"}}/></div>}
        <div style={{fontSize:15,fontWeight:600,color:K.text}}>{s.naam||"Onbekend"}</div>
        <div style={{fontSize:12,color:K.muted,fontStyle:"italic",marginBottom:6}}>{s.latijn}</div>
        <div style={{display:"flex",gap:4,flexWrap:"wrap"}}>{s.soort&&<Badge>{s.soort}</Badge>}{s.kiemsoort&&<Badge color={K.warm} bg={K.warmLight}>{s.kiemsoort}</Badge>}</div>
        {s.zaaiStart&&<div style={{marginTop:6,fontSize:12,color:K.muted}}>Zaaien: {s.zaaiStart}{s.zaaiEind?` – ${s.zaaiEind}`:""}</div>}
      </Card>)}
    </div>}
    <Modal open={!!selected} onClose={()=>setSelected(null)} title={selected?.naam||"Zaaddetails"} wide>
      {selected&&<div>
        {selected.photo&&<img src={selected.photo} alt="" style={{width:"100%",maxHeight:200,objectFit:"contain",borderRadius:8,marginBottom:16}}/>}
        <div style={{fontSize:14,fontStyle:"italic",color:K.muted,marginBottom:12}}>{selected.latijn}</div>
        <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:8}}>{Object.entries(SEED_LABELS).map(([k,l])=>{const v=selected[k];if(!v)return null;return<div key={k} style={{padding:"8px 12px",background:K.bL,borderRadius:8}}><div style={{fontSize:11,fontWeight:600,color:K.muted,textTransform:"uppercase",letterSpacing:.3}}>{l}</div><div style={{fontSize:14,color:K.text,marginTop:2}}>{v}</div></div>;})}</div>
        <div style={{display:"flex",gap:8,justifyContent:"flex-end",marginTop:16}}><Button variant="danger" onClick={()=>del(selected.id)}><Icons.trash size={14}/>Verwijderen</Button></div>
      </div>}
    </Modal>
    <AddItemModal open={showAdd} onClose={()=>setShowAdd(false)} title="Zaad toevoegen" description="Scan een zadenzakje of voer handmatig in. Claude vult de velden in met kennis over de soort." prompt={SEED_PROMPT} fields={SEED_FIELDS} onAdd={onAdded}/>
  </div>);
}

// GENERIC SIMPLE TAB (reusable for Bomen, Vijver, Moestuin)
// ═══════════════════════════════════════════════════════════════════
function SimpleInventoryTab({title,icon,accentColor,accentBg,items,setItems,fields,prompt,exportName,exportHeaders,exportRow,emptyIcon,emptyTitle,emptyAdd,addTitle,addDesc,searchPlaceholder,onAfterAdd}){
  const [search,setSearch]=useState("");
  const [selected,setSelected]=useState(null);
  const [showAdd,setShowAdd]=useState(false);
  const flt=items.filter(s=>{const q=search.toLowerCase();return!q||s.naam?.toLowerCase().includes(q)||s.latijn?.toLowerCase().includes(q);});
  function addPhoto(id,d){setItems(p=>p.map(x=>x.id===id?{...x,photos:[...(x.photos||[]),d]}:x));if(selected?.id===id)setSelected(p=>({...p,photos:[...(p.photos||[]),d]}));}
  function onAdded(formData,images){const ni={id:Date.now(),...formData,photo:images?.[0]||null,photos:images?.slice(1)||[]};setItems(p=>[...p,ni]);onAfterAdd&&onAfterAdd(ni);}
  function del(id){setItems(p=>p.filter(s=>s.id!==id));setSelected(null);}
  function doExport(){exportToExcel(exportName,exportHeaders,items.map(exportRow),exportName+"_inventaris");}

  // Build detail fields dynamically from fields config
  const detailFields=selected?fields.filter(f=>f.key!=="naam"&&f.key!=="latijn").map(f=>[f.label,selected[f.key]]).filter(([,v])=>v):[];

  return(<div>
    <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:16}}>
      <div><h2 style={{margin:0,fontSize:22,color:K.text}}>{title}</h2><p style={{margin:"4px 0 0",fontSize:13,color:K.muted}}>{items.length} soorten</p></div>
      <div style={{display:"flex",gap:8}}><ExportBtn onClick={doExport} label="Excel"/><Button onClick={()=>setShowAdd(true)} style={{background:accentColor}}><Icons.plus size={14}/>Soort toevoegen</Button></div>
    </div>
    <SearchBar value={search} onChange={setSearch} placeholder={searchPlaceholder||"Zoeken..."}/>
    {flt.length===0?<Card><EmptyState icon={emptyIcon} title={items.length===0?emptyTitle:"Geen resultaten"} sub={items.length===0?emptyAdd:"Andere zoekterm."}/></Card>:
    <div style={{display:"grid",gridTemplateColumns:"repeat(auto-fill,minmax(260px,1fr))",gap:12}}>
      {flt.map(s=><Card key={s.id} onClick={()=>setSelected(s)} style={{cursor:"pointer",borderLeft:`3px solid ${accentColor}`}}>
        {(s.photo||s.photos?.[0])&&<div style={{width:"100%",height:120,borderRadius:8,overflow:"hidden",marginBottom:8}}><img src={s.photo||s.photos[0]} alt="" style={{width:"100%",height:"100%",objectFit:"cover"}}/></div>}
        <div style={{fontSize:15,fontWeight:600,color:K.text}}>{s.naam}</div>
        <div style={{fontSize:12,color:K.muted,fontStyle:"italic",marginBottom:6}}>{s.latijn}</div>
        <div style={{display:"flex",gap:4,flexWrap:"wrap"}}>
          {s.type&&<Badge color={accentColor} bg={accentBg}>{s.type}</Badge>}
          {s.kleur&&<Badge color={K.warm} bg={K.warmLight}>{s.kleur}</Badge>}
          {s.winterhard==="Nee"&&<Badge color={K.danger} bg={K.dangerLight}>Niet winterhard</Badge>}
        </div>
        {s.bloeiStart&&<div style={{marginTop:6,fontSize:12,color:K.muted}}>Bloei: {s.bloeiStart}–{s.bloeiEind}</div>}
      </Card>)}
    </div>}
    <DetailModal item={selected} onClose={()=>setSelected(null)} onAddPhoto={d=>addPhoto(selected.id,d)} fields={detailFields}
      extra={<div style={{display:"flex",gap:8,justifyContent:"flex-end",marginTop:16}}><Button variant="danger" onClick={()=>del(selected.id)}><Icons.trash size={14}/>Verwijderen</Button></div>}
    />
    <AddItemModal open={showAdd} onClose={()=>setShowAdd(false)} title={addTitle} description={addDesc} prompt={prompt} fields={fields} onAdd={onAdded}/>
  </div>);
}

// TAB 8: WISHLIST
// ═══════════════════════════════════════════════════════════════════
function WishlistTab({wishlist,setWishlist}){
  const [showAdd,setShowAdd]=useState(false);
  const [search,setSearch]=useState("");
  const [selected,setSelected]=useState(null);
  const [form,setForm]=useState({naam:"",latijn:"",categorie:"",notitie:"",photo:null});
  const [imgPreview,setImgPreview]=useState(null);
  const fr=React.useRef();
  const CATS=["Sierplant","Bol/knol","Boom/struik","Vijverplant","Moestuin","Anders"];

  function handleImg(e){
    const f=e.target.files?.[0];if(!f)return;
    const r=new FileReader();r.onload=ev=>{setImgPreview(ev.target.result);setForm(p=>({...p,photo:ev.target.result}));};r.readAsDataURL(f);e.target.value="";
  }
  function save(){
    if(!form.naam.trim())return;
    setWishlist(p=>[...p,{id:Date.now(),...form}]);
    setForm({naam:"",latijn:"",categorie:"",notitie:"",photo:null});
    setImgPreview(null);
    setShowAdd(false);
  }
  function del(id){setWishlist(p=>p.filter(x=>x.id!==id));setSelected(null);}
  function markDone(id){setWishlist(p=>p.map(x=>x.id===id?{...x,done:!x.done}:x));}

  const flt=wishlist.filter(w=>{const q=search.toLowerCase();return!q||w.naam?.toLowerCase().includes(q)||w.latijn?.toLowerCase().includes(q)||w.categorie?.toLowerCase().includes(q);});
  const open=flt.filter(w=>!w.done);
  const done=flt.filter(w=>w.done);

  const WishCard=({w})=>(
    <Card onClick={()=>setSelected(w)} style={{cursor:"pointer",borderLeft:`3px solid ${w.done?K.muted:K.wish}`,opacity:w.done?.7:1}}>
      {w.photo&&<div style={{width:"100%",height:130,borderRadius:8,overflow:"hidden",marginBottom:8}}><img src={w.photo} alt="" style={{width:"100%",height:"100%",objectFit:"cover"}}/></div>}
      <div style={{display:"flex",justifyContent:"space-between",alignItems:"flex-start",gap:8}}>
        <div style={{flex:1,minWidth:0}}>
          <div style={{fontSize:15,fontWeight:600,color:w.done?K.muted:K.text,textDecoration:w.done?"line-through":"none"}}>{w.naam}</div>
          {w.latijn&&<div style={{fontSize:12,color:K.muted,fontStyle:"italic"}}>{w.latijn}</div>}
          <div style={{display:"flex",gap:4,flexWrap:"wrap",marginTop:5}}>
            {w.categorie&&<Badge color={K.wish} bg={K.wishL}>{w.categorie}</Badge>}
            {w.done&&<Badge color={K.muted} bg={K.bL}>Verkregen ✓</Badge>}
          </div>
          {w.notitie&&<div style={{fontSize:12,color:K.muted,marginTop:5,fontStyle:"italic"}}>"{w.notitie}"</div>}
        </div>
      </div>
    </Card>

  return(<div>

      <div>
        <h2 style={{margin:0,fontSize:22,color:K.text}}>Wishlist</h2>
        <p style={{margin:"4px 0 0",fontSize:13,color:K.muted}}>{open.length} gewenst · {done.length} verkregen</p>
      </div>
      <Button onClick={()=>setShowAdd(true)} style={{background:K.wish}}><Icons.plus size={14}/>Soort toevoegen</Button>
    </div>
    <SearchBar value={search} onChange={setSearch} placeholder="Zoek op naam, Latijns, categorie..."/>

    {open.length===0&&done.length===0&&<Card><EmptyState icon={<Icons.heart size={32} color={K.wish}/>} title="Je wishlist is leeg" sub="Voeg soorten toe die je nog wilt aanschaffen."/></Card>}

    {open.length>0&&<>
      <div style={{fontSize:12,fontWeight:700,color:K.wish,textTransform:"uppercase",letterSpacing:.5,marginBottom:10}}>🌱 Nog te verkrijgen ({open.length})</div>
      <div style={{display:"grid",gridTemplateColumns:"repeat(auto-fill,minmax(240px,1fr))",gap:12,marginBottom:24}}>
        {open.map(w=><WishCard key={w.id} w={w}/>)}

    </>}

    {done.length>0&&<>
      <div style={{fontSize:12,fontWeight:700,color:K.muted,textTransform:"uppercase",letterSpacing:.5,marginBottom:10}}>✓ Verkregen ({done.length})</div>
      <div style={{display:"grid",gridTemplateColumns:"repeat(auto-fill,minmax(240px,1fr))",gap:12}}>

          </div>
          :<div onClick={()=>fr.current?.click()} style={{width:"100%",height:100,borderRadius:10,border:`2px dashed ${K.wish}`,display:"flex",flexDirection:"column",alignItems:"center",justifyContent:"center",cursor:"pointer",background:K.wishL,gap:6}}>

        <Button variant="secondary" onClick={()=>{setShowAdd(false);setImgPreview(null);setForm({naam:"",latijn:"",categorie:"",notitie:"",photo:null});}}>Annuleren</Button>
