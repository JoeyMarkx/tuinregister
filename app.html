const BEGROTING_CATS=[
  "Planten & bollen","Bomen & struiken","Grond & mulch","Gereedschap","Bestrating & paden",
  "Vijver & water","Verlichting","Meubels & decoratie","Hek & omheining","Kas & tunnel","Overig"
];
const BUDGET_COLOR="#1a6b5a";
const BUDGET_LIGHT="#d4f0ea";

function BegrotingBudgetTab({begroting,setBegroting,budget,setBudget}){
  const [view,setView]=useState("begroting"); // "begroting" | "tracking"
  // ── BEGROTING state ──
  const [bgForm,setBgForm]=useState({omschrijving:"",categorie:BEGROTING_CATS[0],bedrag:""});
  const [bgEditId,setBgEditId]=useState(null);
  const [bgEditForm,setBgEditForm]=useState({});
  const fileRef=useRef();

  // ── BUDGET TRACKING state ──
  const [btForm,setBtForm]=useState({omschrijving:"",categorie:BEGROTING_CATS[0],bedrag:"",datum:today(),nota:null});
  const [btPreview,setBtPreview]=useState(null);
  const [btStep,setBtStep]=useState("form"); // "form" | "done"
  const [showBtAdd,setShowBtAdd]=useState(false);
  const btFileRef=useRef();
  const [btViewImg,setBtViewImg]=useState(null);

  // ── BEGROTING helpers ──
  const bgTotal=begroting.reduce((s,r)=>s+(parseFloat(r.bedrag)||0),0);
  const bgByCat=BEGROTING_CATS.map(c=>({
    cat:c,
    items:begroting.filter(r=>r.categorie===c),
    total:begroting.filter(r=>r.categorie===c).reduce((s,r)=>s+(parseFloat(r.bedrag)||0),0)
  })).filter(g=>g.items.length>0);

  function addBgItem(){
    if(!bgForm.omschrijving.trim()||!bgForm.bedrag) return;
    setBegroting(p=>[...p,{id:uid(),omschrijving:bgForm.omschrijving,categorie:bgForm.categorie,bedrag:parseFloat(bgForm.bedrag)||0}]);
    setBgForm(p=>({...p,omschrijving:"",bedrag:""}));
  }
  function delBgItem(id){setBegroting(p=>p.filter(r=>r.id!==id));}
  function saveBgEdit(){
    setBegroting(p=>p.map(r=>r.id===bgEditId?{...r,...bgEditForm}:r));
    setBgEditId(null);
  }

  // ── BUDGET TRACKING helpers ──
  const btTotal=budget.reduce((s,r)=>s+(parseFloat(r.bedrag)||0),0);
  const bgTotalForTrack=bgTotal;

  function handleNotaFile(e){
    const f=e.target.files?.[0]; if(!f) return;
    const r=new FileReader();
    r.onload=ev=>{setBtForm(p=>({...p,nota:ev.target.result}));setBtPreview(ev.target.result);};
    r.readAsDataURL(f);
    e.target.value="";
  }
  function addBtItem(){
    if(!btForm.omschrijving.trim()||!btForm.bedrag) return;
    setBudget(p=>[...p,{id:uid(),omschrijving:btForm.omschrijving,categorie:btForm.categorie,bedrag:parseFloat(btForm.bedrag)||0,datum:btForm.datum,nota:btForm.nota||null}]);
    setBtForm({omschrijving:"",categorie:BEGROTING_CATS[0],bedrag:"",datum:today(),nota:null});
    setBtPreview(null);
    setShowBtAdd(false);
  }
  function delBtItem(id){setBudget(p=>p.filter(r=>r.id!==id));}

  const btByCat=BEGROTING_CATS.map(c=>({
    cat:c,
    items:budget.filter(r=>r.categorie===c),
    total:budget.filter(r=>r.categorie===c).reduce((s,r)=>s+(parseFloat(r.bedrag)||0),0)
  })).filter(g=>g.items.length>0);

  const remaining=bgTotal-btTotal;

  return(<div>
    {/* Toggle */}
    <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:16,flexWrap:"wrap",gap:8}}>
      <div style={{display:"inline-flex",background:"#fff",border:`1px solid ${K.border}`,borderRadius:10,padding:3,gap:3}}>
        {[["begroting","📋 Begroting"],["tracking","💸 Budget tracking"]].map(([v,l])=>(
          <button key={v} onClick={()=>setView(v)} style={{
            padding:"7px 16px",borderRadius:7,border:"none",cursor:"pointer",
            background:view===v?BUDGET_COLOR:"transparent",
            color:view===v?"#fff":K.muted,
            fontSize:12,fontWeight:view===v?700:500,fontFamily:"inherit",transition:"all .15s"
          }}>{l}</button>
        ))}
      </div>
    </div>

    {/* ══ BEGROTING VIEW ══ */}
    {view==="begroting"&&<>
      {/* Summary card */}
      <div style={{background:BUDGET_COLOR,borderRadius:12,padding:"14px 18px",marginBottom:16,color:"#fff",display:"flex",justifyContent:"space-between",alignItems:"center"}}>
        <div>
          <div style={{fontSize:11,opacity:.75,fontWeight:600,letterSpacing:.5,textTransform:"uppercase"}}>Totaal begroot</div>
          <div style={{fontSize:28,fontWeight:800,marginTop:2}}>€ {bgTotal.toFixed(2).replace(".",",")}</div>
        </div>
        <div style={{fontSize:32,opacity:.4}}>📋</div>
      </div>

      {/* Add form */}
      <Card style={{marginBottom:16}}>
        <div style={{fontSize:12,fontWeight:700,color:K.muted,textTransform:"uppercase",letterSpacing:.5,marginBottom:10}}>Kostenpost toevoegen</div>
        <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:"0 12px"}}>
          <div style={{gridColumn:"1/-1"}}>
            <Input label="Omschrijving" value={bgForm.omschrijving} onChange={e=>setBgForm(p=>({...p,omschrijving:e.target.value}))} placeholder="Bijv. Vaste planten vak A"/>
          </div>
          <Select label="Categorie" value={bgForm.categorie} onChange={e=>setBgForm(p=>({...p,categorie:e.target.value}))} options={BEGROTING_CATS.map(c=>({value:c,label:c}))}/>
          <Input label="Bedrag (€)" type="number" min="0" step="0.01" value={bgForm.bedrag} onChange={e=>setBgForm(p=>({...p,bedrag:e.target.value}))} placeholder="0,00"/>
        </div>
        <div style={{display:"flex",justifyContent:"flex-end",marginTop:4}}>
          <Button onClick={addBgItem} style={{background:BUDGET_COLOR}} disabled={!bgForm.omschrijving.trim()||!bgForm.bedrag}><Icons.plus size={14}/>Toevoegen</Button>
        </div>
      </Card>

      {/* Grouped by category */}
      {begroting.length===0&&<Card><EmptyState icon={<span style={{fontSize:32}}>📋</span>} title="Geen kostenposten" sub="Voeg een kostenpost toe om te beginnen."/></Card>}
      {bgByCat.map(g=>(
        <Card key={g.cat} style={{marginBottom:10}}>
          <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:8}}>
            <span style={{fontSize:13,fontWeight:700,color:BUDGET_COLOR}}>{g.cat}</span>
            <span style={{fontSize:13,fontWeight:700,color:BUDGET_COLOR}}>€ {g.total.toFixed(2).replace(".",",")}</span>
          </div>
          <div style={{display:"flex",flexDirection:"column",gap:5}}>
            {g.items.map(r=>(
              <div key={r.id} style={{display:"flex",alignItems:"center",gap:8,padding:"6px 10px",background:K.bL,borderRadius:7}}>
                {bgEditId===r.id
                  ?<>
                    <input value={bgEditForm.omschrijving||""} onChange={e=>setBgEditForm(p=>({...p,omschrijving:e.target.value}))}
                      style={{flex:1,padding:"5px 8px",border:`1px solid ${K.border}`,borderRadius:6,fontSize:13,fontFamily:"inherit"}}/>
                    <input type="number" value={bgEditForm.bedrag||""} onChange={e=>setBgEditForm(p=>({...p,bedrag:e.target.value}))}
                      style={{width:90,padding:"5px 8px",border:`1px solid ${K.border}`,borderRadius:6,fontSize:13,fontFamily:"inherit"}}/>
                    <button onClick={saveBgEdit} style={{padding:"4px 10px",borderRadius:6,border:"none",background:BUDGET_COLOR,color:"#fff",fontSize:12,cursor:"pointer",fontFamily:"inherit"}}>✓</button>
                    <button onClick={()=>setBgEditId(null)} style={{padding:"4px 8px",borderRadius:6,border:`1px solid ${K.border}`,background:"#fff",fontSize:12,cursor:"pointer",fontFamily:"inherit"}}>✕</button>
                  </>
                  :<>
                    <span style={{flex:1,fontSize:13,color:K.text}}>{r.omschrijving}</span>
                    <span style={{fontSize:13,fontWeight:600,color:BUDGET_COLOR,minWidth:70,textAlign:"right"}}>€ {parseFloat(r.bedrag||0).toFixed(2).replace(".",",")}</span>
                    <button onClick={()=>{setBgEditId(r.id);setBgEditForm({omschrijving:r.omschrijving,bedrag:r.bedrag});}} style={{background:"none",border:"none",cursor:"pointer",padding:2,color:K.muted,display:"flex",alignItems:"center"}} title="Bewerken"><Icons.edit size={14}/></button>
                    <button onClick={()=>delBgItem(r.id)} style={{background:"none",border:"none",cursor:"pointer",padding:2,color:K.danger,display:"flex",alignItems:"center"}} title="Verwijderen"><Icons.trash size={14}/></button>
                  </>
                }
              </div>
            ))}
          </div>
          <div style={{display:"flex",justifyContent:"flex-end",marginTop:6,paddingTop:6,borderTop:`1px solid ${K.border}`}}>
            <span style={{fontSize:12,fontWeight:600,color:K.muted}}>Subtotaal: <strong style={{color:BUDGET_COLOR}}>€ {g.total.toFixed(2).replace(".",",")}</strong></span>
          </div>
        </Card>
      ))}
      {begroting.length>0&&<Card style={{background:BUDGET_COLOR,color:"#fff"}}>
        <div style={{display:"flex",justifyContent:"space-between",alignItems:"center"}}>
          <span style={{fontSize:14,fontWeight:700}}>🏷️ Totaal begroting</span>
          <span style={{fontSize:22,fontWeight:800}}>€ {bgTotal.toFixed(2).replace(".",",")}</span>
        </div>
      </Card>}
    </>}

    {/* ══ BUDGET TRACKING VIEW ══ */}
    {view==="tracking"&&<>
      {/* Summary cards */}
      <div style={{display:"grid",gridTemplateColumns:"1fr 1fr 1fr",gap:8,marginBottom:16}}>

      {bgTotalForTrack>0&&<div style={{marginBottom:14}}>
        <div style={{display:"flex",justifyContent:"space-between",fontSize:11,color:K.muted,marginBottom:4}}>
          <span>Budget verbruikt</span>
          <span>{Math.min(100,Math.round((btTotal/bgTotalForTrack)*100))}%</span>
        </div>
        <div style={{height:10,background:K.border,borderRadius:6,overflow:"hidden"}}>
          <div style={{height:"100%",width:`${Math.min(100,(btTotal/bgTotalForTrack)*100)}%`,background:btTotal>bgTotalForTrack?"#8B2020":BUDGET_COLOR,borderRadius:6,transition:"width .4s"}}/>
        </div>
      </div>}

      {/* Add cost button */}
      <Button onClick={()=>setShowBtAdd(true)} style={{background:BUDGET_COLOR,marginBottom:16,width:"100%",justifyContent:"center"}}><Icons.plus size={14}/>Kosten afschrijven</Button>

      {budget.length===0&&<Card><EmptyState icon={<span style={{fontSize:32}}>💸</span>} title="Geen kosten geboekt" sub="Gebruik 'Kosten afschrijven' om een factuur of bonnetje te verwerken."/></Card>}

      {/* Per category groups */}
      {btByCat.map(g=>(
        <Card key={g.cat} style={{marginBottom:10}}>
          <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:8}}>
            <span style={{fontSize:13,fontWeight:700,color:"#c44a2a"}}>{g.cat}</span>
            <span style={{fontSize:13,fontWeight:700,color:"#c44a2a"}}>€ {g.total.toFixed(2).replace(".",",")}</span>
          </div>
          <div style={{display:"flex",flexDirection:"column",gap:5}}>
            {g.items.map(r=>(
              <div key={r.id} style={{display:"flex",alignItems:"center",gap:8,padding:"7px 10px",background:K.bL,borderRadius:7}}>
                {r.nota&&<img src={r.nota} alt="nota" onClick={()=>setBtViewImg(r.nota)} style={{width:32,height:32,objectFit:"cover",borderRadius:5,cursor:"pointer",border:`1px solid ${K.border}`,flexShrink:0}}/>}
                <div style={{flex:1,minWidth:0}}>
                  <div style={{fontSize:13,fontWeight:600,color:K.text,overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>{r.omschrijving}</div>
                  <div style={{fontSize:11,color:K.muted}}>{r.datum}</div>
                </div>
                <span style={{fontSize:13,fontWeight:600,color:"#c44a2a",minWidth:70,textAlign:"right"}}>€ {parseFloat(r.bedrag||0).toFixed(2).replace(".",",")}</span>
                <button onClick={()=>delBtItem(r.id)} style={{background:"none",border:"none",cursor:"pointer",padding:2,color:K.danger,display:"flex",alignItems:"center"}} title="Verwijderen"><Icons.trash size={14}/></button>
              </div>
            ))}
          </div>
        </Card>
      ))}

      {budget.length>0&&<Card style={{background:"#c44a2a",color:"#fff"}}>
        <div style={{display:"flex",justifyContent:"space-between",alignItems:"center"}}>
          <span style={{fontSize:14,fontWeight:700}}>💸 Totaal uitgegeven</span>
          <span style={{fontSize:22,fontWeight:800}}>€ {btTotal.toFixed(2).replace(".",",")}</span>
        </div>
      </Card>}

      {/* Add cost modal */}
      <Modal open={showBtAdd} onClose={()=>{setShowBtAdd(false);setBtForm({omschrijving:"",categorie:BEGROTING_CATS[0],bedrag:"",datum:today(),nota:null});setBtPreview(null);}} title="Kosten afschrijven">
        <div style={{fontSize:13,color:K.muted,marginBottom:14}}>Voeg een factuur of bonnetje toe. Je kunt in meerdere stappen kosten afschrijven.</div>
        {/* Receipt upload */}
        <div style={{marginBottom:12}}>
          <label style={{display:"block",fontSize:11,fontWeight:700,color:K.muted,marginBottom:5,textTransform:"uppercase",letterSpacing:.3}}>Factuur / bonnetje (optioneel)</label>
          {btPreview
            ?<div style={{position:"relative",marginBottom:8}}>
                <img src={btPreview} alt="" style={{width:"100%",maxHeight:180,objectFit:"contain",borderRadius:8,border:`1px solid ${K.border}`,background:"#f5f5f5"}}/>
                <button onClick={()=>{setBtPreview(null);setBtForm(p=>({...p,nota:null}));}} style={{position:"absolute",top:6,right:6,background:"rgba(0,0,0,.55)",border:"none",borderRadius:"50%",width:26,height:26,cursor:"pointer",display:"flex",alignItems:"center",justifyContent:"center"}}><Icons.x size={13} color="#fff"/></button>
              </div>
            :<div onClick={()=>btFileRef.current?.click()} style={{width:"100%",padding:"18px 0",borderRadius:8,border:`2px dashed ${K.border}`,display:"flex",flexDirection:"column",alignItems:"center",gap:6,cursor:"pointer",background:K.bL,marginBottom:8}}>
                <Icons.camera size={24} color={K.muted}/>
                <span style={{fontSize:12,color:K.muted}}>Klik om foto/scan toe te voegen</span>
              </div>
          }
          <input ref={btFileRef} type="file" accept="image/*,application/pdf" capture="environment" onChange={handleNotaFile} style={{display:"none"}}/>
        </div>
        <Input label="Omschrijving" value={btForm.omschrijving} onChange={e=>setBtForm(p=>({...p,omschrijving:e.target.value}))} placeholder="Bijv. Planten Kwekerij Jansen"/>
        <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:12}}>
          <Input label="Bedrag (€)" type="number" min="0" step="0.01" value={btForm.bedrag} onChange={e=>setBtForm(p=>({...p,bedrag:e.target.value}))} placeholder="0,00"/>
          <Input label="Datum" type="date" value={btForm.datum} onChange={e=>setBtForm(p=>({...p,datum:e.target.value}))}/>
        </div>
        <Select label="Categorie" value={btForm.categorie} onChange={e=>setBtForm(p=>({...p,categorie:e.target.value}))} options={BEGROTING_CATS.map(c=>({value:c,label:c}))}/>
        <div style={{display:"flex",gap:8,justifyContent:"flex-end",marginTop:8}}>
          <Button variant="secondary" onClick={()=>{setShowBtAdd(false);setBtForm({omschrijving:"",categorie:BEGROTING_CATS[0],bedrag:"",datum:today(),nota:null});setBtPreview(null);}}>Annuleren</Button>
          <Button onClick={addBtItem} style={{background:"#c44a2a"}} disabled={!btForm.omschrijving.trim()||!btForm.bedrag}><Icons.check size={14}/>Afschrijven</Button>
        </div>
      </Modal>

      {/* Image lightbox for nota */}
      {btViewImg&&<div style={{position:"fixed",inset:0,background:"rgba(0,0,0,.88)",zIndex:3000,display:"flex",alignItems:"center",justifyContent:"center"}} onClick={()=>setBtViewImg(null)}>
        <img src={btViewImg} alt="" style={{maxWidth:"92vw",maxHeight:"88vh",borderRadius:8,objectFit:"contain"}}/>
        <button onClick={()=>setBtViewImg(null)} style={{position:"absolute",top:14,right:14,background:"rgba(255,255,255,.15)",border:"none",borderRadius:"50%",width:34,height:34,cursor:"pointer",display:"flex",alignItems:"center",justifyContent:"center"}}><Icons.x color="#fff"/></button>
      </div>}
    </>}
  </div>);
}

// TAB 8: WISHLIST
// ═══════════════════════════════════════════════════════════════════
const MOODBOARD_CATS=[
  "Bloemen","Bomen","Struiken","Klimplanten","Grassen","Bollen & knollen",
  "Moestuin","Kleinfruit","Vijver","Stenen & grind","Schors & mulch",
  "Hek & omheining","Kas & tunnel","Meubels & decoratie","Paden","Anders"
];

function MoodboardWishlistTab({wishlist,setWishlist,moodboard,setMoodboard}){
  const [view,setView]=useState("moodboard"); // "moodboard" | "wishlist"
  // ── MOODBOARD ──
  const [mbCat,setMbCat]=useState("alle");
  const [mbSelected,setMbSelected]=useState(null);
  const [showMbAdd,setShowMbAdd]=useState(false);
  const [mbForm,setMbForm]=useState({categorie:"",notitie:""});
  const [mbPreview,setMbPreview]=useState(null);
  const mbFr=React.useRef();
  // Crop queue: array of {dataUrl, categorie}; shown one by one
  const [cropQueue,setCropQueue]=useState([]); // [{dataUrl,categorie}]
  const [cropCurrent,setCropCurrent]=useState(null); // {dataUrl,categorie,posX,posY,dragging,dragStartX,dragStartY,startPosX,startPosY}
  const cropRef=React.useRef();

  const mbFiltered=mbCat==="alle"?moodboard:moodboard.filter(m=>m.categorie===mbCat);

  function handleMbImg(e){
    const files=Array.from(e.target.files||[]);
    if(!files.length) return;
    const loaded=[];
    let count=0;
    files.forEach((f,i)=>{
      const r=new FileReader();
      r.onload=ev=>{
        loaded[i]={dataUrl:ev.target.result,categorie:mbForm.categorie||"Anders"};
        count++;
        if(count===files.length){
          // Start crop queue
          setCropQueue(loaded.slice(1));
          setCropCurrent({...loaded[0],posX:50,posY:50,dragging:false,dragStartX:0,dragStartY:0,startPosX:50,startPosY:50});
          setShowMbAdd(false);
        }
      };
      r.readAsDataURL(f);
    });
    e.target.value="";
  }

  function cropPointerDown(e){
    e.preventDefault();
    const cx=e.touches?e.touches[0].clientX:e.clientX;
    const cy=e.touches?e.touches[0].clientY:e.clientY;
    setCropCurrent(p=>({...p,dragging:true,dragStartX:cx,dragStartY:cy,startPosX:p.posX,startPosY:p.posY}));
  }
  function cropPointerMove(e){
    if(!cropCurrent?.dragging) return;
    const cx=e.touches?e.touches[0].clientX:e.clientX;
    const cy=e.touches?e.touches[0].clientY:e.clientY;
    const el=cropRef.current; if(!el) return;
    const rect=el.getBoundingClientRect();
    const dx=((cx-cropCurrent.dragStartX)/rect.width)*100;
    const dy=((cy-cropCurrent.dragStartY)/rect.height)*100;
    const nx=Math.max(0,Math.min(100,cropCurrent.startPosX-dx));
    const ny=Math.max(0,Math.min(100,cropCurrent.startPosY-dy));
    setCropCurrent(p=>({...p,posX:nx,posY:ny}));
  }
  function cropPointerUp(){
    setCropCurrent(p=>p?({...p,dragging:false}):null);
  }
  function cropConfirm(){
    if(!cropCurrent) return;
    // Save with objectPosition as percentages
    setMoodboard(p=>[...p,{id:Date.now()+Math.random(),photo:cropCurrent.dataUrl,categorie:cropCurrent.categorie,notitie:"",posX:cropCurrent.posX,posY:cropCurrent.posY}]);
    // Move to next in queue
    if(cropQueue.length>0){
      const [next,...rest]=cropQueue;
      setCropQueue(rest);
      setCropCurrent({...next,posX:50,posY:50,dragging:false,dragStartX:0,dragStartY:0,startPosX:50,startPosY:50});
    } else {
      setCropCurrent(null);
    }
  }
  function cropSkip(){
    // Save without custom positioning
    if(!cropCurrent) return;
    setMoodboard(p=>[...p,{id:Date.now()+Math.random(),photo:cropCurrent.dataUrl,categorie:cropCurrent.categorie,notitie:"",posX:50,posY:50}]);
    if(cropQueue.length>0){
      const [next,...rest]=cropQueue;
      setCropQueue(rest);
      setCropCurrent({...next,posX:50,posY:50,dragging:false,dragStartX:0,dragStartY:0,startPosX:50,startPosY:50});
    } else {
      setCropCurrent(null);
    }
  }
  function cropCancel(){
    setCropCurrent(null);
    setCropQueue([]);
  }

  function updateMbItem(id,updates){
    setMoodboard(p=>p.map(x=>x.id===id?{...x,...updates}:x));
    setMbSelected(s=>s?{...s,...updates}:null);
  }
  function delMb(id){setMoodboard(p=>p.filter(x=>x.id!==id));setMbSelected(null);}

  // ── WISHLIST ──
  const [showAdd,setShowAdd]=useState(false);
  const [search,setSearch]=useState("");
  const [selected,setSelected]=useState(null);
  const [form,setForm]=useState({naam:"",latijn:"",categorie:"",notitie:"",photo:null});
  const [imgPreview,setImgPreview]=useState(null);
  const fr=React.useRef();
  const WCATS=["Sierplant","Bol/knol","Boom/struik","Vijverplant","Moestuin","Anders"];

  function handleImg(e){const f=e.target.files?.[0];if(!f)return;const r=new FileReader();r.onload=ev=>{setImgPreview(ev.target.result);setForm(p=>({...p,photo:ev.target.result}));};r.readAsDataURL(f);e.target.value="";}
  function saveWish(){if(!form.naam.trim())return;setWishlist(p=>[...p,{id:Date.now(),...form}]);setForm({naam:"",latijn:"",categorie:"",notitie:"",photo:null});setImgPreview(null);setShowAdd(false);}
  function del(id){setWishlist(p=>p.filter(x=>x.id!==id));setSelected(null);}
  function markDone(id){setWishlist(p=>p.map(x=>x.id===id?{...x,done:!x.done}:x));}
  const flt=wishlist.filter(w=>{const q=search.toLowerCase();return!q||w.naam?.toLowerCase().includes(q)||w.latijn?.toLowerCase().includes(q)||w.categorie?.toLowerCase().includes(q);});
  const open=flt.filter(w=>!w.done);
  const done=flt.filter(w=>w.done);

  // Count per category for filter bar
  const mbCatCounts=MOODBOARD_CATS.reduce((acc,c)=>{acc[c]=moodboard.filter(m=>m.categorie===c).length;return acc;},{});

  return(<div>
    {/* Tab switcher */}
    <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:16,flexWrap:"wrap",gap:8}}>
      <div style={{display:"inline-flex",background:"#fff",border:`1px solid ${K.border}`,borderRadius:10,padding:3,gap:3}}>
        {[["moodboard","🖼 Moodboard"],["wishlist","💚 Wishlist"]].map(([v,l])=>(
          <button key={v} onClick={()=>setView(v)} style={{
            padding:"7px 16px",borderRadius:7,border:"none",cursor:"pointer",
            background:view===v?K.wish:"transparent",
            color:view===v?"#fff":K.muted,
            fontSize:12,fontWeight:view===v?700:500,fontFamily:"inherit",transition:"all .15s"
          }}>{l}</button>
        ))}
      </div>
      {view==="moodboard"&&<Button onClick={()=>setShowMbAdd(true)} style={{background:K.wish}}><Icons.plus size={14}/>Foto's toevoegen</Button>}
      {view==="wishlist"&&<Button onClick={()=>setShowAdd(true)} style={{background:K.wish}}><Icons.plus size={14}/>Soort toevoegen</Button>}
    </div>

    {/* ══ MOODBOARD VIEW ══ */}
    {view==="moodboard"&&<>
      {/* Category filter scrollable row */}
      <div style={{display:"flex",gap:6,flexWrap:"wrap",marginBottom:14}}>
        <button onClick={()=>setMbCat("alle")} style={{padding:"5px 14px",borderRadius:20,border:`2px solid ${mbCat==="alle"?K.wish:K.border}`,background:mbCat==="alle"?K.wish:"#fff",color:mbCat==="alle"?"#fff":K.muted,fontSize:11,fontWeight:700,cursor:"pointer",fontFamily:"inherit",transition:"all .15s",display:"flex",alignItems:"center",gap:4}}>
          Alles <span style={{background:mbCat==="alle"?"rgba(255,255,255,.3)":K.bL,borderRadius:8,padding:"0 5px",fontSize:10}}>{moodboard.length}</span>
        </button>
        {MOODBOARD_CATS.filter(c=>mbCatCounts[c]>0).map(c=>(
          <button key={c} onClick={()=>setMbCat(c)} style={{padding:"5px 14px",borderRadius:20,border:`2px solid ${mbCat===c?K.wish:K.border}`,background:mbCat===c?K.wish:"#fff",color:mbCat===c?"#fff":K.muted,fontSize:11,fontWeight:700,cursor:"pointer",fontFamily:"inherit",transition:"all .15s",display:"flex",alignItems:"center",gap:4}}>
            {c} <span style={{background:mbCat===c?"rgba(255,255,255,.3)":K.bL,borderRadius:8,padding:"0 5px",fontSize:10}}>{mbCatCounts[c]}</span>
          </button>
        ))}
      </div>

      {moodboard.length===0&&<Card><EmptyState icon={<Icons.camera size={32} color={K.wish}/>} title="Nog geen moodboard foto's" sub="Voeg foto's toe die je inspireren voor je tuin."/></Card>}

      {/* Instagram-style square grid */}
      {mbFiltered.length>0&&<>
        <div style={{display:"grid",gridTemplateColumns:"repeat(3,1fr)",gap:3,marginBottom:16}}>
          {mbFiltered.map(m=>(
            <div key={m.id} style={{position:"relative",paddingBottom:"100%",cursor:"pointer",borderRadius:4,overflow:"hidden"}}
              onMouseEnter={e=>{const ov=e.currentTarget.querySelector(".mb-overlay");if(ov)ov.style.opacity="1";}}
              onMouseLeave={e=>{const ov=e.currentTarget.querySelector(".mb-overlay");if(ov)ov.style.opacity="0";}}>
              <div style={{position:"absolute",inset:0,overflow:"hidden",borderRadius:4}} onClick={()=>setMbSelected(m)}>
                <img src={m.photo} alt="" style={{width:"100%",height:"100%",objectFit:"cover",display:"block",objectPosition:`${m.posX??50}% ${m.posY??50}%`}}/>
              </div>
              <div className="mb-overlay" style={{position:"absolute",inset:0,background:"rgba(0,0,0,.38)",borderRadius:4,display:"flex",flexDirection:"column",justifyContent:"flex-end",padding:6,opacity:0,transition:"opacity .2s",pointerEvents:"none"}}>
                {m.categorie&&<span style={{fontSize:9,fontWeight:700,color:"#fff",background:"rgba(138,42,90,.75)",borderRadius:6,padding:"1px 6px",alignSelf:"flex-start",marginBottom:2}}>{m.categorie}</span>}
                {m.notitie&&<span style={{fontSize:9,color:"rgba(255,255,255,.9)",lineHeight:1.3}}>{m.notitie}</span>}
              </div>
            </div>
          ))}
        </div>
        {mbSelected&&(()=>{
          const idx=mbFiltered.findIndex(m=>m.id===mbSelected.id);
          return(
            <div style={{position:"fixed",inset:0,background:"rgba(0,0,0,.88)",zIndex:3000,display:"flex",alignItems:"center",justifyContent:"center"}} onClick={()=>setMbSelected(null)}>
              <div onClick={e=>e.stopPropagation()} style={{position:"relative",maxWidth:"92vw",maxHeight:"92vh",display:"flex",flexDirection:"column",alignItems:"center"}}>
                <img src={mbSelected.photo} alt="" style={{maxWidth:"88vw",maxHeight:"72vh",borderRadius:8,objectFit:"contain"}}/>
                {(mbSelected.categorie||mbSelected.notitie)&&<div style={{marginTop:8,display:"flex",flexDirection:"column",alignItems:"center",gap:4}}>
                  {mbSelected.categorie&&<span style={{fontSize:11,fontWeight:700,color:"#fff",background:"rgba(138,42,90,.7)",borderRadius:8,padding:"2px 10px"}}>{mbSelected.categorie}</span>}
                  {mbSelected.notitie&&<span style={{fontSize:12,color:"rgba(255,255,255,.85)",textAlign:"center"}}>{mbSelected.notitie}</span>}
                </div>}
                {mbFiltered.length>1&&<>
                  <button onClick={()=>setMbSelected(mbFiltered[(idx-1+mbFiltered.length)%mbFiltered.length])} style={{position:"absolute",left:-48,top:"40%",transform:"translateY(-50%)",background:"rgba(255,255,255,.18)",border:"none",borderRadius:"50%",width:40,height:40,cursor:"pointer",display:"flex",alignItems:"center",justifyContent:"center"}}><Icons.left color="#fff"/></button>
                  <button onClick={()=>setMbSelected(mbFiltered[(idx+1)%mbFiltered.length])} style={{position:"absolute",right:-48,top:"40%",transform:"translateY(-50%)",background:"rgba(255,255,255,.18)",border:"none",borderRadius:"50%",width:40,height:40,cursor:"pointer",display:"flex",alignItems:"center",justifyContent:"center"}}><Icons.right color="#fff"/></button>
                </>}
                <div style={{display:"flex",gap:8,marginTop:10}}>
                  <button onClick={()=>{const d=window.prompt("Notitie:",mbSelected.notitie||"");if(d!==null)updateMbItem(mbSelected.id,{notitie:d});}} style={{padding:"6px 14px",borderRadius:8,border:"none",background:"rgba(255,255,255,.15)",color:"#fff",fontSize:12,cursor:"pointer"}}>✏️ Notitie</button>
                  <button onClick={()=>{delMb(mbSelected.id);}} style={{padding:"6px 14px",borderRadius:8,border:"none",background:"rgba(180,40,40,.7)",color:"#fff",fontSize:12,cursor:"pointer"}}>🗑 Verwijderen</button>
                </div>
                <div style={{textAlign:"center",color:"rgba(255,255,255,.45)",fontSize:10,marginTop:5}}>{idx+1}/{mbFiltered.length} · klik buiten om te sluiten</div>
              </div>
              <button onClick={()=>setMbSelected(null)} style={{position:"absolute",top:14,right:14,background:"rgba(255,255,255,.15)",border:"none",borderRadius:"50%",width:34,height:34,cursor:"pointer",display:"flex",alignItems:"center",justifyContent:"center"}}><Icons.x color="#fff"/></button>
            </div>
          );
        })()}
      </>}
      {mbFiltered.length===0&&moodboard.length>0&&<Card><EmptyState icon={<Icons.search size={28} color={K.muted}/>} title="Geen foto's in deze categorie" sub="Kies een andere categorie."/></Card>}

      {/* Add photos modal */}
      <Modal open={showMbAdd} onClose={()=>setShowMbAdd(false)} title="Foto's toevoegen aan moodboard">
        <p style={{fontSize:13,color:K.muted,margin:"0 0 14px"}}>Selecteer één of meerdere foto's. Je kunt per foto een categorie instellen na het uploaden.</p>
        <div style={{marginBottom:12}}>
          <label style={{display:"block",fontSize:11,fontWeight:700,color:K.muted,marginBottom:6,textTransform:"uppercase",letterSpacing:.3}}>Categorie voor nieuwe foto's</label>
          <select value={mbForm.categorie} onChange={e=>setMbForm(p=>({...p,categorie:e.target.value}))}
            style={{width:"100%",padding:"8px 12px",border:`2px solid ${K.border}`,borderRadius:8,fontSize:13,fontFamily:"inherit",background:"#fff"}}>
            {[{value:"",label:"— Kies categorie —"},...MOODBOARD_CATS.map(c=>({value:c,label:c}))].map(o=><option key={o.value} value={o.value}>{o.label}</option>)}
          </select>
        </div>
        <input ref={mbFr} type="file" accept="image/*" multiple onChange={handleMbImg} style={{display:"none"}}/>
        <div onClick={()=>mbFr.current?.click()} style={{width:"100%",padding:"28px 0",borderRadius:10,border:`2px dashed ${K.wish}`,display:"flex",flexDirection:"column",alignItems:"center",justifyContent:"center",cursor:"pointer",background:K.wishL,gap:8}}>
          <Icons.camera size={32} color={K.wish}/>
          <span style={{fontSize:13,color:K.wish,fontWeight:700}}>Klik om foto's te selecteren</span>
          <span style={{fontSize:11,color:K.muted}}>Meerdere foto's tegelijk mogelijk</span>
        </div>
      </Modal>

      {/* Photo detail: inline lightbox above */}

      {/* ── CROP / KADERING EDITOR ── */}
      {cropCurrent&&<div style={{position:"fixed",inset:0,background:"rgba(0,0,0,.92)",zIndex:4000,display:"flex",alignItems:"center",justifyContent:"center",flexDirection:"column",padding:16}}>
        <div style={{color:"#fff",fontSize:14,fontWeight:700,marginBottom:6,textAlign:"center"}}>
          📐 Kadering instellen {cropQueue.length>0?`(${moodboard.length===0&&cropQueue.length>0?1:1} van ${cropQueue.length+1} foto's)`:""}
        </div>
        <div style={{color:"rgba(255,255,255,.6)",fontSize:12,marginBottom:14,textAlign:"center"}}>Sleep de foto om het zichtbare deel te kiezen</div>
        {/* Square crop preview */}
        <div
          ref={cropRef}
          onMouseDown={cropPointerDown}
          onMouseMove={cropPointerMove}
          onMouseUp={cropPointerUp}

// Map Dutch/English colour names → HSL hue (0-359). Returns -1 if unknown.
function kleurNaarHue(kleur){
  if(!kleur) return -1;
  const k=kleur.toLowerCase();
  // ordered: check substrings
  const MAP=[
    [["rood","red","scarlet","karmijn","bordeaux"],0],
    [["oranje","orange"],28],
    [["geel","yellow","citroe","lime"],58],
    [["groen","green"],110],
    [["blauw","blue","azuur","indigo"],215],
    [["paars","purple","violet","lila","laven"],270],
    [["roze","pink","zalm","salmon"],330],
    [["wit","white","crème","creme","ivoor"],null],  // wit = no hue
    [["zwart","black","donker"],null],
    [["bruin","brown"],25],
    [["magenta","fuchsia"],305],
    [["turquoise","cyan","teal"],175],
  ];
  for(const [keys,hue] of MAP){
    for(const key of keys){
      if(k.includes(key)) return hue===null?-2:hue; // -2=wit/zwart→ altijd tonen
    }
  }
  return -1; // onbekend
}

// Does a plant match the active hue window?
function matchesHueFilter(kleur, hueCenter, hueWidth){
  if(hueCenter<0) return true;           // filter uit
  const hue=kleurNaarHue(kleur);
  if(hue===-1) return true;              // onbekende kleur: altijd tonen
  if(hue===-2) return false;             // wit/zwart: buiten spectrum
  // Circular distance on 0-360
  const diff=Math.abs(((hue-hueCenter+540)%360)-180);
  return diff<=hueWidth;
}

// INVENTARIS TAB — unified view for all 5 inventory categories

function InventarisTab({plants,setPlants,bulbs,setBulbs,trees,setTrees,pondPlants,setPondPlants,veggies,setVeggies,seeds,setSeeds,tasks,setTasks,gardenMap,setGardenMap,onNavigatePlattegrond}){

  function handleAfterAdd(plant){
    if(gardenMap.outlineClosed||(Object.keys(gardenMap.cells||{}).length>0)){
      setPinPrompt(plant);
    }

  function confirmPin(plant){

  const CATS=[

    {id:"bomen",       label:"🌳 Bomen",         color:K.tree,    bg:K.treeL,       count:()=>trees.length},
    {id:"vijver",      label:"💧 Vijver",         color:K.pond,    bg:K.pondL,       count:()=>pondPlants.length},
    {id:"moestuin",    label:"🥕 Moestuin",       color:K.veggie,  bg:K.veggieL,     count:()=>veggies.length},
    {id:"zadenbank",   label:"🌱 Zadenbank",      color:K.warm,    bg:K.warmLight,   count:()=>seeds.length},
    {id:"gewist",      label:"🗑 Gewist",          color:"#888",    bg:"#f0f0f0",     count:()=>trash.length},
  ];

  const active=CATS.find(c=>c.id===cat);
  const totalCount=plants.length+bulbs.length+trees.length+pondPlants.length+veggies.length+seeds.length;

  // Soft-delete: move item to trash instead of permanent deletion
  function moveToTrash(id,catId){
    const setters={sierplanten:setPlants,bol:setBulbs,bomen:setTrees,vijver:setPondPlants,moestuin:setVeggies,zadenbank:setSeeds};
    const setter=setters[catId];
    if(!setter) return;
    const lists={sierplanten:plants,bol:bulbs,bomen:trees,vijver:pondPlants,moestuin:veggies,zadenbank:seeds};
    const item=(lists[catId]||[]).find(x=>x.id===id);
    if(item){setTrash(t=>[...t,{item,catId}]);setter(p=>p.filter(x=>x.id!==id));}
    setDirectSelected(null);
  }
  function restoreFromTrash(id){
    const entry=trash.find(t=>t.item.id===id);
    if(!entry) return;
    const setters={sierplanten:setPlants,bol:setBulbs,bomen:setTrees,vijver:setPondPlants,moestuin:setVeggies,zadenbank:setSeeds};
    const setter=setters[entry.catId];
    if(setter) setter(p=>[...p,entry.item]);
    setTrash(t=>t.filter(x=>x.item.id!==id));
  }

  return(
    <div>
      {/* Header with global add button */}
      <div style={{display:"flex",justifyContent:"space-between",alignItems:"flex-start",marginBottom:12}}>

          <h2 style={{margin:0,fontSize:22,color:K.text}}>Inventaris</h2>

        </button>

            <span style={{background:cat===c.id?"rgba(255,255,255,.3)":K.bL,color:cat===c.id?"#fff":K.muted,borderRadius:10,fontSize:10,padding:"0 6px",fontWeight:600}}>{c.count()}</span>
          </button>
        ))}
      </div>

      {/* Colour filter */}
      <div style={{marginBottom:14}}>
        <button onClick={()=>{setShowKleurFilter(s=>!s);if(showKleurFilter){setHueActive(false);setHueCenter(180);}}} style={{display:"flex",alignItems:"center",gap:8,padding:"5px 12px",borderRadius:8,border:`1px solid ${K.border}`,background:showKleurFilter?K.accentLight:"#fff",color:showKleurFilter?K.accent:K.muted,fontSize:11,fontWeight:700,cursor:"pointer",fontFamily:"inherit",marginBottom:showKleurFilter?8:0}}>
          <span style={{fontSize:14}}>🌈</span> Bloemkleur filter {showKleurFilter?"▲":"▼"}
          {hueActive&&<span style={{width:12,height:12,borderRadius:"50%",background:`hsl(${hueCenter},80%,50%)`,display:"inline-block",flexShrink:0}}/>}

            {(()=>{const pct=hueCenter/360;const wpct=hueWidth/360;const left=Math.max(0,pct-wpct/2)*100;const width=Math.min(wpct*100,100-left);return(<div style={{position:"absolute",top:0,left:`${left}%`,width:`${width}%`,height:20,borderRadius:10,border:"2px solid #fff",boxShadow:`0 0 0 1.5px ${hueActive?"#333":"#aaa"},inset 0 0 0 1px rgba(0,0,0,.15)`,pointerEvents:"none",background:hueActive?undefined:"rgba(255,255,255,.25)"}}/>);})()}
            <div style={{position:"absolute",inset:0,cursor:"crosshair",borderRadius:10}}

              onMouseDown={e=>{const rect=e.currentTarget.parentElement.getBoundingClientRect();const move=ev=>{const pct=Math.max(0,Math.min(1,(ev.clientX-rect.left)/rect.width));setHueCenter(Math.round(pct*360));setHueActive(true);};const up=()=>{window.removeEventListener("mousemove",move);window.removeEventListener("mouseup",up);};window.addEventListener("mousemove",move);window.addEventListener("mouseup",up);}}/>
          </div>
          <div style={{display:"flex",alignItems:"center",gap:8}}>
            <span style={{fontSize:10,color:K.muted,flexShrink:0}}>Venster</span>

                      style={{cursor:inOL?"cell":"default"}}>
                      <rect x={c*MCELL} y={r*MCELL} width={MCELL} height={MCELL} fill={!inOL?"rgba(0,0,0,.05)":zd?zd.fill:"transparent"} stroke={!inOL?"rgba(0,0,0,.03)":K.border} strokeWidth={.4}/>

                      {mps.map((p,pi)=>(<circle key={p.id} cx={c*MCELL+(pi%2===0?6:MCELL-6)} cy={r*MCELL+(pi<2?6:MCELL-6)} r={4} fill={p.color} stroke="#fff" strokeWidth={1}/>))}

                  {Array.from({length:mr+1},(_,r)=><line key={`h${r}`} x1={0} y1={r*MCELL} x2={mc*MCELL} y2={r*MCELL} stroke="#ddd" strokeWidth={.3}/>)}

                  {gm.outlineClosed&&moutline.length>=3&&<polygon points={moutlinePts} fill="none" stroke="#2E5A3D" strokeWidth={1.5} strokeLinejoin="round"/>}
                </svg>

          <div style={{display:"flex",gap:8,justifyContent:"flex-end"}}>
            <button onClick={()=>setPinPrompt(null)} style={{padding:"8px 16px",borderRadius:8,border:`1px solid ${K.border}`,background:"#fff",fontSize:13,cursor:"pointer",fontFamily:"inherit"}}>Overslaan</button>
          </div>
        </div>
      </div>}
    </div>
  );
}

// BLOEIKALENDER TAB — line chart + maandanalyse + tuinhoek-analyse
// ═══════════════════════════════════════════════════════════════════
const MONTH_STARTS=[0,31,59,90,120,151,181,212,243,273,304,334];
const MONTH_LABELS=["Jan","Feb","Mrt","Apr","Mei","Jun","Jul","Aug","Sep","Okt","Nov","Dec"];
const MONTH_FULL=["Januari","Februari","Maart","April","Mei","Juni","Juli","Augustus","September","Oktober","November","December"];

function dayOfYear(monthIdx){ return MONTH_STARTS[monthIdx]??0; }
function getMonthIdx(name){
  const n=(name||"").toLowerCase().trim();
  const MAP={januari:0,februari:1,maart:2,april:3,mei:4,juni:5,juli:6,augustus:7,september:8,oktober:9,november:10,december:11};
  return MAP[n]??-1;
}

function bloomPath(startDay, endDay, yMax, yBase, W, H){
  if(startDay<0||endDay<0||startDay>endDay) return null;
  const mid=(startDay+endDay)/2;
  const pts=[];
  const pad=10;
  pts.push([startDay-pad, yBase]);
  pts.push([startDay, yBase]);
  pts.push([(startDay+mid)/2, yBase+(yMax-yBase)*0.5]);
  pts.push([mid, yMax]);
  pts.push([(mid+endDay)/2, yBase+(yMax-yBase)*0.5]);
  pts.push([endDay, yBase]);
  pts.push([endDay+pad, yBase]);
  const xScale=(d)=>Math.max(0,Math.min(W, (d/365)*W));
  let d=`M ${xScale(pts[0][0])} ${pts[0][1]}`;
  for(let i=1;i<pts.length;i++){
    const prev=pts[i-1], cur=pts[i];
    const cpx=(xScale(prev[0])+xScale(cur[0]))/2;
    d+=` C ${cpx} ${prev[1]}, ${cpx} ${cur[1]}, ${xScale(cur[0])} ${cur[1]}`;
  }
  return d;
}

const LINE_COLORS=["#2E5A3D","#C4703A","#6B4A8A","#1A6A8A","#8A2A5A","#5A7A1A","#8A6A1A","#1A4A6A","#6A1A3A","#3A6A1A","#8A3A1A","#3A1A6A","#1A8A6A","#6A3A8A","#8A1A2A","#2A8A4A"];

// ── Shared bloei-window state (module level, lifted to app) ──────────
// Passed down via props to both BloeikalenderTab and PlattegrondTab

const BLOEI_MONTH_STARTS_G=[0,31,59,90,120,151,181,212,243,273,304,334];
const BLOEI_MONTHS_SHORT_G=["Jan","Feb","Mrt","Apr","Mei","Jun","Jul","Aug","Sep","Okt","Nov","Dec"];

function BloeiTimelineWidget({bloeiWin,setBloeiWin,bloeiBarRef,bloeiDragging,setBloeiDragging,setBloeiDragAnchor,bloeiDragAnchor,handleBloeiMove,handleBloeiUp}){
  const DAYS=365;
  return(
    <div style={{position:"relative",userSelect:"none"}}
      onMouseMove={handleBloeiMove} onMouseUp={handleBloeiUp} onMouseLeave={handleBloeiUp}>
      <div style={{display:"flex",marginBottom:2}}>
        {BLOEI_MONTHS_SHORT_G.map((m,i)=>(
          <div key={i} style={{flex:BLOEI_MONTH_STARTS_G[i+1]?BLOEI_MONTH_STARTS_G[i+1]-BLOEI_MONTH_STARTS_G[i]:31,fontSize:9,color:"#aaa",fontWeight:600,textAlign:"center",overflow:"hidden"}}>{m}</div>
        ))}
      </div>
      <div ref={bloeiBarRef}
        style={{position:"relative",height:28,borderRadius:6,background:"#f0e6f0",border:"1px solid #d0a0c8",cursor:bloeiDragging?"ew-resize":"default"}}
        onMouseDown={e=>{
          e.preventDefault();
          const bar=bloeiBarRef.current; if(!bar) return;
          const rect=bar.getBoundingClientRect();
          const px=e.clientX-rect.left, barW=rect.width;
          const [ws,we]=bloeiWin;
          const xs=(ws/DAYS)*barW, xe=(we/DAYS)*barW, slop=10;
          if(Math.abs(px-xs)<slop){setBloeiDragging("start");setBloeiDragAnchor({px,ws,we});}
          else if(Math.abs(px-xe)<slop){setBloeiDragging("end");setBloeiDragAnchor({px,ws,we});}
          else if(px>xs&&px<xe){setBloeiDragging("window");setBloeiDragAnchor({px,ws,we});}
        }}>
        {BLOEI_MONTH_STARTS_G.slice(1).map((s,i)=>(
          <div key={i} style={{position:"absolute",left:`${(s/DAYS)*100}%`,top:0,bottom:0,width:1,background:"rgba(180,130,170,.4)"}}/>
        ))}
        <div style={{position:"absolute",left:`${(bloeiWin[0]/DAYS)*100}%`,width:`${((bloeiWin[1]-bloeiWin[0])/DAYS)*100}%`,top:0,bottom:0,background:"rgba(192,96,160,.35)",cursor:"grab"}}/>
        <div style={{position:"absolute",left:`${(bloeiWin[0]/DAYS)*100}%`,top:0,bottom:0,width:6,background:"#c060a0",cursor:"ew-resize",transform:"translateX(-50%)",borderRadius:"3px 0 0 3px",zIndex:2}}/>
        <div style={{position:"absolute",left:`${(bloeiWin[1]/DAYS)*100}%`,top:0,bottom:0,width:6,background:"#c060a0",cursor:"ew-resize",transform:"translateX(-50%)",borderRadius:"0 3px 3px 0",zIndex:2}}/>
        {(()=>{const now=new Date();const doy=Math.floor((now-new Date(now.getFullYear(),0,0))/86400000);return(
          <div style={{position:"absolute",left:`${(doy/DAYS)*100}%`,top:0,bottom:0,width:2,background:"#c4703a",opacity:.7,zIndex:3,pointerEvents:"none"}}/>
        );})()}
      </div>
      <div style={{display:"flex",justifyContent:"space-between",marginTop:3,fontSize:10,color:"#a060a0",fontWeight:600}}>
        <span>{BLOEI_MONTHS_SHORT_G[BLOEI_MONTH_STARTS_G.findLastIndex(s=>s<=bloeiWin[0])]}</span>
        <span>{bloeiWin[1]-bloeiWin[0]} dagen geselecteerd</span>
        <span>{BLOEI_MONTHS_SHORT_G[BLOEI_MONTH_STARTS_G.findLastIndex(s=>s<=bloeiWin[1])]}</span>
      </div>
    </div>
  );
}

function BloeikalenderTab({plants,bulbs,trees,pondPlants,veggies,gardenMap}){
  const [hovered,setHovered]=useState(null);
  const [tooltip,setTooltip]=useState(null);
  const [activeView,setActiveView]=useState("kalender"); // "kalender" | "analyse"
  const [analysisRun,setAnalysisRun]=useState(false);

  // ── Bloei-overlay window state ──
  const [bloeiWin,setBloeiWin]=useState([60,151]);
  const [bloeiDragging,setBloeiDragging]=useState(null);
  const [bloeiDragAnchor,setBloeiDragAnchor]=useState(null);
  const bloeiBarRef=useRef();

  function handleBloeiMove(e){
    if(!bloeiDragging) return;
    const bar=bloeiBarRef.current; if(!bar) return;
    const rect=bar.getBoundingClientRect(), barW=rect.width, DAYS=365;
    const {px:anchorPx,ws:anchorWs,we:anchorWe}=bloeiDragAnchor;
    const delta=Math.round(((e.clientX-rect.left-anchorPx)/barW)*DAYS);
    const span=anchorWe-anchorWs;
    if(bloeiDragging==="start"){setBloeiWin([Math.max(0,Math.min(anchorWs+delta,bloeiWin[1]-7)),bloeiWin[1]]);}
    else if(bloeiDragging==="end"){setBloeiWin([bloeiWin[0],Math.max(bloeiWin[0]+7,Math.min(anchorWe+delta,DAYS))]);}
    else{const ns=Math.max(0,Math.min(anchorWs+delta,DAYS-span));setBloeiWin([ns,ns+span]);}
  }
  function handleBloeiUp(){setBloeiDragging(null);setBloeiDragAnchor(null);}

  // shared shortcut for the overlay map
  const BloeiTimeline=()=><BloeiTimelineWidget bloeiWin={bloeiWin} setBloeiWin={setBloeiWin} bloeiBarRef={bloeiBarRef} bloeiDragging={bloeiDragging} setBloeiDragging={setBloeiDragging} setBloeiDragAnchor={setBloeiDragAnchor} bloeiDragAnchor={bloeiDragAnchor} handleBloeiMove={handleBloeiMove} handleBloeiUp={handleBloeiUp}/>;

  // Gather all species with bloom data
  const allSpecies=[];
  const addSpecies=(arr,label)=>(arr||[]).forEach(p=>{
    const si=getMonthIdx(p.bloeiStart), ei=getMonthIdx(p.bloeiEind);
    if(si<0||ei<0) return;
    allSpecies.push({
      id:`${label}-${p.id}`, plantId:p.id, naam:p.naam||p.latijn||"Onbekend",
      startDay:dayOfYear(si), endDay:dayOfYear(ei)+30,
      startMonth:si, endMonth:ei,
      kleur:p.kleur||"", label
    });
  });
  addSpecies(plants,"Sierplant");
  addSpecies(bulbs,"Bol/knol");
  addSpecies(trees,"Boom");
  addSpecies(pondPlants,"Vijver");
  addSpecies(veggies,"Moestuin");

  const W=900, H=320, MARGIN={top:30,right:20,bottom:40,left:90};
  const chartW=W-MARGIN.left-MARGIN.right;
  const chartH=H-MARGIN.top-MARGIN.bottom;
  const yBase=chartH, yTop=0;

  const paths=allSpecies.map((s,i)=>{
    const color=kleurToColor(s.kleur)||LINE_COLORS[i%LINE_COLORS.length];
    const d=bloomPath(s.startDay,s.endDay,yTop,yBase,chartW,chartH);
    return{...s,color,d};
  });

  const now=new Date();
  const todayDoy=(function(){
    const start=new Date(now.getFullYear(),0,0);
    return Math.floor((now-start)/86400000);
  })();
  const todayX=(todayDoy/365)*chartW;
  const blooming=paths.filter(p=>p.startDay<=todayDoy&&p.endDay>=todayDoy);

  // ── ANALYSIS helpers ──────────────────────────────────────────────
  // Count how many species bloom in each month
  const monthBloomCount=MONTH_LABELS.map((_,mi)=>
    allSpecies.filter(s=>s.startMonth<=mi&&s.endMonth>=mi).length
  );
  const maxBloom=Math.max(...monthBloomCount,1);

  // Classify months
  function bloomLevel(count){
    if(count===0) return "geen";
    if(count<=2) return "schaars";
    if(count<=5) return "matig";
    return "rijk";
  }
  const levelColor={geen:"#fde8e8",schaars:"#fef3cd",matig:"#d4edda",rijk:"#1F3A2A"};
  const levelText={geen:"#8B2020",schaars:"#7a4020",matig:"#1a5a2a",rijk:"#F3EBDD"};
  const levelLabel={geen:"Geen bloei",schaars:"Schaars",matig:"Matig",rijk:"Rijk"};

  // Garden zone analysis — which pins bloom in which month
  const pins=(gardenMap?.pins||[]);
  const allPlantsFlat=[...(plants||[]),...(bulbs||[]),...(trees||[]),...(pondPlants||[]),...(veggies||[])];

  // Determine quadrants based on outline bounding box (not full grid)
  const gardenCols=gardenMap?.cols||20;
  const gardenRows=gardenMap?.rows||16;
  const CELL28=28; // matches PlattegrondTab CELL size
  const outlineForMid=gardenMap?.outline||[];
  const outlineCells_c=outlineForMid.map(p=>Math.floor(p.x/CELL28));
  const outlineCells_r=outlineForMid.map(p=>Math.floor(p.y/CELL28));
  const outMinC=outlineCells_c.length>0?Math.min(...outlineCells_c):0;
  const outMaxC=outlineCells_c.length>0?Math.max(...outlineCells_c):gardenCols;
  const outMinR=outlineCells_r.length>0?Math.min(...outlineCells_r):0;
  const outMaxR=outlineCells_r.length>0?Math.max(...outlineCells_r):gardenRows;
  // midpoint of the outline bounding box (in cell units)
  const midCol=Math.round((outMinC+outMaxC)/2);
  const midRow=Math.round((outMinR+outMaxR)/2);

  // For each of 4 quadrants, count blooming species per month
  // qi=0: Links boven (r<mid, c<mid), qi=1: Rechts boven (r<mid, c>=mid)
  // qi=2: Links onder (r>=mid, c<mid), qi=3: Rechts onder (r>=mid, c>=mid)
  const quadrantNames=["Links boven","Rechts boven","Links onder","Rechts onder"];
  function pinInQuadrant(pin,qi){
    const top=qi<2, left=qi%2===0;
    return (top?pin.r<midRow:pin.r>=midRow)&&(left?pin.c<midCol:pin.c>=midCol);
  }
  const quadrantBloom=quadrantNames.map((_,qi)=>{
    const qPins=pins.filter(pin=>pinInQuadrant(pin,qi));
    const qSpeciesIds=[...new Set(qPins.map(p=>p.plantId))];
    const qSpecies=qSpeciesIds.map(id=>allPlantsFlat.find(p=>p.id===id)).filter(Boolean);
    return MONTH_LABELS.map((_,mi)=>
      qSpecies.filter(s=>{
        const si=getMonthIdx(s.bloeiStart),ei=getMonthIdx(s.bloeiEind);
        return si>=0&&ei>=0&&si<=mi&&ei>=mi;
      }).length
    );
  });

  // Gap months (< 2 species blooming)
  const gapMonths=MONTH_LABELS.filter((_,i)=>monthBloomCount[i]<2);
  const peakMonths=MONTH_LABELS.filter((_,i)=>monthBloomCount[i]===maxBloom);

  // Quadrant gaps: quadrant × months with 0 bloei
  const quadrantGaps=quadrantNames.map((name,qi)=>{
    const pinCount=pins.filter(p=>pinInQuadrant(p,qi)).length;
    const emptyMonths=MONTH_LABELS.filter((_,mi)=>quadrantBloom[qi][mi]===0&&pinCount>0);
    return{name,emptyMonths,pinCount,monthly:quadrantBloom[qi]};
  }).filter(q=>q.pinCount>0);

  return(<div>
    {/* Header */}
    <div style={{marginBottom:16}}>
      <h2 style={{margin:0,fontSize:22,color:K.text}}>Bloeikalender & analyse</h2>
      <p style={{margin:"4px 0 10px",fontSize:13,color:K.muted}}>{allSpecies.length} soorten met bloeigegevens{blooming.length>0?` · ${blooming.length} nu in bloei`:""}</p>
      {/* View switcher — left aligned, below title */}
      <div style={{display:"inline-flex",gap:6,background:"#fff",border:`1px solid ${K.border}`,borderRadius:10,padding:3}}>
        {[["kalender","📅 Kalender"],["analyse","🔍 Bloeianalyse"],["plattegrond","🌸 Bloei-plattegrond"]].map(([v,l])=>(
          <button key={v} onClick={()=>setActiveView(v)} style={{
            padding:"7px 14px",borderRadius:7,border:"none",cursor:"pointer",
            background:activeView===v?K.accent:"transparent",
            color:activeView===v?"#F3EBDD":K.muted,
            fontSize:12,fontWeight:activeView===v?700:500,
            fontFamily:"inherit",transition:"all .15s"
          }}>{l}</button>
        ))}
      </div>
    </div>

    {allSpecies.length===0&&<Card><EmptyState icon={<Icons.flower size={32} color={K.accent}/>} title="Nog geen soorten met bloeigegevens" sub="Voeg planten toe met een bloeiperiode om ze hier te zien."/></Card>}

    {/* ═══ KALENDER VIEW ═══ */}
    {activeView==="kalender"&&allSpecies.length>0&&<>
      {blooming.length>0&&<Card style={{marginBottom:16,borderLeft:`3px solid ${K.accent}`}}>
        <div style={{fontSize:12,fontWeight:700,color:K.accent,textTransform:"uppercase",letterSpacing:.5,marginBottom:8}}>🌸 Nu in bloei</div>
        <div style={{display:"flex",gap:6,flexWrap:"wrap"}}>
          {blooming.map(b=><span key={b.id} style={{padding:"3px 10px",borderRadius:12,fontSize:12,fontWeight:600,color:"#fff",background:b.color,textShadow:"0 1px 2px rgba(0,0,0,.3)"}}>{b.naam}</span>)}
        </div>
      </Card>}

      <Card style={{padding:"12px 8px",overflowX:"auto"}}>
        <svg viewBox={`0 0 ${W} ${H}`} style={{width:"100%",minWidth:360,display:"block"}}>
          <g transform={`translate(${MARGIN.left},${MARGIN.top})`}>
            {MONTH_STARTS.map((d,i)=>{
              const x=(d/365)*chartW;
              return(<g key={i}>
                <line x1={x} y1={0} x2={x} y2={chartH} stroke="#E8DCC8" strokeWidth={1}/>
                <text x={x+2} y={chartH+14} fontSize={9} fill="#999" fontFamily="-apple-system,sans-serif">{MONTH_LABELS[i]}</text>
              </g>);
            })}
            <line x1={chartW} y1={0} x2={chartW} y2={chartH} stroke="#E8DCC8" strokeWidth={1}/>
            <text x={-8} y={chartH} fontSize={10} fill="#666" textAnchor="end" fontFamily="-apple-system,sans-serif" dominantBaseline="middle">Geen bloei</text>
            <text x={-8} y={0} fontSize={10} fill="#2E5A3D" textAnchor="end" fontFamily="-apple-system,sans-serif" dominantBaseline="middle" fontWeight="600">In bloei</text>
            <line x1={0} y1={0} x2={0} y2={chartH} stroke="#E8DCC8" strokeWidth={1.5}/>
            <line x1={0} y1={chartH} x2={chartW} y2={chartH} stroke="#E8DCC8" strokeWidth={1.5}/>
            {paths.map((p)=>(
              <path key={p.id} d={p.d} fill="none" stroke={p.color}
                strokeWidth={hovered===p.id?3:1.5}
                opacity={hovered&&hovered!==p.id?0.2:0.85}
                style={{cursor:"pointer",transition:"all .15s"}}
                onMouseEnter={e=>{setHovered(p.id);setTooltip({x:e.clientX,y:e.clientY,naam:p.naam,start:MONTH_LABELS[p.startMonth],eind:MONTH_LABELS[p.endMonth],color:p.color});}}
                onMouseLeave={()=>{setHovered(null);setTooltip(null);}}
              />
            ))}
            <line x1={todayX} y1={0} x2={todayX} y2={chartH} stroke="#C4703A" strokeWidth={1.5} strokeDasharray="4 3" opacity={0.7}/>
            <text x={todayX+3} y={8} fontSize={9} fill="#C4703A" fontFamily="-apple-system,sans-serif" fontWeight="600">Vandaag</text>
          </g>
        </svg>
        {tooltip&&<div style={{position:"fixed",left:tooltip.x+12,top:tooltip.y-10,background:"#1F3A2A",color:"#F3EBDD",padding:"6px 12px",borderRadius:8,fontSize:12,fontWeight:600,pointerEvents:"none",zIndex:9999,boxShadow:"0 4px 12px rgba(0,0,0,.3)",whiteSpace:"nowrap"}}>
          <div style={{display:"flex",alignItems:"center",gap:6}}><span style={{width:10,height:10,borderRadius:"50%",background:tooltip.color,flexShrink:0}}/>{tooltip.naam}</div>
          <div style={{fontSize:10,opacity:.8,marginTop:2}}>{tooltip.start} – {tooltip.eind}</div>
        </div>}
      </Card>

      <Card style={{marginTop:12}}>
        <div style={{fontSize:11,fontWeight:700,color:K.muted,textTransform:"uppercase",letterSpacing:.5,marginBottom:8}}>Legenda</div>
        <div style={{display:"grid",gridTemplateColumns:"repeat(auto-fill,minmax(160px,1fr))",gap:5}}>
          {paths.map(p=>(
            <div key={p.id} style={{display:"flex",alignItems:"center",gap:6,fontSize:12,cursor:"pointer",opacity:hovered&&hovered!==p.id?.35:1,transition:"opacity .15s"}}
              onMouseEnter={()=>setHovered(p.id)} onMouseLeave={()=>setHovered(null)}>
              <span style={{width:20,height:3,borderRadius:2,background:p.color,flexShrink:0,display:"inline-block"}}/>
              <span style={{overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap",color:K.text}}>{p.naam}</span>
            </div>
          ))}
        </div>
      </Card>
    </>}

    {/* ═══ ANALYSE VIEW ═══ */}
    {activeView==="analyse"&&allSpecies.length>0&&<>

      {/* Maand-voor-maand heatmap */}
      <Card style={{marginBottom:16}}>
        <div style={{fontSize:13,fontWeight:700,color:K.text,marginBottom:4}}>Bloei per maand</div>
        <p style={{fontSize:12,color:K.muted,margin:"0 0 16px",lineHeight:1.6}}>Aantal soorten in bloei per kalendermaand — combinatie van alle categorieën.</p>
        <div style={{display:"grid",gridTemplateColumns:"repeat(12,1fr)",gap:4,marginBottom:12}}>
          {MONTH_LABELS.map((m,i)=>{
            const count=monthBloomCount[i];
            const level=bloomLevel(count);
            const pct=Math.round((count/maxBloom)*100);
            return(
              <div key={i} style={{textAlign:"center"}}>
                <div style={{
                  height:Math.max(8,Math.round((count/maxBloom)*80)),
                  background:count===0?"#f5ede8":count<=2?"#fad07a":count<=5?"#7ac472":"#2E5A3D",
                  borderRadius:"4px 4px 0 0",marginBottom:3,
                  transition:"height .3s",minHeight:4,
                  boxShadow:count>0?"0 2px 6px rgba(46,90,61,.2)":"none"
                }}/>
                <div style={{fontSize:9,fontWeight:700,color:K.muted,marginBottom:2}}>{m}</div>
                <div style={{fontSize:11,fontWeight:700,color:count===0?K.danger:K.accent}}>{count}</div>
              </div>
            );
          })}
        </div>
        {/* Legend bar */}
        <div style={{display:"flex",gap:12,fontSize:11,color:K.muted,flexWrap:"wrap"}}>
          {[["#f5ede8",K.danger,"0 soorten"],["#fad07a","#7a4020","1–2 soorten"],["#7ac472","#1a5a2a","3–5 soorten"],["#2E5A3D","#F3EBDD","6+ soorten"]].map(([bg,col,lbl])=>(
            <div key={lbl} style={{display:"flex",alignItems:"center",gap:5}}>
              <span style={{width:12,height:12,borderRadius:3,background:bg,border:"1px solid rgba(0,0,0,.08)",flexShrink:0}}/>
              <span style={{color:col}}>{lbl}</span>
            </div>
          ))}
        </div>
      </Card>

      {/* Per-maand detail tabel */}
      <Card style={{marginBottom:16}}>
        <div style={{fontSize:13,fontWeight:700,color:K.text,marginBottom:12}}>Detail per maand</div>
        <div style={{display:"flex",flexDirection:"column",gap:6}}>
          {MONTH_LABELS.map((m,mi)=>{
            const bloeiend=allSpecies.filter(s=>s.startMonth<=mi&&s.endMonth>=mi);
            const level=bloomLevel(bloeiend.length);
            return(
              <div key={mi} style={{display:"grid",gridTemplateColumns:"60px 80px 1fr",gap:8,alignItems:"start",padding:"7px 10px",borderRadius:8,background:level==="geen"?"#fff5f5":level==="schaars"?"#fffbf0":"#f6fdf4",border:`1px solid ${level==="geen"?"#fdc8c8":level==="schaars"?"#fde8a0":"#c8eac8"}`}}>
                <div style={{fontSize:13,fontWeight:700,color:K.text}}>{m}</div>
                <div>
                  <span style={{
                    display:"inline-block",padding:"2px 8px",borderRadius:12,fontSize:10,fontWeight:700,
                    background:levelColor[level],color:levelText[level]
                  }}>{levelLabel[level]}</span>
                </div>
                <div style={{display:"flex",gap:4,flexWrap:"wrap"}}>
                  {bloeiend.length===0
                    ?<span style={{fontSize:11,color:K.danger,fontStyle:"italic"}}>Geen enkele soort in bloei</span>
                    :bloeiend.map(s=>{
                      const c=kleurToColor(s.kleur)||LINE_COLORS[0];
                      return <span key={s.id} style={{fontSize:10,padding:"1px 7px",borderRadius:10,background:c,color:"#fff",fontWeight:600,textShadow:"0 1px 2px rgba(0,0,0,.3)"}}>{s.naam}</span>;
                    })
                  }
                </div>
              </div>
            );
          })}
        </div>
      </Card>

      {/* SUGGESTIES — boven tuinhoek */}
      <Card style={{borderLeft:`3px solid ${K.accent}`,background:"#F6FDF6",marginBottom:16}}>
        <div style={{fontSize:13,fontWeight:700,color:K.accentDark,marginBottom:12}}>💡 Suggesties voor betere spreiding</div>
        <div style={{display:"flex",flexDirection:"column",gap:10}}>
          {gapMonths.length>0&&<div style={{padding:"10px 14px",borderRadius:8,background:"#fff3cd",border:"1px solid #fde8a0"}}>
            <div style={{fontSize:12,fontWeight:700,color:"#7a4020",marginBottom:4}}>⚠️ Maanden met weinig of geen bloei</div>
            <div style={{fontSize:13,color:"#5a3010",marginBottom:6}}><strong>{gapMonths.join(", ")}</strong> hebben minder dan 2 soorten in bloei.</div>
            {gapMonths.map(m=>{
              const mi=MONTH_LABELS.indexOf(m);
              const suggestions=[];
              if(mi<=1||mi>=10) suggestions.push("Sneeuwklokjes (Galanthus), Krokus, Helleborus, Winterakoniet");
              else if(mi<=3) suggestions.push("Muscari, Doronicum, Primula, Pulmonaria, Bergenia");
              else if(mi<=4) suggestions.push("Geranium macrorrhizum, Baptisia, Camassia, Allium");
              else if(mi>=8) suggestions.push("Anemone hupehensis, Aster, Sedum, Cyclamen hederifolium");
              else suggestions.push("Echinacea, Helenium, Agastache, Penstemon");
              return <div key={m} style={{fontSize:12,color:K.muted,marginTop:3}}>→ {MONTH_FULL[mi]}: overweeg {suggestions[0]}</div>;
            })}
          </div>}
          {gapMonths.length===0&&<div style={{padding:"10px 14px",borderRadius:8,background:"#d4edda",border:"1px solid #b8dfc4"}}>
            <div style={{fontSize:13,fontWeight:700,color:"#1a5a2a"}}>🎉 Elke maand heeft minimaal 2 soorten in bloei!</div>
          </div>}
        </div>
      </Card>

      {/* Bloei per tuindeel — losstaand venster */}
      {pins.length>0&&<Card style={{marginBottom:16}}>
        <div style={{fontSize:13,fontWeight:700,color:K.text,marginBottom:4}}>Bloei per tuindeel</div>
        <p style={{fontSize:12,color:K.muted,margin:"0 0 12px",lineHeight:1.6}}>De plattegrond is verdeeld in 4 gelijke delen op basis van de getekende omtrek.</p>

        {/* 1 — Plattegrond met kwadranten BINNEN de omtrek */}
        {(()=>{
          const gm=gardenMap;
          const MCELL=16;
          const mc=gm.cols||20, mr=gm.rows||16;
          const rawOutline=gm.outline||[];
          if(!gm.outlineClosed||rawOutline.length<3) return null;
          const moutline=rawOutline.map(p=>({x:p.x*(MCELL/28),y:p.y*(MCELL/28)}));
          const moutlinePts=moutline.map(p=>`${p.x.toFixed(1)},${p.y.toFixed(1)}`).join(" ");
          const mpins=gm.pins||[];
          // Tight crop around outline
          const mxs=moutline.map(p=>p.x), mys=moutline.map(p=>p.y);
          const PADm=MCELL*1.5;
          const vx2=Math.max(0,Math.min(...mxs)-PADm), vy2=Math.max(0,Math.min(...mys)-PADm);
          const vw2=Math.max(...mxs)+PADm-vx2, vh2=Math.max(...mys)+PADm-vy2;
          const quadColors=["rgba(46,90,61,.15)","rgba(196,112,58,.15)","rgba(26,74,106,.15)","rgba(106,74,26,.15)"];
          const clipId="qclip"+Math.random().toString(36).slice(2,7);
          return(
            <div style={{marginBottom:16,display:"inline-block",borderRadius:8,overflow:"hidden",border:`1px solid ${K.border}`}}>
              <svg viewBox={`${vx2} ${vy2} ${vw2} ${vh2}`} style={{display:"block",width:Math.min(vw2,280),background:"#d4cdc4"}}>
                <defs>
                  <clipPath id={clipId}>
                    <polygon points={moutlinePts}/>
                  </clipPath>
                </defs>
                {/* Outside tint */}
                <rect x={vx2} y={vy2} width={vw2} height={vh2} fill="#d4cdc4"/>
                {/* Outline fill */}
                <polygon points={moutlinePts} fill="rgba(240,236,226,.95)" stroke="none"/>
                {/* Everything inside outline clipped */}
                <g clipPath={`url(#${clipId})`}>
                  {/* Cell grid (0.5m × 0.5m cells) — subtle */}
                  {Array.from({length:Math.ceil(vh2/MCELL)+1},(_,ri)=>{
                    const y2=Math.floor(vy2/MCELL)*MCELL+ri*MCELL;
                    return <line key={`h${ri}`} x1={vx2} y1={y2} x2={vx2+vw2} y2={y2} stroke="rgba(180,170,155,.3)" strokeWidth={.4}/>;
                  })}
                  {Array.from({length:Math.ceil(vw2/MCELL)+1},(_,ci)=>{
                    const x2=Math.floor(vx2/MCELL)*MCELL+ci*MCELL;
                    return <line key={`v${ci}`} x1={x2} y1={vy2} x2={x2} y2={vy2+vh2} stroke="rgba(180,170,155,.3)" strokeWidth={.4}/>;
                  })}
                  {/* Quadrant shading — 4 equal parts based on outline bbox midpoint */}
                  {(()=>{
                    // midpoint in MCELL coords = midCol/midRow * MCELL (same scale)
                    const mx=midCol*MCELL, my=midRow*MCELL;
                    // large enough to cover entire outline
                    const BIG=Math.max(mc,mr)*MCELL*2;
                    return [
                      {qi:0,x:-BIG,y:-BIG,w:mx+BIG,h:my+BIG, fill:"rgba(46,90,61,.14)"},
                      {qi:1,x:mx,  y:-BIG,w:BIG*2, h:my+BIG, fill:"rgba(196,112,58,.14)"},
                      {qi:2,x:-BIG,y:my,  w:mx+BIG,h:BIG*2,  fill:"rgba(26,74,106,.14)"},
                      {qi:3,x:mx,  y:my,  w:BIG*2, h:BIG*2,  fill:"rgba(106,74,26,.14)"},
                    ].map(({qi,x,y,w,h,fill})=><rect key={qi} x={x} y={y} width={w} height={h} fill={fill}/>);
                  })()}
                  {/* Midlines */}
                  <line x1={midCol*MCELL} y1={vy2-10} x2={midCol*MCELL} y2={vy2+vh2+10} stroke="rgba(0,0,0,.35)" strokeWidth={1.2} strokeDasharray="4 3"/>
                  <line x1={vx2-10} y1={midRow*MCELL} x2={vx2+vw2+10} y2={midRow*MCELL} stroke="rgba(0,0,0,.35)" strokeWidth={1.2} strokeDasharray="4 3"/>
                  {/* Pins */}
                  {mpins.map(p=><circle key={p.id} cx={p.c*MCELL+MCELL/2} cy={p.r*MCELL+MCELL/2} r={3.5} fill={p.color||"#2E5A3D"} stroke="#fff" strokeWidth={1}/>)}
                  {/* LB/RB/LO/RO labels at midpoint of each quadrant bbox */}
                  {(()=>{
                    const mx=midCol*MCELL, my=midRow*MCELL;
                    const mxs2=moutline.map(p=>p.x), mys2=moutline.map(p=>p.y);
                    const oMinX=Math.min(...mxs2),oMaxX=Math.max(...mxs2);
                    const oMinY=Math.min(...mys2),oMaxY=Math.max(...mys2);
                    return [
                      {lbl:"LB",cx:(oMinX+mx)/2,cy:(oMinY+my)/2},
                      {lbl:"RB",cx:(mx+oMaxX)/2,cy:(oMinY+my)/2},
                      {lbl:"LO",cx:(oMinX+mx)/2,cy:(my+oMaxY)/2},
                      {lbl:"RO",cx:(mx+oMaxX)/2,cy:(my+oMaxY)/2},
                    ].map(({lbl,cx,cy})=>(
                      <text key={lbl} x={cx} y={cy+4} textAnchor="middle" fontSize={10} fill="rgba(0,0,0,.45)" fontWeight="800">{lbl}</text>
                    ));
                  })()}
                </g>
                {/* Outline border on top */}
                <polygon points={moutlinePts} fill="none" stroke="#2E5A3D" strokeWidth={1.5} strokeLinejoin="round"/>
              </svg>
            </div>
          );
        })()}

        {/* 2 — Per-hoek: ontbrekende maanden */}
        {quadrantGaps.filter(q=>q.emptyMonths.length>0).length>0&&<div style={{marginBottom:14}}>
          <div style={{fontSize:12,fontWeight:700,color:K.muted,textTransform:"uppercase",letterSpacing:.4,marginBottom:8}}>Ontbrekende bloei per hoek</div>
          <div style={{display:"flex",flexDirection:"column",gap:6}}>
            {quadrantGaps.map(q=>{
              const qColors=["#2E5A3D","#C4703A","#1A4A6A","#6A4A1A"];
              const qIdx=["Links boven","Rechts boven","Links onder","Rechts onder"].indexOf(q.name);
              const qColor=qColors[qIdx]||K.accent;
              return(
                <div key={q.name} style={{display:"flex",alignItems:"flex-start",gap:10,padding:"8px 12px",borderRadius:8,background:"#fafafa",border:`1px solid ${K.border}`}}>
                  <span style={{width:10,height:10,borderRadius:2,background:qColor,flexShrink:0,marginTop:3}}/>
                  <div style={{flex:1}}>
                    <span style={{fontSize:12,fontWeight:700,color:qColor}}>{q.name}</span>
                    {q.emptyMonths.length===0
                      ?<span style={{fontSize:11,color:"#2a7a2a",marginLeft:8}}>✓ Doorlopende bloei</span>
                      :<span style={{fontSize:11,color:K.danger,marginLeft:8}}>ontbreekt in: {q.emptyMonths.join(", ")}</span>
                    }
                  </div>
                  <span style={{fontSize:10,color:K.muted,flexShrink:0}}>{q.pinCount} pin{q.pinCount!==1?"s":""}</span>
                </div>
              );
            })}
          </div>
        </div>}

        {/* 3 — Grafieken per hoek */}
        <div style={{fontSize:12,fontWeight:700,color:K.muted,textTransform:"uppercase",letterSpacing:.4,marginBottom:8}}>Bloei per maand per hoek</div>
        <div style={{display:"grid",gridTemplateColumns:"repeat(auto-fill,minmax(200px,1fr))",gap:12}}>
          {quadrantGaps.map((q)=>{
            const maxQ=Math.max(...q.monthly,1);
            const qColors=["#2E5A3D","#C4703A","#1A4A6A","#6A4A1A"];
            const qIdx=["Links boven","Rechts boven","Links onder","Rechts onder"].indexOf(q.name);
            const qColor=qColors[qIdx]||K.accent;
            return(
              <div key={q.name} style={{border:`1px solid ${K.border}`,borderRadius:10,padding:12,background:"#fff"}}>
                <div style={{fontSize:12,fontWeight:700,color:qColor,marginBottom:8}}>◼ {q.name}</div>
                <div style={{display:"flex",gap:2,alignItems:"flex-end",height:40,marginBottom:4}}>
                  {q.monthly.map((cnt,mi)=>(
                    <div key={mi} title={`${MONTH_FULL[mi]}: ${cnt} soorten`} style={{
                      flex:1,
                      height:cnt===0?3:Math.max(4,Math.round((cnt/maxQ)*38)),
                      background:cnt===0?"#f5ede8":cnt<=1?"#fad07a":cnt<=3?"#7ac472":"#2E5A3D",
                      borderRadius:"2px 2px 0 0"
                    }}/>
                  ))}
                </div>
                <div style={{display:"flex",gap:2}}>
                  {q.monthly.map((_,mi)=>(
                    <div key={mi} style={{flex:1,fontSize:7,color:K.muted,textAlign:"center"}}>{MONTH_LABELS[mi][0]}</div>
                  ))}
                </div>
              </div>
            );
          })}
        </div>
      </Card>}

    </>}

    {/* No data state for analyse */}
    {activeView==="analyse"&&allSpecies.length===0&&<Card>
      <EmptyState icon={<Icons.flower size={32} color={K.accent}/>} title="Geen bloeigegevens beschikbaar" sub="Voeg planten met bloeiperiode toe om de analyse te zien."/>
    </Card>}

    {/* ═══ BLOEI-PLATTEGROND VIEW ═══ */}
    {activeView==="plattegrond"&&(()=>{
      const gPins = gardenMap?.pins||[];
      const gCells = gardenMap?.cells||{};
      const gOutline = gardenMap?.outline||[];
      const gOutlineClosed = gardenMap?.outlineClosed||false;
      const gCols = gardenMap?.cols||20, gRows = gardenMap?.rows||16;
      const allPF = allPlantsFlat;

      if(!gOutlineClosed||gOutline.length<3){
        return(<Card><EmptyState icon={<Icons.map size={32} color={K.muted}/>} title="Nog geen plattegrond" sub="Teken eerst een tuinomtrek en voeg plantpins toe in het tabblad Plattegrond."/></Card>);
      }
      if(gPins.length===0){
        return(<Card><EmptyState icon={<Icons.plant size={32} color={K.muted}/>} title="Geen pins op de plattegrond" sub="Voeg plantpins toe in het tabblad Plattegrond om de bloei-overlay te gebruiken."/></Card>);
      }

      // Coordinate helpers — use original 28px cell size
      const GCELL=28;
      const outPts=gOutline.map(p=>`${p.x},${p.y}`).join(" ");
      function gCellInOL(r,c){
        if(!gOutlineClosed||gOutline.length<3) return true;
        return pointInPolygon(c*GCELL+GCELL/2, r*GCELL+GCELL/2, gOutline);
      }
      function gGetZone(r,c){return gCells[`${r}_${c}`]||null;}
      function gGetPins(r,c){return gPins.filter(p=>p.r===r&&p.c===c);}

      // Tight crop with padding
      const PAD=2;
      const xs=gOutline.map(p=>Math.floor(p.x/GCELL)), ys=gOutline.map(p=>Math.floor(p.y/GCELL));
      const c0t=Math.max(0,Math.min(...xs)-PAD), c1t=Math.min(gCols-1,Math.max(...xs)+PAD);
      const r0t=Math.max(0,Math.min(...ys)-PAD), r1t=Math.min(gRows-1,Math.max(...ys)+PAD);
      const vx=c0t*GCELL, vy=r0t*GCELL, vw=(c1t-c0t+2)*GCELL, vh=(r1t-r0t+2)*GCELL;

      // Which pins bloom in the selected window
      function pinBlooms(pin){
        const plant=allPF.find(x=>x.id===pin.plantId);
        if(!plant) return false;
        const si=getMonthIdx(plant.bloeiStart), ei=getMonthIdx(plant.bloeiEind);
        if(si<0||ei<0) return false;
        const ps=MONTH_STARTS[si], pe=(MONTH_STARTS[ei+1]||365)-1;
        return ps<=bloeiWin[1]&&pe>=bloeiWin[0];
      }

      // Count blooming pins
      const bloomingPins=gPins.filter(pinBlooms);
      const totalPins=gPins.length;

      return(<>
        <Card style={{background:"#fff8fe",border:"1.5px solid #e0b0d8",marginBottom:12}}>
          <div style={{fontSize:13,fontWeight:700,color:"#8a2a6a",marginBottom:6}}>🌸 Bloei-plattegrond</div>
          <div style={{fontSize:12,color:K.muted,marginBottom:14}}>Sleep het venster om te zien welke planten wanneer bloeien. Elke pin toont zijn bloeikleur wanneer actief.</div>

          {/* Tijdlijn */}
          <BloeiTimeline/>

          {/* Stat bar */}
          <div style={{display:"flex",gap:16,marginTop:10,marginBottom:14,flexWrap:"wrap"}}>
            <div style={{fontSize:12,color:"#8a2a6a",fontWeight:700}}>
              🌸 {bloomingPins.length} van {totalPins} pin{totalPins!==1?"s":""} bloeit nu
            </div>
            {bloomingPins.length>0&&<div style={{fontSize:12,color:K.muted}}>
              {[...new Set(bloomingPins.map(p=>p.naam))].slice(0,5).join(", ")}{[...new Set(bloomingPins.map(p=>p.naam))].length>5?"…":""}
            </div>}
          </div>

          {/* Kaart */}
          <div style={{borderRadius:10,overflow:"hidden",border:`2px solid #d0a0c8`,background:"#d4cdc4"}}>
            <svg viewBox={`${vx} ${vy} ${vw} ${vh}`} style={{display:"block",width:"100%",background:"#d4cdc4"}}>
              {/* outside tint */}
              <rect x={vx} y={vy} width={vw} height={vh} fill="#c8c1b8"/>
              {/* outline fill */}
              <polygon points={outPts} fill="rgba(245,241,234,.97)" stroke="none"/>
              {/* zone cells */}
              {Array.from({length:r1t-r0t+2},(_,ri)=>Array.from({length:c1t-c0t+2},(_,ci)=>{
                const r=r0t+ri, c=c0t+ci;
                if(!gCellInOL(r,c)) return null;
                const z=gGetZone(r,c); const zd=z?ZONE_DEF[z]:null;
                const cellPins=gGetPins(r,c);
                return(<g key={`${r}_${c}`}>
                  <rect x={c*GCELL} y={r*GCELL} width={GCELL} height={GCELL}
                    fill={zd?zd.fill:"transparent"} stroke="rgba(180,170,155,.3)" strokeWidth={.3}/>
                  {/* Single pin */}
                  {cellPins.length===1&&(()=>{
                    const p=cellPins[0];
                    const blooming=pinBlooms(p);
                    const pinColor=blooming?p.color:"#c8c0b8";
                    return(<g>
                      {/* shadow */}
                      <ellipse cx={c*GCELL+GCELL/2} cy={r*GCELL+GCELL-4} rx={5} ry={2.5} fill="rgba(0,0,0,.15)" opacity={blooming?1:.3}/>
                      {/* pin body */}
                      <path d={`M${c*GCELL+GCELL/2} ${r*GCELL+GCELL-5} C${c*GCELL+GCELL/2-6} ${r*GCELL+GCELL-10} ${c*GCELL+GCELL/2-7} ${r*GCELL+5} ${c*GCELL+GCELL/2} ${r*GCELL+4} C${c*GCELL+GCELL/2+7} ${r*GCELL+5} ${c*GCELL+GCELL/2+6} ${r*GCELL+GCELL-10} ${c*GCELL+GCELL/2} ${r*GCELL+GCELL-5}Z`}
                        fill={pinColor} stroke={blooming?"#fff":"#ddd"} strokeWidth={1.5} opacity={blooming?1:.35}/>
                      {/* highlight dot */}
                      <circle cx={c*GCELL+GCELL/2} cy={r*GCELL+8} r={3.5} fill="#fff" opacity={blooming?.85:.2}/>
                      {/* bloom ring */}
                      {blooming&&<circle cx={c*GCELL+GCELL/2} cy={r*GCELL+GCELL/2} r={GCELL/2-1} fill="none" stroke={p.color} strokeWidth={1.5} opacity={.45} strokeDasharray="3 2"/>}
                    </g>);
                  })()}
                  {/* Multiple pins */}
                  {cellPins.length>1&&(()=>{
                    const positions=[[.22,.25],[.78,.25],[.22,.75],[.78,.75]];
                    return(<g>{cellPins.slice(0,4).map((p,pi)=>{
                      const [fx,fy]=positions[pi]||[.5,.5];
                      const blooming=pinBlooms(p);
                      return(<g key={p.id}>
                        <circle cx={c*GCELL+fx*GCELL} cy={r*GCELL+fy*GCELL} r={5}
                          fill={blooming?p.color:"#c8c0b8"} stroke={blooming?"#fff":"#ddd"} strokeWidth={1} opacity={blooming?1:.3}/>
                        {blooming&&<circle cx={c*GCELL+fx*GCELL} cy={r*GCELL+fy*GCELL} r={7}
                          fill="none" stroke={p.color} strokeWidth={1} opacity={.4}/>}
                      </g>);
                    })}</g>);
                  })()}
                </g>);
              }))}
              {/* outline border on top */}
              <polygon points={outPts} fill="none" stroke="#2E5A3D" strokeWidth={1.5} strokeLinejoin="round"/>
              {/* subtle grid */}
              {Array.from({length:r1t-r0t+3},(_,r)=><line key={`h${r}`} x1={vx} y1={(r0t+r)*GCELL} x2={vx+vw} y2={(r0t+r)*GCELL} stroke="rgba(180,170,155,.2)" strokeWidth={.3}/>)}
              {Array.from({length:c1t-c0t+3},(_,c)=><line key={`v${c}`} x1={(c0t+c)*GCELL} y1={vy} x2={(c0t+c)*GCELL} y2={vy+vh} stroke="rgba(180,170,155,.2)" strokeWidth={.3}/>)}
              {/* metre labels */}
              {Array.from({length:Math.floor((c1t-c0t+1)/2)+1},(_,i)=>{
                const mc=c0t+i*2; if(mc>c1t+1) return null;
                return <text key={`ml${i}`} x={(mc+1)*GCELL} y={(r1t+2)*GCELL+10} fontSize={8} fill="#999" textAnchor="middle">{Math.round(mc*0.5)}m</text>;
              })}
            </svg>
          </div>

          {/* Legenda bloeiende planten */}
          {bloomingPins.length>0&&<div style={{marginTop:12}}>
            <div style={{fontSize:11,fontWeight:700,color:K.muted,textTransform:"uppercase",letterSpacing:.4,marginBottom:6}}>Bloeiend in dit venster</div>
            <div style={{display:"flex",gap:6,flexWrap:"wrap"}}>
              {[...new Map(bloomingPins.map(p=>[p.plantId,p])).values()].map(pin=>{
                const plant=allPF.find(x=>x.id===pin.plantId);
                const si=plant?getMonthIdx(plant.bloeiStart):-1;
                const ei=plant?getMonthIdx(plant.bloeiEind):-1;
                return(
                  <div key={pin.plantId} style={{display:"flex",alignItems:"center",gap:6,padding:"4px 10px",borderRadius:20,background:"#fff",border:`1.5px solid ${pin.color}`,fontSize:12}}>
                    <span style={{width:10,height:10,borderRadius:"50%",background:pin.color,flexShrink:0}}/>
                    <span style={{fontWeight:600}}>{pin.naam}</span>
                    {si>=0&&ei>=0&&<span style={{fontSize:10,color:K.muted}}>{MONTH_LABELS[si]}–{MONTH_LABELS[ei]}</span>}
                    <span style={{fontSize:10,color:K.muted}}>×{gPins.filter(p=>p.plantId===pin.plantId).length}</span>
                  </div>
                );
              })}
            </div>
          </div>}

          {bloomingPins.length===0&&gPins.length>0&&<div style={{marginTop:10,padding:"10px 14px",borderRadius:8,background:"#f5ede8",border:"1px solid #e8c8b8",fontSize:12,color:"#8a4020"}}>
            🌿 Geen planten bloeien in dit venster. Schuif de tijdlijn om een andere periode te kiezen.
          </div>}
        </Card>
      </>);
    })()}

  </div>);
}
