          <div onClick={e=>e.stopPropagation()} style={{background:"#FEFBFF",borderRadius:16,maxWidth:380,width:"100%",boxShadow:"0 24px 60px rgba(0,0,0,.25)",overflow:"hidden"}}>
            <div style={{background:isBlooming?"linear-gradient(135deg,#c060a0,#8a2a6a)":"linear-gradient(135deg,#888,#555)",padding:"16px 16px 12px",position:"relative"}}>
              <button onClick={()=>setPinDetailPopup(null)} style={{position:"absolute",top:10,right:10,background:"rgba(255,255,255,.2)",border:"none",borderRadius:"50%",width:28,height:28,cursor:"pointer",color:"#fff",fontSize:16,display:"flex",alignItems:"center",justifyContent:"center"}}>✕</button>
              <div style={{fontSize:18,fontWeight:700,color:"#fff",marginBottom:2}}>{pinDetailPopup.naam}</div>
              {plant?.latijn&&<div style={{fontSize:12,color:"rgba(255,255,255,.8)",fontStyle:"italic"}}>{plant.latijn}</div>}
              <div style={{marginTop:8,display:"inline-flex",alignItems:"center",gap:6,padding:"3px 10px",borderRadius:20,
                background:isBlooming?"rgba(255,255,255,.25)":"rgba(255,255,255,.15)",fontSize:12,fontWeight:600,color:"#fff"}}>
                {isBlooming?"🌸 Bloeit in dit venster":"🌿 Bloeit niet in dit venster"}
              </div>
            </div>
            {photo&&<div style={{width:"100%",height:160,overflow:"hidden",background:"#f0e8f0"}}>
              <img src={photo} alt={pinDetailPopup.naam} style={{width:"100%",height:"100%",objectFit:"cover"}}/>
            </div>}
            {!photo&&<div style={{width:"100%",height:72,background:"linear-gradient(135deg,#f5e8f5,#ede0f0)",display:"flex",alignItems:"center",justifyContent:"center"}}>
              <span style={{fontSize:36,opacity:.3}}>🌸</span>
            </div>}
            <div style={{padding:"14px 16px 18px"}}>
              <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:7,marginBottom:12}}>
                {[
                  ["🌸 Bloei",bloeiStr],
                  ["🎨 Kleur", plant?.kleur||"—"],
                  ["☀️ Licht", plant?.licht||"—"],
                  ["📏 Hoogte", plant?.hoogte?plant.hoogte+" cm":"—"],
                  plant?.type?["🌿 Type",plant.type]:null,
                  plant?.inheems?["🏡 Inheems",plant.inheems]:null,
                  plant?.dracht?["🐝 Dracht",plant.dracht]:null,
                  plant?.geur?["👃 Geur",plant.geur]:null,
                ].filter(Boolean).map(([k,v])=>(
                  <div key={k} style={{padding:"6px 9px",background:"#f8f0ff",borderRadius:7}}>
                    <div style={{fontSize:10,fontWeight:700,color:"#a060a0",textTransform:"uppercase",letterSpacing:.3}}>{k}</div>
                    <div style={{fontSize:12,color:K.text,marginTop:1,fontWeight:500}}>{v}</div>
                  </div>
                ))}
              </div>
              <button onClick={()=>setPinDetailPopup(null)} style={{width:"100%",padding:"9px",borderRadius:8,border:"1px solid #d0a0d0",background:"#fff",fontSize:13,cursor:"pointer",fontWeight:600,color:"#8a2a6a",fontFamily:"inherit"}}>Sluiten</button>
            </div>
          </div>
        </div>
      );
    })()}

    {/* Resize modal */}
    <Modal open={showSizeModal} onClose={()=>setShowSizeModal(false)} title="Raster formaat">
      <p style={{fontSize:13,color:K.muted,marginBottom:14}}>Stel de afmeting in van het raster. Elk vakje = 0,5×0,5 meter.</p>
      <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:12}}>
        <Input label="Breedte (kolommen)" type="number" value={sizeForm.cols}
          onChange={e=>setSizeForm(p=>({...p,cols:e.target.value}))} min={4} max={60}/>
        <Input label="Hoogte (rijen)" type="number" value={sizeForm.rows}
          onChange={e=>setSizeForm(p=>({...p,rows:e.target.value}))} min={4} max={50}/>
      </div>
      <p style={{fontSize:11,color:K.muted,margin:"0 0 14px"}}>
        → {(sizeForm.cols*.5).toFixed(1)} m breed × {(sizeForm.rows*.5).toFixed(1)} m hoog
        = {(sizeForm.cols*sizeForm.rows*.25).toFixed(1)} m²
      </p>
      <div style={{display:"flex",gap:8,justifyContent:"flex-end"}}>
        <Button variant="secondary" onClick={()=>setShowSizeModal(false)}>Annuleren</Button>
        <Button onClick={resizeGrid}>Opslaan</Button>
      </div>
    </Modal>
  </div>);
}

// ═══════════════════════════════════════════════════════════════════
// FOTOJOURNAAL TAB
// ═══════════════════════════════════════════════════════════════════
function LogboekTab({journal,setJournal}){
  const [logView,setLogView]=useState("notities"); // "notities" | "timelaps"

  // ── NOTITIES state ──
  const [notes,setNotes]=useState(()=>{try{const v=localStorage.getItem("tr_notes");return v?JSON.parse(v):[];}catch(e){return [];}});
  const [showAddNote,setShowAddNote]=useState(false);
  const [noteForm,setNoteForm]=useState({titel:"",tekst:"",photos:[],datum:today()});
  const [noteSelected,setNoteSelected]=useState(null);
  const [noteEditMode,setNoteEditMode]=useState(false);
  const [noteEditForm,setNoteEditForm]=useState({});
  const noteFrRef=useRef();

  useEffect(()=>{try{localStorage.setItem("tr_notes",JSON.stringify(notes));}catch(e){};},[notes]);

  function handleNotePhotos(e){
    const files=Array.from(e.target.files||[]);
    if(!files.length) return;
    files.forEach((f,i)=>{
      const r=new FileReader();
      r.onload=ev=>{
        if(noteEditMode){
          setNoteEditForm(p=>({...p,photos:[...(p.photos||[]),ev.target.result]}));
        } else {
          setNoteForm(p=>({...p,photos:[...p.photos,ev.target.result]}));
        }
      };
      r.readAsDataURL(f);
    });
    e.target.value="";
  }

  function saveNote(){
    if(!noteForm.titel.trim()&&!noteForm.tekst.trim()) return;
    setNotes(p=>[{id:uid(),titel:noteForm.titel,tekst:noteForm.tekst,photos:noteForm.photos,datum:noteForm.datum,aangemaakt:new Date().toISOString()},...p]);
    setNoteForm({titel:"",tekst:"",photos:[],datum:today()});
    setShowAddNote(false);
  }
  function deleteNote(id){setNotes(p=>p.filter(n=>n.id!==id));setNoteSelected(null);}
  function saveNoteEdit(){
    setNotes(p=>p.map(n=>n.id===noteSelected.id?{...n,...noteEditForm}:n));
    setNoteSelected(s=>({...s,...noteEditForm}));
    setNoteEditMode(false);
  }

  // ── TIME-LAPS state ──
  const [showCapture,setShowCapture]=useState(false);
  const [spots,setSpots]=useState(()=>{try{const v=localStorage.getItem("tr_spots");return v?JSON.parse(v):[];}catch(e){return [];}});
  const [selectedSpot,setSelectedSpot]=useState(null);
  const [showAddSpot,setShowAddSpot]=useState(false);
  const [spotForm,setSpotForm]=useState({naam:"",beschrijving:"",referencePhoto:null});
  const [captureSpot,setCaptureSpot]=useState(null);
  const [capturePhoto,setCapturePhoto]=useState(null);
  const [showTimelapse,setShowTimelapse]=useState(null);
  const [tlFrame,setTlFrame]=useState(0);
  const [tlPlaying,setTlPlaying]=useState(true);
  const [tlSpeed,setTlSpeed]=useState(600); // ms per frame
  const [tlMakingVideo,setTlMakingVideo]=useState(false);
  const [tlVideoUrl,setTlVideoUrl]=useState(null);
  const tlRef=useRef();
  const frRef=useRef();
  const capRef=useRef();
  const today_str=today();

  useEffect(()=>{try{localStorage.setItem("tr_spots",JSON.stringify(spots));}catch(e){};},[spots]);

  function handleSpotPhoto(e,setter){
    const f=e.target.files?.[0];if(!f)return;
    const r=new FileReader();r.onload=ev=>setter(ev.target.result);r.readAsDataURL(f);e.target.value="";
  }
  function saveSpot(){
    if(!spotForm.naam.trim()) return;
    setSpots(prev=>[...prev,{id:uid(),naam:spotForm.naam,beschrijving:spotForm.beschrijving,referencePhoto:spotForm.referencePhoto,created:today_str}]);
    setSpotForm({naam:"",beschrijving:"",referencePhoto:null});
    setShowAddSpot(false);
  }
  function savePhoto(){
    if(!capturePhoto||!captureSpot) return;
    setJournal(prev=>[...prev,{id:uid(),spotId:captureSpot.id,date:today_str,photo:capturePhoto,time:new Date().toLocaleTimeString("nl",{hour:"2-digit",minute:"2-digit"})}]);
    setCapturePhoto(null);setCaptureSpot(null);setShowCapture(false);
  }
  function deleteEntry(id){setJournal(prev=>prev.filter(e=>e.id!==id));}
  function deleteSpot(id){setSpots(prev=>prev.filter(s=>s.id!==id));setJournal(prev=>prev.filter(e=>e.spotId!==id));}

  const tlEntries=showTimelapse?journal.filter(e=>e.spotId===showTimelapse).sort((a,b)=>a.date.localeCompare(b.date)):[];

  // Auto-advance timelapse
  useEffect(()=>{
    if(!showTimelapse||!tlPlaying||tlEntries.length===0) return;
    const iv=setInterval(()=>setTlFrame(f=>(f+1)%tlEntries.length),tlSpeed);
    return()=>clearInterval(iv);
  },[showTimelapse,tlPlaying,tlEntries.length,tlSpeed]);

  function startTimelapse(spot){setShowTimelapse(spot.id);setTlFrame(0);setTlPlaying(true);setTlVideoUrl(null);}

  // Build video from frames using Canvas + MediaRecorder
  async function buildVideo(){
    if(tlEntries.length<2) return;
    setTlMakingVideo(true);
    setTlVideoUrl(null);
    try{
      const canvas=document.createElement("canvas");
      canvas.width=640; canvas.height=480;
      const ctx=canvas.getContext("2d");
      const stream=canvas.captureStream(1); // 1fps stream, we control timing
      const chunks=[];
      // Try webm first, fallback to mp4
      const mimeType=MediaRecorder.isTypeSupported("video/webm;codecs=vp8")?"video/webm;codecs=vp8":
                     MediaRecorder.isTypeSupported("video/webm")?"video/webm":
                     MediaRecorder.isTypeSupported("video/mp4")?"video/mp4":"video/webm";
      const rec=new MediaRecorder(stream,{mimeType,videoBitsPerSecond:2000000});
      rec.ondataavailable=e=>e.data.size>0&&chunks.push(e.data);
      rec.onstop=()=>{
        const blob=new Blob(chunks,{type:mimeType});
        setTlVideoUrl(URL.createObjectURL(blob));
        setTlMakingVideo(false);
      };
      rec.start();
      // Draw each frame
      for(let i=0;i<tlEntries.length;i++){
        await new Promise((res,rej)=>{
          const img=new Image();
          img.onload=()=>{
            ctx.clearRect(0,0,640,480);
            // Fit image in canvas
            const scale=Math.min(640/img.width,480/img.height);
            const w=img.width*scale,h=img.height*scale;
            ctx.fillStyle="#111";
            ctx.fillRect(0,0,640,480);
            ctx.drawImage(img,(640-w)/2,(480-h)/2,w,h);
            // Overlay date
            ctx.fillStyle="rgba(0,0,0,.55)";
            ctx.fillRect(0,440,640,40);
            ctx.fillStyle="#fff";
            ctx.font="bold 16px sans-serif";
            ctx.fillText(tlEntries[i].date+(tlEntries[i].time?" "+tlEntries[i].time:""),12,462);
            ctx.font="14px sans-serif";
            ctx.fillText(`${i+1}/${tlEntries.length}`,600,462);
            ctx.textAlign="right";
            res();
          };
          img.onerror=rej;
          img.src=tlEntries[i].photo;
        });
        // Hold frame for tlSpeed ms
        await new Promise(r=>setTimeout(r,Math.max(200,tlSpeed)));
      }
      rec.stop();
    }catch(err){
      console.error("Video error:",err);
      setTlMakingVideo(false);
      alert("Video maken mislukt: "+err.message+"\nProbeer een moderne browser (Chrome/Edge).");
    }
  }

  const todayPhotos=new Set(journal.filter(e=>e.date===today_str).map(e=>e.spotId));

  return(<div>
    {/* Header + toggle */}
    <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:16,flexWrap:"wrap",gap:8}}>
      <div>
        <h2 style={{margin:0,fontSize:22,color:K.text}}>Logboek</h2>
        <p style={{margin:"4px 0 0",fontSize:13,color:K.muted}}>
          {logView==="notities"?`${notes.length} notitie${notes.length!==1?"s":""}`:`${spots.length} locatie${spots.length!==1?"s"} · ${journal.length} foto's`}
        </p>
      </div>
      <div style={{display:"flex",gap:8,alignItems:"center"}}>
        <div style={{display:"inline-flex",background:"#fff",border:`1px solid ${K.border}`,borderRadius:10,padding:3,gap:3}}>
          {[["notities","📝 Notities"],["timelaps","🎬 Time-laps"]].map(([v,l])=>(
            <button key={v} onClick={()=>setLogView(v)} style={{
              padding:"6px 14px",borderRadius:7,border:"none",cursor:"pointer",
              background:logView===v?"#C4703A":"transparent",
              color:logView===v?"#fff":K.muted,
              fontSize:12,fontWeight:logView===v?700:500,fontFamily:"inherit",transition:"all .15s"
            }}>{l}</button>
          ))}
        </div>
        {logView==="notities"&&<Button onClick={()=>setShowAddNote(true)} style={{background:"#C4703A"}}><Icons.plus size={14}/>Notitie</Button>}
        {logView==="timelaps"&&<Button onClick={()=>setShowAddSpot(true)} style={{background:"#C4703A"}}><Icons.plus size={14}/>Locatie</Button>}
      </div>
    </div>

    {/* ══ NOTITIES VIEW ══ */}
    {logView==="notities"&&<>
      {notes.length===0&&<Card><EmptyState icon={<span style={{fontSize:32}}>📝</span>} title="Nog geen notities" sub="Schrijf hier observaties, ideeën of aantekeningen over je tuin — voeg ook foto's toe."/></Card>}
      <div style={{display:"flex",flexDirection:"column",gap:12}}>
        {notes.map(n=>(
          <Card key={n.id} onClick={()=>{setNoteSelected(n);setNoteEditMode(false);setNoteEditForm({titel:n.titel,tekst:n.tekst,photos:n.photos||[],datum:n.datum});}} style={{cursor:"pointer",borderLeft:"3px solid #C4703A"}}>
            <div style={{display:"flex",justifyContent:"space-between",alignItems:"flex-start",marginBottom:4}}>
              <div style={{fontSize:15,fontWeight:700,color:K.text}}>{n.titel||<span style={{fontStyle:"italic",color:K.muted}}>Zonder titel</span>}</div>
              <div style={{fontSize:11,color:K.muted,flexShrink:0,marginLeft:8}}>{n.datum}</div>
            </div>
            {n.tekst&&<div style={{fontSize:13,color:K.muted,lineHeight:1.5,marginBottom:n.photos?.length>0?8:0,overflow:"hidden",display:"-webkit-box",WebkitLineClamp:3,WebkitBoxOrient:"vertical"}}>{n.tekst}</div>}
            {n.photos?.length>0&&<div style={{display:"flex",gap:5,flexWrap:"wrap"}}>
              {n.photos.slice(0,5).map((p,i)=>(
                <img key={i} src={p} alt="" style={{width:52,height:52,objectFit:"cover",borderRadius:6,border:`1px solid ${K.border}`}}/>
              ))}
              {n.photos.length>5&&<div style={{width:52,height:52,borderRadius:6,background:K.bL,display:"flex",alignItems:"center",justifyContent:"center",fontSize:12,color:K.muted,fontWeight:700,border:`1px solid ${K.border}`}}>+{n.photos.length-5}</div>}
            </div>}
          </Card>
        ))}
      </div>

      {/* Note detail modal */}
      <Modal open={!!noteSelected} onClose={()=>{setNoteSelected(null);setNoteEditMode(false);}} title={noteEditMode?"Notitie bewerken":(noteSelected?.titel||"Notitie")} wide>
        {noteSelected&&!noteEditMode&&<>
          <div style={{fontSize:12,color:K.muted,marginBottom:12}}>{noteSelected.datum}</div>
          {noteSelected.tekst&&<div style={{fontSize:14,color:K.text,lineHeight:1.7,marginBottom:16,whiteSpace:"pre-wrap"}}>{noteSelected.tekst}</div>}
          {noteSelected.photos?.length>0&&<div style={{marginBottom:16}}>
            <div style={{fontSize:11,fontWeight:700,color:K.muted,textTransform:"uppercase",letterSpacing:.3,marginBottom:8}}>Foto's ({noteSelected.photos.length})</div>
            <div style={{display:"grid",gridTemplateColumns:"repeat(3,1fr)",gap:5}}>
              {noteSelected.photos.map((p,i)=>(
                <div key={i} style={{paddingBottom:"100%",position:"relative",borderRadius:6,overflow:"hidden"}}>
                  <img src={p} alt="" style={{position:"absolute",inset:0,width:"100%",height:"100%",objectFit:"cover"}}/>
                </div>
              ))}
            </div>
          </div>}
          <div style={{display:"flex",gap:8,justifyContent:"space-between",flexWrap:"wrap"}}>
            <Button variant="danger" onClick={()=>deleteNote(noteSelected.id)}><Icons.trash size={14}/>Verwijderen</Button>
            <Button variant="secondary" onClick={()=>setNoteEditMode(true)}><Icons.edit size={14}/>Bewerken</Button>
          </div>
        </>}
        {noteSelected&&noteEditMode&&<>
          <input ref={noteFrRef} type="file" accept="image/*" multiple onChange={handleNotePhotos} style={{display:"none"}}/>
          <Input label="Titel" value={noteEditForm.titel||""} onChange={e=>setNoteEditForm(p=>({...p,titel:e.target.value}))} placeholder="Titel van de notitie"/>
          <Input label="Datum" type="date" value={noteEditForm.datum||today()} onChange={e=>setNoteEditForm(p=>({...p,datum:e.target.value}))}/>
          <TextArea label="Tekst" value={noteEditForm.tekst||""} onChange={e=>setNoteEditForm(p=>({...p,tekst:e.target.value}))} placeholder="Schrijf je aantekeningen hier..."/>
          <div style={{marginBottom:12}}>
            <label style={{display:"block",fontSize:11,fontWeight:700,color:K.muted,marginBottom:6,textTransform:"uppercase",letterSpacing:.3}}>Foto's</label>
            <div style={{display:"flex",gap:5,flexWrap:"wrap",marginBottom:6}}>
              {(noteEditForm.photos||[]).map((p,i)=>(
                <div key={i} style={{position:"relative"}}>
                  <img src={p} alt="" style={{width:56,height:56,objectFit:"cover",borderRadius:6,border:`1px solid ${K.border}`}}/>
                  <button onClick={()=>setNoteEditForm(prev=>({...prev,photos:prev.photos.filter((_,j)=>j!==i)}))} style={{position:"absolute",top:-4,right:-4,width:16,height:16,borderRadius:"50%",background:K.danger,border:"none",color:"#fff",fontSize:9,cursor:"pointer",display:"flex",alignItems:"center",justifyContent:"center"}}>✕</button>
                </div>
              ))}
              <div onClick={()=>noteFrRef.current?.click()} style={{width:56,height:56,borderRadius:6,border:`2px dashed ${K.border}`,display:"flex",alignItems:"center",justifyContent:"center",cursor:"pointer",background:K.bL}}>
                <Icons.plus size={18} color={K.muted}/>
              </div>
            </div>
          </div>
          <div style={{display:"flex",gap:8,justifyContent:"flex-end"}}>
            <Button variant="secondary" onClick={()=>setNoteEditMode(false)}>Annuleren</Button>
            <Button onClick={saveNoteEdit} style={{background:"#C4703A"}}><Icons.check size={14}/>Opslaan</Button>
          </div>
        </>}
      </Modal>

      {/* Add note modal */}
      <Modal open={showAddNote} onClose={()=>{setShowAddNote(false);setNoteForm({titel:"",tekst:"",photos:[],datum:today()});}} title="Nieuwe notitie" wide>
        <input ref={noteFrRef} type="file" accept="image/*" multiple onChange={handleNotePhotos} style={{display:"none"}}/>
        <Input label="Titel" value={noteForm.titel} onChange={e=>setNoteForm(p=>({...p,titel:e.target.value}))} placeholder="Bijv. Eerste bloesem, Stekken genomen..."/>
        <Input label="Datum" type="date" value={noteForm.datum} onChange={e=>setNoteForm(p=>({...p,datum:e.target.value}))}/>
        <TextArea label="Tekst" value={noteForm.tekst} onChange={e=>setNoteForm(p=>({...p,tekst:e.target.value}))} placeholder="Schrijf je observatie, idee of aantekening..."/>
        <div style={{marginBottom:12}}>
          <label style={{display:"block",fontSize:11,fontWeight:700,color:K.muted,marginBottom:6,textTransform:"uppercase",letterSpacing:.3}}>Foto's toevoegen</label>
          <div style={{display:"flex",gap:5,flexWrap:"wrap",marginBottom:6}}>
            {noteForm.photos.map((p,i)=>(
              <div key={i} style={{position:"relative"}}>
                <img src={p} alt="" style={{width:56,height:56,objectFit:"cover",borderRadius:6,border:`1px solid ${K.border}`}}/>
                <button onClick={()=>setNoteForm(prev=>({...prev,photos:prev.photos.filter((_,j)=>j!==i)}))} style={{position:"absolute",top:-4,right:-4,width:16,height:16,borderRadius:"50%",background:K.danger,border:"none",color:"#fff",fontSize:9,cursor:"pointer",display:"flex",alignItems:"center",justifyContent:"center"}}>✕</button>
              </div>
            ))}
            <div onClick={()=>noteFrRef.current?.click()} style={{width:56,height:56,borderRadius:6,border:`2px dashed ${K.border}`,display:"flex",alignItems:"center",justifyContent:"center",cursor:"pointer",background:K.bL}}>
              <Icons.plus size={18} color={K.muted}/>
            </div>
          </div>
        </div>
        <div style={{display:"flex",gap:8,justifyContent:"flex-end"}}>
          <Button variant="secondary" onClick={()=>{setShowAddNote(false);setNoteForm({titel:"",tekst:"",photos:[],datum:today()});}}>Annuleren</Button>
          <Button onClick={saveNote} style={{background:"#C4703A"}} disabled={!noteForm.titel.trim()&&!noteForm.tekst.trim()}><Icons.plus size={14}/>Opslaan</Button>
        </div>
      </Modal>
    </>}

    {/* ══ TIME-LAPS VIEW ══ */}
    {logView==="timelaps"&&<>
      {/* Daily reminder */}
      {spots.length>0&&spots.some(s=>!todayPhotos.has(s.id))&&(
        <Card style={{marginBottom:16,background:"#FFF8E8",borderLeft:"3px solid #C4703A"}}>
          <div style={{fontSize:13,fontWeight:600,color:"#C4703A",marginBottom:4}}>📸 Herinnering — foto van vandaag</div>
          <div style={{fontSize:12,color:K.muted,marginBottom:8}}>{spots.filter(s=>!todayPhotos.has(s.id)).map(s=>s.naam).join(", ")} — nog geen foto vandaag.</div>
          <div style={{display:"flex",gap:8,flexWrap:"wrap"}}>
            {spots.filter(s=>!todayPhotos.has(s.id)).map(s=>(
              <button key={s.id} onClick={()=>{setCaptureSpot(s);setCapturePhoto(null);setShowCapture(true);}} style={{padding:"5px 12px",borderRadius:8,border:"none",background:"#C4703A",color:"#fff",fontSize:12,fontWeight:700,cursor:"pointer"}}>📷 {s.naam}</button>
            ))}
          </div>
        </Card>
      )}

      {spots.length===0&&<Card><EmptyState icon={<Icons.camera2 size={32} color={K.muted}/>} title="Nog geen locaties" sub="Maak een vaste locatie aan en upload elke dag een foto vanuit dezelfde plek."/></Card>}

      <div style={{display:"grid",gridTemplateColumns:"repeat(auto-fill,minmax(280px,1fr))",gap:16}}>
        {spots.map(spot=>{
          const entries=journal.filter(e=>e.spotId===spot.id).sort((a,b)=>b.date.localeCompare(a.date));
          const hasToday=todayPhotos.has(spot.id);
          const lastEntry=entries[0];
          return(
            <Card key={spot.id} style={{borderLeft:`3px solid ${hasToday?K.accent:"#E8DCC8"}`}}>
              <div style={{display:"flex",justifyContent:"space-between",alignItems:"flex-start",marginBottom:10}}>
                <div>
                  <div style={{fontSize:15,fontWeight:700,color:K.text}}>{spot.naam}</div>
                  {spot.beschrijving&&<div style={{fontSize:12,color:K.muted}}>{spot.beschrijving}</div>}
                  <div style={{fontSize:11,color:K.muted,marginTop:2}}>{entries.length} foto{entries.length!==1?"'s":""}</div>
                </div>
                <div style={{display:"flex",gap:4}}>
                  {entries.length>=2&&<button onClick={()=>startTimelapse(spot)} style={{padding:"4px 8px",borderRadius:6,border:"1px solid #C4703A",background:"#fff",fontSize:10,cursor:"pointer",color:"#C4703A",fontWeight:700}}>🎬 Video</button>}
                  <button onClick={()=>deleteSpot(spot.id)} style={{padding:"4px 8px",borderRadius:6,border:`1px solid ${K.border}`,background:"#fff",fontSize:10,cursor:"pointer",color:K.danger}}>✕</button>
                </div>
              </div>
              {lastEntry&&<div style={{width:"100%",height:160,borderRadius:8,overflow:"hidden",marginBottom:8,position:"relative"}}>
                <img src={lastEntry.photo} alt="" style={{width:"100%",height:"100%",objectFit:"cover"}}/>
                <div style={{position:"absolute",bottom:4,left:6,background:"rgba(0,0,0,.55)",color:"#fff",fontSize:10,padding:"2px 6px",borderRadius:4}}>{lastEntry.date} {lastEntry.time}</div>
                {hasToday&&<div style={{position:"absolute",top:6,right:6,background:K.accent,color:"#fff",fontSize:10,padding:"2px 8px",borderRadius:10,fontWeight:700}}>✓ Vandaag</div>}
              </div>}

function TourOverlay({ step, total, onNext, onSkip, onClose, currentTab, setTab }) {
  const s = TOUR_STEPS[step];
  const [pos, setPos] = React.useState({ top: "50%", left: "50%", transform: "translate(-50%,-50%)" });
  const [spotBox, setSpotBox] = React.useState(null);

  // Switch to the right tab when step changes
  React.useEffect(() => {
    if (s.tabIndex >= 0 && s.tabIndex !== currentTab) {
      setTab(s.tabIndex);
    }
  }, [step]);

  // Calculate tooltip position from target element
  React.useEffect(() => {
    if (!s.targetId) {
      setPos({ top: "50%", left: "50%", transform: "translate(-50%,-50%)" });
      setSpotBox(null);
      return;
    }
    function measure() {
      const el = document.getElementById(s.targetId);
      if (!el) {
        setPos({ top: "50%", left: "50%", transform: "translate(-50%,-50%)" });
        setSpotBox(null);
        return;
      }
      const r = el.getBoundingClientRect();
      const vw = window.innerWidth, vh = window.innerHeight;
      setSpotBox({ left: r.left - 6, top: r.top - 6, width: r.width + 12, height: r.height + 12 });

      // Place tooltip below the target
      const tipW = Math.min(s.wide ? 380 : 320, vw - 32);
      let tipLeft = r.left + r.width / 2 - tipW / 2;
      tipLeft = Math.max(12, Math.min(vw - tipW - 12, tipLeft));
      let tipTop = r.bottom + 18;
      if (tipTop + 180 > vh) tipTop = r.top - 180 - 18;
      setPos({ top: tipTop, left: tipLeft, transform: "none", width: tipW });
    }
    const t = setTimeout(measure, 80);
    return () => clearTimeout(t);
  }, [step, s.targetId]);

  const isFirst = step === 0;
  const isLast = !!s.isLast;
  const progress = step / (total - 1);

  return (
    <div style={{
      position: "fixed", inset: 0, zIndex: 9500,
      pointerEvents: "none",
    }}>
      {/* Dark overlay with cutout via box-shadow trick */}
      {spotBox ? (
        <div style={{
          position: "fixed",
          left: spotBox.left, top: spotBox.top,
          width: spotBox.width, height: spotBox.height,
          borderRadius: 10,
          boxShadow: "0 0 0 9999px rgba(10,25,15,0.72)",
          pointerEvents: "none",
          transition: "all .3s cubic-bezier(.4,0,.2,1)",
        }} />
      ) : (
        <div style={{
          position: "fixed", inset: 0,
          background: "rgba(10,25,15,0.72)",
          pointerEvents: "none",
        }} />
      )}

      {/* Tooltip bubble */}
      <div style={{
        position: "fixed",
        ...pos,
        width: pos.width || (s.wide ? 380 : 320),
        maxWidth: "calc(100vw - 24px)",
        background: "#fff",
        borderRadius: 16,
        boxShadow: "0 24px 72px rgba(0,0,0,.35), 0 0 0 1px rgba(46,90,61,.12)",
        padding: "22px 22px 18px",
        pointerEvents: "all",
        fontFamily: "-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif",
        transition: "top .3s cubic-bezier(.4,0,.2,1), left .3s cubic-bezier(.4,0,.2,1)",
        zIndex: 9501,
      }}>
        {/* Arrow pointing up to tab */}
        {s.arrowDir === "up" && spotBox && (
          <div style={{
            position: "absolute",
            top: -10, left: "50%", transform: "translateX(-50%)",
            width: 0, height: 0,
            borderLeft: "10px solid transparent",
            borderRight: "10px solid transparent",
            borderBottom: "10px solid #fff",
            filter: "drop-shadow(0 -3px 3px rgba(0,0,0,.1))",
          }} />
        )}

        {/* Step indicator dots */}
        <div style={{ display: "flex", gap: 5, marginBottom: 14 }}>
          {TOUR_STEPS.map((_, i) => (
            <div key={i} style={{
              height: 4, borderRadius: 2,
              flex: i === step ? 2 : 1,
              background: i === step ? "#2E5A3D" : i < step ? "#A8C8A8" : "#E8DCC8",
              transition: "all .3s",
            }} />
          ))}
        </div>

        {/* Content */}
        <div style={{
          fontSize: 11, fontWeight: 700, letterSpacing: ".12em",
          textTransform: "uppercase", color: "#2E5A3D", marginBottom: 6,
        }}>
          Stap {step + 1} van {total}
        </div>
        <h3 style={{
          margin: "0 0 10px", fontSize: 17, fontWeight: 700,
          color: "#1F3A2A", lineHeight: 1.25,
        }}>{s.title}</h3>
        <p style={{
          margin: "0 0 18px", fontSize: 13.5, lineHeight: 1.65,
          color: "#3a3028",
        }}>{s.body}</p>

        {/* Buttons */}
        <div style={{ display: "flex", gap: 8, alignItems: "center" }}>
          {!isFirst && !isLast && (
            <button onClick={onSkip} style={{
              flex: 1, padding: "8px 0", border: "1px solid #E8DCC8",
              borderRadius: 8, background: "#fff", color: "#888",
              fontSize: 13, cursor: "pointer", fontFamily: "inherit",
            }}>Overslaan</button>
          )}
          <button onClick={isLast ? onClose : onNext} style={{
            flex: isFirst || isLast ? "1" : "2",
            padding: "10px 0",
            border: "none", borderRadius: 8,
            background: isLast ? "linear-gradient(135deg,#2E5A3D,#1F3A2A)" : "#2E5A3D",
            color: "#F3EBDD", fontSize: 13, fontWeight: 700,
            cursor: "pointer", fontFamily: "inherit",
            boxShadow: "0 2px 8px rgba(46,90,61,.3)",
          }}>
            {isFirst ? "Rondleiding starten →" : isLast ? "Aan de slag! 🌱" : "Volgende →"}
          </button>
          {isFirst && (
            <button onClick={onClose} style={{
              flex: 1, padding: "10px 0", border: "1px solid #E8DCC8",
              borderRadius: 8, background: "#fff", color: "#888",
              fontSize: 13, cursor: "pointer", fontFamily: "inherit",
            }}>Overslaan</button>
          )}
        </div>
      </div>
    </div>
  );
}

  useEffect(()=>{lsSet("tr_gardenmap",gardenMap);},[gardenMap]);
  useEffect(()=>{lsSet("tr_journal",journal);},[journal]);

  // ── Auto-purge: verlopen taken ouder dan 7 dagen ──
  useEffect(()=>{
    const cutoff=new Date();cutoff.setDate(cutoff.getDate()-7);
    const cutStr=cutoff.toISOString().split("T")[0];
    setTasks(prev=>prev.filter(t=>{
      if(!t.startDate) return true;
      if(t.endDate&&t.endDate>=cutStr) return true;
      if(!t.endDate&&t.startDate>=cutStr) return true;
      return false;
    }));
  },[]);



  // Tour state

      if(!seen){ setTourStep(0); setTourStarted(true); }
    }catch(e){}
  },[]);
  function startTour(){ setTourStep(0); setTourStarted(true); }
  function nextTourStep(){ setTourStep(s => s+1); }
  function closeTour(){
    setTourStep(-1);
    try{ localStorage.setItem('tr_tour_seen','1'); }catch(e){}

    {icon:Icons.plant,label:"Inventaris"},
    {icon:Icons.chart,label:"Bloei"},
    {icon:Icons.tasks,label:"Taken"},
    {icon:Icons.camera2,label:"Logboek"},

  // ═══ SESSIE OPSLAAN & AFSLUITEN ═══════════════════════════════════
  // Expose executeTuinSave to window so inline onclick in injected HTML can reach it
  function openSaveModal(){
    const plantCount=(plants||[]).length+(bulbs||[]).length+(trees||[]).length+(pondPlants||[]).length+(veggies||[]).length+(seeds||[]).length;

    // Build the comprehensive Excel workbook with ALL tabs
    function buildExcelBlob(){
      const wb=XLSX.utils.book_new();

      function addSheet(name,headers,rows){
        if(rows.length===0&&headers.length===0) return;
        const ws=XLSX.utils.aoa_to_sheet([headers,...rows]);
        // Column widths
        ws['!cols']=headers.map((_,i)=>{
          let max=headers[i].length;
          rows.forEach(r=>{if(r[i]&&String(r[i]).length>max)max=String(r[i]).length;});
          return{wch:Math.min(max+2,45)};
        });
        XLSX.utils.book_append_sheet(wb,ws,name);
      }

      // 1. Sierplanten
      addSheet('Sierplanten',
        ['Naam','Latijn','Type','Licht','Hoogte (cm)','Breedte (cm)','Bloei start','Bloei eind','Kleur','Inheems','Droogte','Dracht','Geur','Eetbaar','Bessen','Per m²','Snoeien','Oogsten'],
        (plants||[]).map(p=>[p.naam,p.latijn,p.type,p.licht,p.hoogte,p.breedte,p.bloeiStart,p.bloeiEind,p.kleur,p.inheems,p.droogte,p.dracht,p.geur,p.eetbaar,p.bessen,p.perM2,p.snoeien||'',p.oogsten||''].map(v=>v||''))
      );

      // 2. Bollen & knollen
      addSheet('Bollen & Knollen',
        ['Naam','Latijn','Type','Licht','Hoogte (cm)','Breedte (cm)','Bloei start','Bloei eind','Kleur','Plantperiode','Plantdiepte','Oprooien','Opslag','Winterhard','Bijzonderheden'],
        (bulbs||[]).map(b=>[b.naam,b.latijn,b.type,b.licht,b.hoogte,b.breedte,b.bloeiStart,b.bloeiEind,b.kleur,b.plantPeriode,b.diepte,b.ropiePeriode,b.opslag,b.winterhard,b.bijzonderheden].map(v=>v||''))
      );

      // 3. Bomen & struiken
      addSheet('Bomen & Struiken',
        ['Naam','Latijn','Type','Licht','Hoogte (m)','Breedte (m)','Bloei start','Bloei eind','Kleur/Siereigenschap','Inheems','Winterhard','Dracht','Bessen/Vruchten','Snoeien','Bijzonderheden'],
        (trees||[]).map(t=>[t.naam,t.latijn,t.type,t.licht,t.hoogte,t.breedte,t.bloeiStart,t.bloeiEind,t.kleur,t.inheems,t.winterhard,t.dracht,t.bessen,t.snoeien,t.bijzonderheden].map(v=>v||''))
      );

      // 4. Vijver
      addSheet('Vijver',
        ['Naam','Latijn','Type','Licht','Hoogte (cm)','Waterdiepte','Bloei start','Bloei eind','Kleur','Winterhard','Dracht','Bijzonderheden'],
        (pondPlants||[]).map(p=>[p.naam,p.latijn,p.type,p.licht,p.hoogte,p.waterDiepte,p.bloeiStart,p.bloeiEind,p.kleur,p.winterhard,p.dracht,p.bijzonderheden].map(v=>v||''))
      );

      // 5. Moestuin
      addSheet('Moestuin',
        ['Naam','Latijn','Type','Licht','Hoogte (cm)','Zaai/plant start','Zaai/plant eind','Oogst start','Oogst eind','Rijafstand','Plantafstand','Zaaimethode','Grondsoort','Bemesting','Buurplanten','Bijzonderheden'],
        (veggies||[]).map(v=>[v.naam,v.latijn,v.type,v.licht,v.hoogte,v.zaaiStart,v.zaaiEind,v.oogstStart,v.oogstEind,v['rij afstand'],v.plantAfstand,v.zaaiMethode,v.grondsoort,v.bemesting,v.combineren,v.bijzonderheden].map(x=>x||''))
      );

      // 6. Zadenbank
      addSheet('Zadenbank',
        ['Naam','Latijn','Soort','Zaai start','Zaai eind','Methode','Kiemsoort','Kiemtemp.','Kiemtijd','Zaaidiepte','Zaaiafstand','Standplaats','Grond','Hoogte','Breedte','Verspenen','Uitplanten','Bloei start','Bloei eind','Kleur','Oogst','Winterhard','Houdbaarheid','Leverancier','Bijzonderheden'],
        (seeds||[]).map(s=>[s.naam,s.latijn,s.soort,s.zaaiStart,s.zaaiEind,s.zaaiMethode,s.kiemsoort,s.kiemtemperatuur,s.kiemtijd,s.zaaidiepte,s.zaaiafstand,s.standplaats,s.grondsoort,s.hoogte,s.breedte,s.verspeenMoment,s.uitplantMoment,s.bloeiStart,s.bloeiEind,s.kleur,s.oogstperiode,s.winterhard,s.houdbaarheid,s.leverancier,s.bijzonderheden].map(v=>v||''))
      );

      // 7. Taken
      addSheet('Taken',
        ['Naam','Beschrijving','Categorie','Tuindeel','Gekoppelde plant','Startdatum','Einddatum','Herhaling'],
        (tasks||[]).map(t=>[t.title,t.description||'',t.category||'',t.gardenCategory||'',t.plantLabel||'',t.startDate||'',t.endDate||'',t.repeat||''])
      );

      // 8. Plattegrond – gepinde soorten
      const pins=(gardenMap&&gardenMap.pins)||[];
      addSheet('Plattegrond – Pins',
        ['Plant naam','Kolom (0.5m)','Rij (0.5m)','Positie (m)','Kleur'],
        pins.map(p=>[p.naam,p.c+1,p.r+1,`${((p.c)*0.5).toFixed(1)}m × ${((p.r)*0.5).toFixed(1)}m`,p.kleur||''])
      );

      // 9. Wishlist
      addSheet('Verlanglijst',
        ['Naam','Latijn','Categorie','Notitie','Status'],
        (wishlist||[]).map(w=>[w.naam,w.latijn||'',w.categorie||'',w.notitie||'',w.done?'Verkregen':'Gewenst'])
      );

      // 10. Logboek
      addSheet('Logboek',
        ['Hoek naam','Datum','Tijdstip','Beschrijving'],
        (journal||[]).map(e=>{
          // We don't export the base64 photo itself, just metadata
          const spots_data=[];
          try{const sp=localStorage.getItem('tr_spots');if(sp){const arr=JSON.parse(sp);const spot=arr.find(s=>s.id===e.spotId);spots_data.push(spot?spot.naam:'Onbekend');}}catch(_){spots_data.push('Onbekend');}
          return[spots_data[0]||'Onbekend',e.date||'',e.time||'','Foto opgeslagen'];
        })
      );

      const wbout=XLSX.write(wb,{bookType:'xlsx',type:'array'});
      return new Blob([wbout],{type:'application/vnd.openxmlformats-officedocument.spreadsheetml.sheet'});
    }

    // Attach to window so onclick in injected HTML can call it
    window._tuinBuildExcel = buildExcelBlob;
    window._tuinData = {plants,bulbs,seeds,trees,pondPlants,veggies,tasks,completions,wishlist,gardenMap,journal};

    window.executeTuinSave = async function(){
      const dateStr=new Date().toISOString().split('T')[0];
      const modal=document.getElementById('tr-save-modal');
      const btn=document.getElementById('tr-save-btn');
      if(btn){btn.disabled=true;btn.textContent='Bezig met opslaan...';}

      try{
        // 1. Lokaal opslaan — altijd
        const d=window._tuinData;
        const allData={...d,savedAt:new Date().toISOString(),version:'v45'};
        const keys=['tr_plants','tr_bulbs','tr_seeds','tr_trees','tr_pond','tr_veggies','tr_tasks','tr_completions','tr_wishlist','tr_gardenmap','tr_journal'];
        const vals=[d.plants,d.bulbs,d.seeds,d.trees,d.pondPlants,d.veggies,d.tasks,d.completions,d.wishlist,d.gardenMap,d.journal];
        keys.forEach((k,i)=>{try{localStorage.setItem(k,JSON.stringify(vals[i]));}catch(e){}});

        const jsonStr=JSON.stringify(allData,null,2);
        const doEmail=document.getElementById('tr-opt-email')?.checked;
        const emailAddr=document.getElementById('tr-email-addr')?.value?.trim();

        // 2. ZIP met JSON + Excel — altijd
        const zip=new JSZip();
        zip.file(`TuinRegister-backup-${dateStr}.json`,jsonStr);
        const excelBlob=window._tuinBuildExcel();
        const excelArr=await excelBlob.arrayBuffer();
        zip.file(`TuinRegister-inventaris-${dateStr}.xlsx`,excelArr);
        const zipBlob=await zip.generateAsync({type:'blob'});
        const zipUrl=URL.createObjectURL(zipBlob);
        const zipLink=document.createElement('a');
        zipLink.href=zipUrl; zipLink.download=`TuinRegister-${dateStr}.zip`; zipLink.click();
        URL.revokeObjectURL(zipUrl);

        // 3. E-mail (optioneel)
        if(doEmail && emailAddr){
          const subject=encodeURIComponent('TuinRegister backup — '+dateStr);
          const body=encodeURIComponent('Hallo,\n\nHierbij de TuinRegister backup van '+dateStr+'.\nVoeg het gedownloade ZIP-bestand als bijlage toe.\n\nMet vriendelijke groet,\nTuinRegister');
          window.open('mailto:'+emailAddr+'?subject='+subject+'&body='+body);
        }

        // Bevestiging
        if(modal){
          modal.querySelector('div').innerHTML=`
            <div style="text-align:center;padding:32px 20px;font-family:-apple-system,sans-serif;">
              <div style="font-size:56px;margin-bottom:12px;">✅</div>
              <h2 style="color:#2E5A3D;margin:0 0 12px;font-size:22px;">Opgeslagen!</h2>

                <div style="padding:3px 0;">✓ Lokaal opgeslagen in browser</div>
                <div style="padding:3px 0;">✓ ZIP gedownload (JSON-backup + Excel met alle tabbladen)</div>
                ${doEmail&&emailAddr?'<div style="padding:3px 0;">✓ E-mail geopend naar: '+emailAddr+'</div>':''}
              </div>
              <p style="font-size:12px;color:#888;margin-bottom:16px;">De ZIP bevat een volledig herstelbare JSON-backup én een Excel-bestand met een tabblad voor Sierplanten, Bollen, Bomen, Vijver, Moestuin, Zadenbank, Taken, Plattegrond, Verlanglijst en Logboek.</p>
              <button onclick="document.getElementById('tr-save-modal').remove()" style="background:#2E5A3D;color:#fff;border:none;padding:12px 28px;border-radius:10px;font-size:15px;font-weight:700;cursor:pointer;width:100%;">↩ Doorgaan</button>
            </div>
          `;
        }
      }catch(err){
        console.error('Save error:',err);
        if(btn){btn.disabled=false;btn.textContent='✅ Opslaan & ZIP downloaden';}
        alert('Er ging iets mis: '+err.message+'\n\nProbeer het opnieuw of controleer of downloads zijn toegestaan in je browser.');
      }
    };

    const modal=document.createElement('div');
    modal.className='tr-save-modal-overlay';
    modal.id='tr-save-modal';
    modal.style.cssText='position:fixed;inset:0;background:rgba(13,31,20,.88);z-index:9000;display:flex;align-items:center;justify-content:center;padding:20px;backdrop-filter:blur(4px);';
    modal.innerHTML=`
      <div style="background:#fff;border-radius:16px;padding:32px;max-width:520px;width:100%;max-height:90vh;overflow-y:auto;box-shadow:0 32px 80px rgba(0,0,0,.3);">

          <h2 style="margin:0 0 4px;font-family:-apple-system,sans-serif;color:#1F3A2A;font-size:22px;">Opslaan & Afsluiten</h2>

            <div style="padding:2px 0;color:#2E5A3D;">💾 Lokaal opslaan in browser</div>
            <div style="padding:2px 0;color:#2E5A3D;">📦 ZIP downloaden met:</div>

            <div style="padding:2px 0;color:#2E5A3D;padding-left:16px;">• Excel met 10 tabbladen (alle inventaris, taken, plattegrond, wishlist, journaal)</div>
          </div>

          <div style="background:#fff;border:1px solid #ddd;border-radius:8px;padding:12px 14px;">
            <div style="font-weight:700;color:#555;margin-bottom:8px;">📧 E-mailen (optioneel)</div>
            <div style="display:flex;align-items:center;gap:10px;">
              <input type="checkbox" id="tr-opt-email" style="width:18px;height:18px;cursor:pointer;" onchange="document.getElementById('tr-email-addr').disabled=!this.checked;document.getElementById('tr-email-addr').style.opacity=this.checked?'1':'.5';">
              <input type="email" id="tr-email-addr" disabled placeholder="jouw@email.nl" style="flex:1;padding:7px 10px;font-size:13px;border-radius:6px;border:1px solid #ccc;opacity:.5;">
            </div>
            <div style="font-size:11px;color:#999;margin-top:5px;">Opent je e-mailprogramma met een begeleidende tekst. Voeg het ZIP-bestand zelf als bijlage toe.</div>
          </div>
        </div>

        <button id="tr-save-btn" onclick="executeTuinSave()" style="width:100%;padding:16px;background:linear-gradient(135deg,#2E5A3D,#1F3A2A);color:#fff;border:none;border-radius:10px;font-family:-apple-system,sans-serif;font-size:16px;font-weight:700;cursor:pointer;margin-top:4px;box-shadow:0 4px 14px rgba(31,58,42,.35);">

        </button>
        <button onclick="document.getElementById('tr-save-modal').remove()" style="width:100%;padding:10px;background:#fff;color:#666;border:1px solid #ddd;border-radius:10px;font-family:-apple-system,sans-serif;font-size:14px;cursor:pointer;margin-top:8px;">
          ← Terug naar TuinRegister
        </button>
        <p style="text-align:center;font-size:10px;color:#bbb;margin-top:12px;">⚠️ Je bent zelf verantwoordelijk voor het bewaren van je backups.</p>
      </div>
    `;
    document.body.appendChild(modal);
  }

  return(

,width:52,objectFit:"contain",borderRadius:6,flexShrink:0}}/>
          <div style={{flex:1}}><h1 style={{margin:0,fontSize:20,fontWeight:700,fontFamily:"-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif",letterSpacing:.5}}>TuinRegister <span style={{fontSize:12,fontWeight:600,opacity:.75,letterSpacing:.5}}>(v45)</span></h1><div style={{fontSize:11,opacity:.8,fontFamily:"-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif",letterSpacing:.5}}>Tuinbeheer & Inventaris</div></div>
          <div style={{display:"flex",gap:8,flexShrink:0,alignItems:"center"}}>
            <button onClick={startTour} title="Rondleiding starten" style={{background:"rgba(255,255,255,.12)",border:"1px solid rgba(255,255,255,.25)",borderRadius:10,cursor:"pointer",padding:"8px 12px",display:"flex",alignItems:"center",gap:6,color:"#F3EBDD",fontSize:12,fontFamily:"-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif",fontWeight:600,backdropFilter:"blur(4px)"}}>
              <span style={{fontSize:14}}>❓</span>Rondleiding
            </button>
            <button onClick={()=>openSaveModal()} style={{background:"linear-gradient(135deg,#1F3A2A,#0F1F15)",border:"none",borderRadius:10,cursor:"pointer",padding:"8px 14px",display:"flex",alignItems:"center",gap:6,color:"#F3EBDD",fontSize:12,fontFamily:"-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif",fontWeight:700,boxShadow:"0 2px 8px rgba(31,58,42,.3)"}}>
              <span style={{fontSize:14}}>💾</span>Opslaan & Afsluiten
            </button>
          </div>
        </div>
      </div>
      
      <div style={{background:"#F3EBDD",borderBottom:"2px solid #E8DCC8",position:"sticky",top:0,zIndex:100,padding:"8px 16px 0"}}>
        {/* responsive nav - grid fills full width */}
        <div style={{maxWidth:"100%",margin:"0 auto",display:"grid",gridTemplateColumns:`repeat(${tabs.length},1fr)`,gap:4}}>
          {tabs.map((t,i)=>{const ac=tabAccents[i]||K.accent;return<button id={`tab-btn-${i}`} key={i} onClick={()=>setTab(i)} style={{padding:"8px 4px 7px",border:tab===i?`2px solid ${ac}`:"2px solid #E8DCC8",borderRadius:8,background:tab===i?ac:"#FFFFFF",cursor:"pointer",display:"flex",flexDirection:"column",alignItems:"center",gap:2,color:tab===i?"#F3EBDD":"#666666",fontFamily:"-apple-system,sans-serif",fontSize:9,fontWeight:600,transition:"all .2s",letterSpacing:.2,minWidth:0,overflow:"hidden",marginBottom:6,boxShadow:tab===i?"0 3px 10px rgba(46,90,61,.35)":"none"}}>{t.icon({size:17,color:tab===i?ac:K.muted})}<span style={{overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap",width:"100%",textAlign:"center",padding:"0 1px"}}>{t.label}</span></button>;})}
        </div>
      </div>
      <div style={{maxWidth:"100%",margin:"0 auto",padding:"16px 20px 80px",fontFamily:"-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif"}}>
        {tab===0&&<Dashboard tasks={tasks} setTasks={setTasks} completions={completions} setCompletions={setCompletions} plants={plants} seeds={seeds} bulbs={bulbs}/>}
        {tab===1&&<PlattegrondTab gardenMap={gardenMap} setGardenMap={setGardenMap} allPlants={[...plants,...bulbs,...trees,...pondPlants,...veggies]} plants={plants} bulbs={bulbs} trees={trees} pondPlants={pondPlants} veggies={veggies} onNavigateInventaris={()=>setTab(4)}/>}
        {tab===2&&<MoodboardWishlistTab wishlist={wishlist} setWishlist={setWishlist} moodboard={moodboard} setMoodboard={setMoodboard}/>}
        {tab===3&&<BegrotingBudgetTab begroting={begroting} setBegroting={setBegroting} budget={budget} setBudget={setBudget}/>}
        {tab===4&&<InventarisTab plants={plants} setPlants={setPlants} bulbs={bulbs} setBulbs={setBulbs} trees={trees} setTrees={setTrees} pondPlants={pondPlants} setPondPlants={setPondPlants} veggies={veggies} setVeggies={setVeggies} seeds={seeds} setSeeds={setSeeds} tasks={tasks} setTasks={setTasks} gardenMap={gardenMap} setGardenMap={setGardenMap} onNavigatePlattegrond={()=>setTab(1)}/>}
        {tab===5&&<BloeikalenderTab plants={plants} bulbs={bulbs} trees={trees} pondPlants={pondPlants} veggies={veggies} gardenMap={gardenMap}/>}
        {tab===6&&<TaskManager tasks={tasks} setTasks={setTasks} completions={completions} setCompletions={setCompletions} plants={plants} bulbs={bulbs} trees={trees} pondPlants={pondPlants} veggies={veggies}/>}
        {tab===7&&<LogboekTab journal={journal} setJournal={setJournal}/>}
      </div>

      {/* Tour Overlay */}
      {tourStep >= 0 && (
        <TourOverlay
          step={tourStep}
          total={TOUR_STEPS.length}
          onNext={nextTourStep}
          onSkip={closeTour}
          onClose={closeTour}
          currentTab={tab}
          setTab={setTab}
        />
      )}




    </div>
  );
}

const root = ReactDOM.createRoot(document.getElementById('root'));
root.render(<CottageGardenApp />);
</script>
