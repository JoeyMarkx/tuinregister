function kleurToColor(kleur){
  if(!kleur) return "#2E5A3D";
  const k=kleur.toLowerCase();
  if(k.includes("wit")&&!k.includes("roze")&&!k.includes("geel")&&!k.includes("crème")) return "#f0ede6";
  if(k.includes("crème")||k.includes("creme")) return "#e8d5a0";
  if(k.includes("geel")) return "#f5c518";
  if(k.includes("oranje")&&!k.includes("rood")) return "#f07820";
  if(k.includes("vuurrood")||k.includes("donkerrood")) return "#c0202a";
  if(k.includes("rood")&&!k.includes("roze")) return "#e03030";
  if(k.includes("chocolade")||k.includes("bruin")) return "#7a4020";
  if(k.includes("roze-paars")||k.includes("rose-paars")) return "#c060a0";
  if(k.includes("roze")&&!k.includes("paars")) return "#f070a0";
  if(k.includes("lila")) return "#b070d0";
  if(k.includes("violet-blauw")||k.includes("violet")) return "#6040c0";
  if(k.includes("staalblauw")||k.includes("staal")) return "#4070a8";
  if(k.includes("blauw-paars")||k.includes("blauw/paars")) return "#5060c0";
  if(k.includes("blauw")) return "#3080d0";
  if(k.includes("lavendel")) return "#9090e0";
  if(k.includes("paars/wit")||k.includes("paars/roze")||k.includes("blauw/paars/wit")) return "#8050b0";
  if(k.includes("paars")) return "#8040b0";
  if(k.includes("geelgroen")) return "#80b030";
  if(k.includes("beige")) return "#c8a870";
  if(k.includes("donkerpaars/zwart")||k.includes("zwart")) return "#3a1848";
  return "#2E5A3D";
}
function plantPinColor(id, kleur){
  if(kleur) return kleurToColor(kleur);
  const P=["#E74C3C","#2ECC71","#3498DB","#F39C12","#9B59B6","#1ABC9C","#E67E22",
           "#E91E63","#00BCD4","#8BC34A","#FF5722","#607D8B","#795548","#FF9800",
           "#4CAF50","#2196F3","#9C27B0","#009688","#CDDC39","#FF5252"];
  const n=Math.abs(typeof id==="number"?id:String(id).split("").reduce((a,c)=>a+c.charCodeAt(0),0));
  return P[n%P.length];
}

const ZONE_DEF={
  zon:    {fill:"rgba(255,210,70,.38)", stroke:"#b8900a", label:"☀️ Zon"},
  halfzon:{fill:"rgba(130,190,100,.38)",stroke:"#4a7020", label:"⛅ Half zon"},
  schaduw:{fill:"rgba(90,110,155,.38)", stroke:"#304070", label:"🌑 Schaduw"},
  gazon:  {fill:"rgba(80,155,70,.30)",  stroke:"#2a6a20", label:"🌿 Gazon"},
  water:  {fill:"rgba(50,130,205,.38)", stroke:"#1a4888", label:"💧 Water"},
  pad:    {fill:"rgba(175,150,105,.44)",stroke:"#6a4818", label:"🪨 Pad"},
  terras: {fill:"rgba(185,170,140,.44)",stroke:"#7a6030", label:"🪵 Terras"},
  bed:    {fill:"rgba(140,90,60,.32)",  stroke:"#6a3818", label:"🌱 Moestuin(bed)"},
  kas:    {fill:"rgba(200,230,240,.55)",  stroke:"#1a7088", label:"🏡 Kas"},
};

// Check if grid cell centre is inside a polygon (ray-cast)
function pointInPolygon(px, py, poly){
  let inside=false;
  for(let i=0,j=poly.length-1;i<poly.length;j=i++){
    const xi=poly[i].x,yi=poly[i].y,xj=poly[j].x,yj=poly[j].y;
    if(((yi>py)!==(yj>py))&&(px<(xj-xi)*(py-yi)/(yj-yi)+xi)) inside=!inside;
  }
  return inside;
}

function PlattegrondTab({gardenMap,setGardenMap,allPlants,plants,bulbs,trees,pondPlants,veggies,onNavigateInventaris}){
  const CELL = 28;   // px per 0.5 m cell
  const {cols=20, rows=16} = gardenMap;

  // outline = array of {x,y} in GRID pixel coords (col*CELL, row*CELL)
  const outline = gardenMap.outline || [];
  const outlineClosed = gardenMap.outlineClosed || false;

  // phase: "draw" (step 1 – outline) | "edit" (step 2 – zones + pins)
  const phase = outlineClosed ? (gardenMap.phase||"edit") : "draw";

  // garden size setup — shown when outline is empty and not yet sized
  const gardenSized = gardenMap.gardenSized || false;
  const [showSizeSetup, setShowSizeSetup] = useState(!gardenSized);
  const [sizeSetupForm, setSizeSetupForm] = useState({breedte:gardenMap.gardenBreedte?String(gardenMap.gardenBreedte):"10",hoogte:gardenMap.gardenHoogte?String(gardenMap.gardenHoogte):"8"});

  function applySizeSetup(){
    const b=Math.max(1,parseFloat(sizeSetupForm.breedte)||10);
    const h=Math.max(1,parseFloat(sizeSetupForm.hoogte)||8);
    // +4 m padding on each side = +8 m = +16 cells per axis
    const newCols=Math.round(b/0.5)+16;
    const newRows=Math.round(h/0.5)+16;
    setGardenMap(prev=>({...prev,cols:newCols,rows:newRows,gardenSized:true,
      gardenBreedte:b,gardenHoogte:h}));
    setShowSizeSetup(false);
  }

  // draw-phase state
  const [cursorPos, setCursorPos] = useState(null);  // mouse pos during drawing
  const [snapPt,    setSnapPt]    = useState(null);   // snapped grid intersection

  // edit-phase state
  const [tool,      setTool]      = useState("zon");
  const [painting,  setPainting]  = useState(false);
  const [dragStart,setDragStart]=useState(null);
  const [dragEnd,  setDragEnd  ]=useState(null);
  const [showPinPicker, setShowPinPicker] = useState(false);
  const [pendingCell,   setPendingCell]   = useState(null);
  const [pinSearch,     setPinSearch]     = useState("");
  const [hoveredPin,    setHoveredPin]    = useState(null);
  const [hoveredCell,   setHoveredCell]   = useState(null);
  const [showSizeModal, setShowSizeModal] = useState(false);
  const [sizeForm,      setSizeForm]      = useState({cols, rows});
  const [selectedCell, setSelectedCell] = useState(null); // {r,c} for mouse inspect
  const [showCellInfo, setShowCellInfo] = useState(false);
  const [zoom2,setZoom2]=useState(1);  // stap 2: omtrek tekenen
  const [zoom3,setZoom3]=useState(1);  // stap 3: eigenschappen
  const [zoom4,setZoom4]=useState(1);  // stap 4: beplanting
  const [zonesConfirmed,setZonesConfirmed]=useState(gardenMap.zonesConfirmed||false);
  const [beplantingConfirmed,setBeplantingConfirmed]=useState(gardenMap.beplantingConfirmed||false);
  const [pinCategory,setPinCategory]=useState("sier");
  const [postcode,setPostcode]=useState(gardenMap.postcode||"");
  const [postcodeInput,setPostcodeInput]=useState(gardenMap.postcode||"");
  const [bodemInfo,setBodemInfo]=useState(gardenMap.bodemInfo||null);
  const [bodemLoading,setBodemLoading]=useState(false);
  const [bodemError,setBodemError]=useState(""); // sier|boom|bol|vijver|moes
  const svgRef = useRef();   // stap 2 (tekenen)
  const svgRef3 = useRef();  // stap 3 (zones)
  const svgRef4 = useRef();  // stap 4 (pins)

  // ── BLOEI OVERLAY ─────────────────────────────────────────────────
  const [bloeiOverlay, setBloeiOverlay] = useState(false);
  const [bloeiWindow, setBloeiWindow] = useState([60, 151]); // day-of-year range [start, end]
  const [bloeiDragging, setBloeiDragging] = useState(null); // null | "start" | "end" | "window"
  const [bloeiDragAnchor, setBloeiDragAnchor] = useState(null);
  const [pinDetailPopup, setPinDetailPopup] = useState(null); // pin object
  const bloeiBarRef = useRef();
  const BLOEI_DAYS = 365;
  const BLOEI_MONTHS_SHORT = ["Jan","Feb","Mrt","Apr","Mei","Jun","Jul","Aug","Sep","Okt","Nov","Dec"];
  const BLOEI_MONTH_STARTS = [0,31,59,90,120,151,181,212,243,273,304,334];

  function getBloeiMonthIdx(name){
    const n=(name||"").toLowerCase().trim();
    const MAP={januari:0,februari:1,maart:2,april:3,mei:4,juni:5,juli:6,augustus:7,september:8,oktober:9,november:10,december:11};
    return MAP[n]??-1;
  }

  function isPinBloeiend(pin){
    // Find the plant in allPlants to get bloom info
    const plant = allPlants.find(p=>p.id===pin.plantId);
    if(!plant) return false;
    const si = getBloeiMonthIdx(plant.bloeiStart);
    const ei = getBloeiMonthIdx(plant.bloeiEind);
    if(si<0||ei<0) return false;
    const plantStart = BLOEI_MONTH_STARTS[si];
    const plantEnd = ei<12 ? (BLOEI_MONTH_STARTS[ei+1]||365)-1 : 364;
    const [ws,we] = bloeiWindow;
    // overlap between [ws,we] and [plantStart,plantEnd]
    return plantStart <= we && plantEnd >= ws;
  }

  function bloeiBarX(day, barW){ return (day / BLOEI_DAYS) * barW; }
  function bloeiBarDay(px, barW){ return Math.round((px / barW) * BLOEI_DAYS); }

  function handleBloeiBarMouseDown(e){
    e.preventDefault();
    const bar = bloeiBarRef.current; if(!bar) return;
    const rect = bar.getBoundingClientRect();
    const px = e.clientX - rect.left;
    const barW = rect.width;
    const [ws,we] = bloeiWindow;
    const xs = (ws/BLOEI_DAYS)*barW;
    const xe = (we/BLOEI_DAYS)*barW;
    const hitSlop = 10;
    if(Math.abs(px-xs)<hitSlop){ setBloeiDragging("start"); setBloeiDragAnchor({px,ws,we}); }
    else if(Math.abs(px-xe)<hitSlop){ setBloeiDragging("end"); setBloeiDragAnchor({px,ws,we}); }
    else if(px>xs&&px<xe){ setBloeiDragging("window"); setBloeiDragAnchor({px,ws,we}); }
  }

  function handleBloeiBarMouseMove(e){
    if(!bloeiDragging) return;
    const bar = bloeiBarRef.current; if(!bar) return;
    const rect = bar.getBoundingClientRect();
    const barW = rect.width;
    const {px:anchorPx,ws:anchorWs,we:anchorWe} = bloeiDragAnchor;
    const delta = bloeiBarDay(e.clientX - rect.left - anchorPx, barW);
    const span = anchorWe - anchorWs;
    if(bloeiDragging==="start"){
      const ns = Math.max(0, Math.min(anchorWs+delta, bloeiWindow[1]-7));
      setBloeiWindow([ns, bloeiWindow[1]]);
    } else if(bloeiDragging==="end"){
      const ne = Math.max(bloeiWindow[0]+7, Math.min(anchorWe+delta, BLOEI_DAYS));
      setBloeiWindow([bloeiWindow[0], ne]);
    } else {
      const ns = Math.max(0, Math.min(anchorWs+delta, BLOEI_DAYS-span));
      setBloeiWindow([ns, ns+span]);
    }
  }

  function handleBloeiBarMouseUp(){ setBloeiDragging(null); setBloeiDragAnchor(null); }

  const cells = gardenMap.cells || {};
  const pins  = gardenMap.pins  || [];

  // ── helpers ──────────────────────────────────────────────────────
  function ck(r,c){ return `${r}_${c}`; }
  function getZone(r,c){ return cells[ck(r,c)]||null; }
  function getPin(r,c){ return pins.find(p=>p.r===r&&p.c===c)||null; }
  function getPinsAt(r,c){ return pins.filter(p=>p.r===r&&p.c===c); }

  // SVG coords from mouse event
  function svgPos(e){
    const svg=svgRef.current;
    if(!svg) return {x:0,y:0};
    const pt=svg.createSVGPoint();
    pt.x=e.touches?e.touches[0].clientX:e.clientX;
    pt.y=e.touches?e.touches[0].clientY:e.clientY;
    try{
      const svgP=pt.matrixTransform(svg.getScreenCTM().inverse());
      return{x:svgP.x,y:svgP.y};
    }catch(err){
      const rect=svg.getBoundingClientRect();
      const cx=e.touches?e.touches[0].clientX:e.clientX;
      const cy=e.touches?e.touches[0].clientY:e.clientY;
      return{x:((cx-rect.left)/rect.width)*(cols*CELL),y:((cy-rect.top)/rect.height)*(rows*CELL)};
    }
  }

  // Snap raw SVG pos to nearest grid intersection (multiples of CELL)
  function snapToGrid(x,y){
    return{
      x:Math.round(x/CELL)*CELL,
      y:Math.round(y/CELL)*CELL,
    };
  }

  // Is a cell inside the outline polygon?
  function cellInOutline(r,c){
    if(outline.length<3||!outlineClosed) return true; // no outline = allow all
    const cx=c*CELL+CELL/2, cy=r*CELL+CELL/2;
    return pointInPolygon(cx,cy,outline);
  }

  async function lookupBodem(){
    const pc=(postcodeInput||"").replace(/\s/g,"").toUpperCase();
    if(!/^\d{4}[A-Z]{2}$/.test(pc)){setBodemError("Voer een geldige Nederlandse postcode in (bijv. 1234AB)");return;}
    setBodemLoading(true);setBodemError("");setBodemInfo(null);
    try{
      // Stap 1: postcode → coördinaten via PDOK Locatieserver
      const geoRes=await fetch(`https://api.pdok.nl/bzk/locatieserver/search/v3_1/free?q=${pc}&rows=1&fl=centroide_ll`);
      const geoData=await geoRes.json();
      const doc=geoData?.response?.docs?.[0];
      if(!doc?.centroide_ll){setBodemError("Postcode niet gevonden. Probeer een andere.");setBodemLoading(false);return;}
      const match=doc.centroide_ll.match(/POINT\(([^ ]+) ([^ )]+)\)/);
      if(!match){setBodemError("Coördinaten konden niet worden bepaald.");setBodemLoading(false);return;}
      const lon=parseFloat(match[1]),lat=parseFloat(match[2]);

      // Stap 2: Fysisch-Geografische Regio via PDOK FGR WFS
      const fgrBase="https://service.pdok.nl/ez/fysischgeografischeregios/wfs/v1_0";
      let regio="Niet gevonden";
      for(const typeName of ["fysischgeografischeregios:fgr2","fysischgeografischeregios:fgr","fgr2","fgr"]){
        try{
          const fgrUrl=`${fgrBase}?service=WFS&version=2.0.0&request=GetFeature&typeName=${typeName}&outputFormat=application/json&srsName=EPSG:4326&count=1&CQL_FILTER=CONTAINS(geometrie,POINT(${lon}%20${lat}))`;
          const fgrRes=await fetch(fgrUrl);
          if(!fgrRes.ok) continue;
          const fgrData=await fgrRes.json();
          const feat=fgrData?.features?.[0]?.properties;
          if(feat){
            regio=feat.regio||feat.naam||feat.REGIO||feat.omschrijving||feat.fgr||Object.values(feat).find(v=>typeof v==="string"&&v.length>3)||"Zie PDOK";
            break;
          }
        }catch(e){continue;}
      }

      const info={postcode:pc,lat,lon,regio};
      setBodemInfo(info);setPostcode(pc);
      setGardenMap(prev=>({...prev,postcode:pc,bodemInfo:info}));
    }catch(e){setBodemError("Fout bij ophalen: "+e.message);}
    setBodemLoading(false);
  }
  function handleOutlineMouseMove(e){
    const pos=svgPos(e);
    setCursorPos(pos);
    setSnapPt(snapToGrid(pos.x,pos.y));
  }

  function handleOutlineClick(e){
    if(!snapPt) return;
    // Check if clicking near first point to close
    if(outline.length>=3){
      const first=outline[0];
      const dist=Math.hypot(snapPt.x-first.x,snapPt.y-first.y);
      if(dist<=CELL*1.2){
        // Close the outline
        setGardenMap(prev=>({...prev,outlineClosed:true,phase:"edit"}));
        return;
      }
    }
    setGardenMap(prev=>({...prev,outline:[...prev.outline||[],snapPt]}));
  }

  function undoLastPoint(){
    setGardenMap(prev=>({...prev,outline:(prev.outline||[]).slice(0,-1)}));
  }

  function resetOutline(){
    setGardenMap(prev=>({...prev,outline:[],outlineClosed:false,phase:"draw",cells:{},pins:[]}));
  }

  function closeOutline(){
    if((gardenMap.outline||[]).length>=3){
      setGardenMap(prev=>({...prev,outlineClosed:true,phase:"edit"}));
    }
  }

  // ── PHASE 2: zone painting + pins ────────────────────────────────
  function dragRect(a,b){
    if(!a||!b) return a?[a]:[];
    const r0=Math.min(a.r,b.r),r1=Math.max(a.r,b.r);
    const c0=Math.min(a.c,b.c),c1=Math.max(a.c,b.c);
    const out=[];
    for(let r=r0;r<=r1;r++) for(let c=c0;c<=c1;c++) out.push({r,c});
    return out;
  }
  function commitDrag(){
    const cells2=dragRect(dragStart,dragEnd);
    setGardenMap(prev=>{
      const nc={...(prev.cells||{})};
      let np=prev.pins||[];
      cells2.forEach(({r,c})=>{
        if(r<0||r>=rows||c<0||c>=cols||!cellInOutline(r,c)) return;
        if(tool==="eraser"){delete nc[ck(r,c)];np=np.filter(p=>!(p.r===r&&p.c===c));}
        else nc[ck(r,c)]=tool;
      });
      return {...prev,cells:nc,pins:np};
    });
  }
  function getSVGCell(e, ref){
    const svg=(ref||svgRef).current; if(!svg) return null;
    try{
      const pt=svg.createSVGPoint();
      pt.x=e.clientX; pt.y=e.clientY;
      const svgP=pt.matrixTransform(svg.getScreenCTM().inverse());
      return{r:Math.max(0,Math.min(rows-1,Math.floor(svgP.y/CELL))),c:Math.max(0,Math.min(cols-1,Math.floor(svgP.x/CELL)))};
    }catch(err){
      const rect=svg.getBoundingClientRect();
      const vbW=cols*CELL+36,vbH=rows*CELL+14;
      const x=((e.clientX-rect.left)/rect.width)*vbW-16;
      const y=((e.clientY-rect.top)/rect.height)*vbH;
      return{r:Math.max(0,Math.min(rows-1,Math.floor(y/CELL))),c:Math.max(0,Math.min(cols-1,Math.floor(x/CELL)))};
    }
  }
  function paintCell(r,c){
    if(r<0||r>=rows||c<0||c>=cols) return;
    if(!cellInOutline(r,c)) return;   // outside outline = no paint
    setGardenMap(prev=>{
      const nc={...(prev.cells||{})};
      if(tool==="eraser"){ delete nc[ck(r,c)]; }
      else { nc[ck(r,c)]=tool; }
      const np=tool==="eraser"?(prev.pins||[]).filter(p=>!(p.r===r&&p.c===c)):(prev.pins||[]);
      return {...prev,cells:nc,pins:np};
    });
  }

  function clickCell(r,c){
    if(!cellInOutline(r,c)) return;
    if(tool==="muis"){
      setSelectedCell({r,c});
      setShowCellInfo(true);
      return;
    }
    if(tool==="pin"){
      // Multiple pins per cell: always open picker (no auto-remove)
      setPendingCell({r,c});
      setShowPinPicker(true);
      setPinSearch("");
    }
  }

  function placePin(plant){
    if(!pendingCell) return;
    const {r,c}=pendingCell;
    const color=kleurToColor(plant.kleur);
    setGardenMap(prev=>({...prev,
      pins:[...(prev.pins||[]),{id:uid(),plantId:plant.id,naam:plant.naam,kleur:plant.kleur,color,r,c}],
      beplantingConfirmed:false
    }));
    setBeplantingConfirmed(false);
    setShowPinPicker(false);
    setPendingCell(null);
  }

  function resizeGrid(){
    const nc=parseInt(sizeForm.cols)||20;
    const nr=parseInt(sizeForm.rows)||16;
    setGardenMap(prev=>{
      const cleanCells={};
      Object.entries(prev.cells||{}).forEach(([k,v])=>{
        const [r,c]=k.split("_").map(Number);
        if(r<nr&&c<nc) cleanCells[k]=v;
      });
      return{...prev,cols:nc,rows:nr,cells:cleanCells,pins:(prev.pins||[]).filter(p=>p.r<nr&&p.c<nc)};
    });
    setShowSizeModal(false);
  }

  function clearAll(){
    if(!window.confirm("Weet je zeker dat je de hele plattegrond wilt wissen?")) return;
    setGardenMap(prev=>({...prev,outline:[],outlineClosed:false,phase:"draw",cells:{},pins:[],gardenSized:false,gardenBreedte:null,gardenHoogte:null,zonesConfirmed:false,beplantingConfirmed:false}));
    setZonesConfirmed(false);
    setBeplantingConfirmed(false);
    setShowSizeSetup(true);
  }

  // ── derived ──────────────────────────────────────────────────────
  const paintedCount=Object.keys(cells).length;
  const totalM2=(paintedCount*.25).toFixed(2);
  const outlinePts = outline.map(p=>`${p.x},${p.y}`).join(" ");
  const pinnedSpecies=[...new Map(pins.map(p=>[p.plantId,p])).values()];
  const filteredPlants=allPlants.filter(p=>{
    const q=pinSearch.toLowerCase();
    return !q||p.naam?.toLowerCase().includes(q)||p.latijn?.toLowerCase().includes(q);
  });

  // ── Step accordion state ─────────────────────────────────────────
  const [stepOpen, setStepOpen] = useState({1:true,2:true,3:true,4:true,5:false});
  function toggleStep(n){ setStepOpen(p=>({...p,[n]:!p[n]})); }

  // Determine completion status per step
  const step1Done = gardenSized;
  const step2Done = outlineClosed;
  const step3Done = step2Done && Object.keys(cells).length>0;
  const step4Done = step2Done && pins.length>0;

  function StepBlock({n, icon, title, doneColor="#2E5A3D", doneLabel, children, forceBg}){
    const done = n===1?step1Done:n===2?step2Done:n===3?step3Done:n===4?step4Done:false;
    const open = stepOpen[n];
    const accent = n===5?"#c060a0":n===4?K.accent:n===3?"#4a6f56":n===2?"#C4703A":K.accent;
    return(
      <div style={{borderRadius:10,border:`1.5px solid ${done?"#b8dfc4":open?"#d8c8b0":"#e8dcc8"}`,
        marginBottom:8,overflow:"hidden",background:forceBg||"#fff",boxShadow:"0 1px 4px rgba(0,0,0,.04)"}}>
        {/* Header row */}
        <div onClick={()=>toggleStep(n)} style={{display:"flex",alignItems:"center",gap:10,padding:"9px 12px",
          cursor:"pointer",background:done?"#f0faf4":open?"#fffcf8":"#fdfcfa",
          borderBottom:open?`1px solid ${done?"#d0ead8":"#ede8e0"}`:"none",userSelect:"none"}}>
          {/* Step badge */}
          <div style={{width:24,height:24,borderRadius:"50%",flexShrink:0,display:"flex",alignItems:"center",
            justifyContent:"center",fontSize:11,fontWeight:800,
            background:done?"#2E5A3D":open?accent:"#ccc",color:"#fff"}}>
            {done?"✓":n}
          </div>
          <span style={{fontSize:13,fontWeight:700,color:done?"#2E5A3D":open?K.text:"#999",flex:1}}>
            {icon} {title}
          </span>
          {done&&doneLabel&&<span style={{fontSize:10,padding:"2px 8px",borderRadius:10,background:"#d4f0dc",color:"#1a5a2a",fontWeight:700}}>{doneLabel}</span>}
          <span style={{fontSize:14,color:"#aaa",transform:open?"rotate(180deg)":"rotate(0deg)",transition:"transform .2s",lineHeight:1}}>▾</span>
        </div>
        {open&&<div style={{padding:"12px 12px"}}>{children}</div>}
      </div>
    );
  }

  // ── RENDER ───────────────────────────────────────────────────────
  return(<div>

    {/* Header */}
    <div style={{display:"flex",justifyContent:"space-between",alignItems:"flex-start",marginBottom:12}}>
      <div>
        <h2 style={{margin:0,fontSize:22,color:K.text}}>Tuinplattegrond</h2>
        <p style={{margin:"4px 0 0",fontSize:13,color:K.muted}}>
          {cols}×{rows} raster · {paintedCount} vakken · {totalM2} m² · {pins.length} pin{pins.length!==1?"s":""}
        </p>
      </div>
      <div style={{display:"flex",gap:6,flexWrap:"wrap",justifyContent:"flex-end"}}>
        {(outline.length>0||paintedCount>0)&&<Button small variant="danger" onClick={clearAll}>🗑 Wissen</Button>}
      </div>
    </div>

    {/* ── SIZE SETUP MODAL ── */}
    {showSizeSetup&&<div style={{position:"fixed",inset:0,background:"rgba(0,0,0,.5)",zIndex:2000,display:"flex",alignItems:"center",justifyContent:"center",padding:16}}>
      <div style={{background:"#F3EBDD",borderRadius:14,padding:24,maxWidth:420,width:"100%",boxShadow:"0 20px 60px rgba(0,0,0,.25)"}}>
        <div style={{fontSize:28,marginBottom:8}}>📐</div>
        <h3 style={{margin:"0 0 6px",fontSize:18,color:K.text}}>Hoe groot is je tuin?</h3>
        <p style={{fontSize:13,color:K.muted,margin:"0 0 18px",lineHeight:1.6}}>
          Vul de maximale afmetingen in. Je krijgt <strong>2 meter</strong> extra ruimte aan elke kant.
        </p>
        <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:14,marginBottom:14}}>
          <div>
            <label style={{display:"block",fontSize:11,fontWeight:700,color:K.muted,marginBottom:5,textTransform:"uppercase",letterSpacing:.4}}>Breedte (m)</label>
            <input type="number" min="1" max="200" step="0.5" value={sizeSetupForm.breedte}
              onChange={e=>setSizeSetupForm(p=>({...p,breedte:e.target.value}))}
              style={{width:"100%",padding:"10px 12px",border:`2px solid ${K.border}`,borderRadius:8,
                fontSize:18,fontFamily:"inherit",boxSizing:"border-box",outline:"none",textAlign:"center",fontWeight:700}}/>
          </div>
          <div>
            <label style={{display:"block",fontSize:11,fontWeight:700,color:K.muted,marginBottom:5,textTransform:"uppercase",letterSpacing:.4}}>Lengte (m)</label>
            <input type="number" min="1" max="200" step="0.5" value={sizeSetupForm.hoogte}
              onChange={e=>setSizeSetupForm(p=>({...p,hoogte:e.target.value}))}
              style={{width:"100%",padding:"10px 12px",border:`2px solid ${K.border}`,borderRadius:8,
                fontSize:18,fontFamily:"inherit",boxSizing:"border-box",outline:"none",textAlign:"center",fontWeight:700}}/>
          </div>
        </div>
        <div style={{display:"flex",gap:8}}>
          <button onClick={()=>setShowSizeSetup(false)} style={{flex:1,padding:"10px",borderRadius:8,border:`1px solid ${K.border}`,background:"#fff",fontSize:13,cursor:"pointer",fontFamily:"inherit",color:K.muted}}>Overslaan</button>
          <button onClick={applySizeSetup} style={{flex:2,padding:"10px",borderRadius:8,border:"none",background:K.accent,color:"#fff",fontSize:13,fontWeight:700,cursor:"pointer",fontFamily:"inherit"}}>✅ Raster aanmaken</button>
        </div>
      </div>
    </div>}

    {/* ── POSTCODE / BODEM STAP ── */}
    <div style={{borderRadius:10,border:`1.5px solid ${bodemInfo?"#b8dfc4":"#d8c8b0"}`,marginBottom:8,overflow:"hidden",background:"#fff",boxShadow:"0 1px 4px rgba(0,0,0,.04)"}}>
      <div style={{display:"flex",alignItems:"center",gap:10,padding:"9px 12px",background:bodemInfo?"#f0faf4":"#fffcf8",borderBottom:`1px solid ${bodemInfo?"#d0ead8":"#ede8e0"}`}}>
        <div style={{width:24,height:24,borderRadius:"50%",flexShrink:0,display:"flex",alignItems:"center",justifyContent:"center",fontSize:14,background:bodemInfo?"#2E5A3D":"#C4703A",color:"#fff"}}>🌍</div>
        <span style={{fontSize:13,fontWeight:700,color:bodemInfo?"#2E5A3D":K.text,flex:1}}>Grondsoort opzoeken via postcode</span>
        {bodemInfo&&<span style={{fontSize:10,padding:"2px 8px",borderRadius:10,background:"#d4f0dc",color:"#1a5a2a",fontWeight:700}}>{bodemInfo.postcode}</span>}
      </div>
      <div style={{padding:"12px 12px"}}>
        {!bodemInfo&&<p style={{fontSize:12,color:K.muted,margin:"0 0 10px",lineHeight:1.6}}>Vul je postcode in. We zoeken via <strong>PDOK</strong> de fysisch-geografische regio en grondsoort voor jouw locatie op.</p>}
        <div style={{display:"flex",gap:8,alignItems:"center",marginBottom:bodemError?8:0}}>
          <input value={postcodeInput} onChange={e=>setPostcodeInput(e.target.value.toUpperCase())}
            onKeyDown={e=>e.key==="Enter"&&lookupBodem()}
            placeholder="Bijv. 1234AB" maxLength={7}
            style={{padding:"8px 12px",border:`2px solid ${K.border}`,borderRadius:8,fontSize:15,fontFamily:"inherit",width:130,boxSizing:"border-box",outline:"none",letterSpacing:1,textTransform:"uppercase"}}/>
          <button onClick={lookupBodem} disabled={bodemLoading} style={{padding:"8px 16px",borderRadius:8,border:"none",background:K.accent,color:"#fff",fontSize:13,fontWeight:700,cursor:"pointer",fontFamily:"inherit",opacity:bodemLoading?.6:1}}>
            {bodemLoading?"⏳ Zoeken...":"🔍 Zoek op"}
          </button>
          {bodemInfo&&<button onClick={()=>{setBodemInfo(null);setPostcode("");setGardenMap(p=>({...p,postcode:null,bodemInfo:null}));}} style={{padding:"6px 10px",borderRadius:7,border:`1px solid ${K.border}`,background:"#fff",fontSize:11,cursor:"pointer",color:K.muted,fontFamily:"inherit"}}>Wissen</button>}
        </div>
        {bodemError&&<div style={{fontSize:12,color:K.danger,marginTop:4}}>{bodemError}</div>}
        {bodemInfo&&<div style={{marginTop:10,display:"flex",flexDirection:"column",gap:8}}>
          <div style={{padding:"10px 14px",background:K.accentLight,borderRadius:8}}>
            <div style={{fontSize:10,fontWeight:700,color:K.accent,textTransform:"uppercase",letterSpacing:.3,marginBottom:3}}>Fysisch-geografische regio</div>
            <div style={{fontSize:15,fontWeight:700,color:K.text}}>{bodemInfo.regio}</div>
          </div>
          <div style={{padding:"6px 10px",background:"#fff",borderRadius:7,border:`1px solid ${K.border}`,display:"flex",alignItems:"center",gap:8}}>
            <span style={{fontSize:11,color:K.muted}}>Meer detail op de kaart:</span>
            <a href={`https://www.pdokviewer.nl/?x=${bodemInfo.lon}&y=${bodemInfo.lat}&zoom=14`} target="_blank" rel="noopener" style={{fontSize:11,color:K.accent,fontWeight:600,textDecoration:"none"}}>Open PDOK Viewer →</a>
          </div>
        </div>}
      </div>
    </div>

    {/* ══════════════════════════════════════════════════════
        STAP 1 — MAXIMALE AFMETINGEN
    ══════════════════════════════════════════════════════ */}
    <StepBlock n={1} icon="📐" title="Maximale afmetingen instellen" doneLabel={gardenMap.gardenBreedte?`${gardenMap.gardenBreedte}×${gardenMap.gardenHoogte}m`:null}>
      {gardenSized
        ? <div style={{display:"flex",alignItems:"center",gap:12,flexWrap:"wrap"}}>
            <div style={{fontSize:13,color:K.text}}>Tuin: <strong>{gardenMap.gardenBreedte}m breed × {gardenMap.gardenHoogte}m lang</strong> · raster {cols}×{rows} cellen</div>
            <button onClick={()=>setShowSizeSetup(true)} style={{padding:"5px 12px",borderRadius:8,border:`1px solid ${K.border}`,background:"#fff",fontSize:12,cursor:"pointer",fontFamily:"inherit",color:K.muted}}>✏️ Aanpassen</button>
          </div>
        : <div>
            <div style={{fontSize:13,color:K.muted,marginBottom:10}}>Stel de afmeting van je tuin in zodat het raster klopt.</div>
            <button onClick={()=>setShowSizeSetup(true)} style={{padding:"8px 16px",borderRadius:8,border:"none",background:K.accent,color:"#fff",fontSize:13,fontWeight:700,cursor:"pointer",fontFamily:"inherit"}}>📐 Afmetingen invoeren</button>
          </div>
      }
    </StepBlock>

    {/* ══════════════════════════════════════════════════════
        STAP 2 — OMTREK TEKENEN  (incl. SVG altijd zichtbaar)
    ══════════════════════════════════════════════════════ */}
    <StepBlock n={2} icon="✏️" title="Nauwkeurige omtrek tekenen" doneLabel={outlineClosed?`${outline.length} punten`:null}>
      {!outlineClosed&&<>
        <div style={{fontSize:12,color:K.muted,marginBottom:10,lineHeight:1.6}}>
          Klik op rastersnijpunten om de tuinomtrek te tekenen. <strong>Sluit de omtrek</strong> door op het eerste punt (groene cirkel) te klikken.
        </div>
        <div style={{display:"flex",gap:8,marginBottom:12,flexWrap:"wrap"}}>
          {outline.length>=3&&<button onClick={closeOutline} style={{padding:"6px 14px",borderRadius:8,border:"none",background:K.accent,color:"#fff",fontSize:12,fontWeight:700,cursor:"pointer"}}>✅ Omtrek sluiten</button>}
          {outline.length>0&&<button onClick={undoLastPoint} style={{padding:"6px 12px",borderRadius:8,border:`1px solid ${K.border}`,background:"#fff",fontSize:12,cursor:"pointer",color:K.muted}}>↩ Ongedaan</button>}
          {outline.length>0&&<button onClick={resetOutline} style={{padding:"6px 12px",borderRadius:8,border:`1px solid ${K.border}`,background:"#fff",fontSize:12,cursor:"pointer",color:K.danger}}>🗑 Opnieuw</button>}
        </div>
      </>}
      {outlineClosed&&<div style={{display:"flex",alignItems:"center",gap:10,flexWrap:"wrap"}}>
        <div style={{fontSize:13,color:K.text}}>Omtrek gesloten met {outline.length} punten.</div>
        <button onClick={()=>{setGardenMap(prev=>({...prev,outlineClosed:false,phase:"draw",zonesConfirmed:false}));setZonesConfirmed(false);}}
          style={{padding:"5px 12px",borderRadius:8,border:`1px solid ${K.border}`,background:"#fff",fontSize:12,cursor:"pointer",color:K.muted,fontFamily:"inherit"}}>
          ✏️ Omtrek aanpassen
        </button>
      </div>}

      {/* ── SVG STAP 2: Tekencanvas — geen zoom, past in scherm ── */}
      <div style={{marginTop:12}}>
        {!outlineClosed&&(()=>{
          // Focus op tuinafmetingen + 2 cellen padding aan elke kant
          const PAD2 = 2;
          const gardenW = gardenMap.gardenBreedte ? Math.round(gardenMap.gardenBreedte/0.5) : cols;
          const gardenH = gardenMap.gardenHoogte  ? Math.round(gardenMap.gardenHoogte /0.5) : rows;
          const padCells = 4; // applySizeSetup adds 8 cells per axis (4 each side)
          const vxD = Math.max(0,(padCells - PAD2)) * CELL;
          const vyD = Math.max(0,(padCells - PAD2)) * CELL;
          const vwD = (gardenW + PAD2*2) * CELL;
          const vhD = (gardenH + PAD2*2) * CELL + 14;
          const vw=cols*CELL, vh=rows*CELL;
          return(
            <div style={{borderRadius:8,overflow:"hidden",border:`1px solid ${K.border}`}}>
            <svg ref={svgRef}
              viewBox={`${vxD} ${vyD} ${vwD} ${vhD}`}
              style={{display:"block",width:"100%",maxHeight:"60vh",background:"#f5f2ed",cursor:"crosshair"}}
              onMouseMove={handleOutlineMouseMove}
              onMouseLeave={()=>{setCursorPos(null);setSnapPt(null);}}
              onClick={handleOutlineClick}
              onTouchStart={e=>{e.preventDefault();const pos=svgPos(e);setSnapPt(snapToGrid(pos.x,pos.y));}}
              onTouchEnd={e=>{e.preventDefault();if(snapPt)handleOutlineClick({touches:[{clientX:snapPt.x,clientY:snapPt.y}]});}}
            >
              <rect x={vxD} y={vyD} width={vwD} height={vhD} fill="#ede8df"/>
              {/* grid lines — only within visible area */}
              {Array.from({length:gardenH+PAD2*2+1},(_,i)=>{
                const r=Math.floor(vyD/CELL)+i;
                return <line key={`h${r}`} x1={vxD} y1={r*CELL} x2={vxD+vwD} y2={r*CELL} stroke="#d8d2c8" strokeWidth={.5}/>;
              })}
              {Array.from({length:gardenW+PAD2*2+1},(_,i)=>{
                const c=Math.floor(vxD/CELL)+i;
                return <line key={`v${c}`} x1={c*CELL} y1={vyD} x2={c*CELL} y2={vyD+vhD} stroke="#d8d2c8" strokeWidth={.5}/>;
              })}
              {/* intersection dots */}
              {Array.from({length:gardenH+PAD2*2+1},(_,ri)=>Array.from({length:gardenW+PAD2*2+1},(_,ci)=>{
                const r=Math.floor(vyD/CELL)+ri, c=Math.floor(vxD/CELL)+ci;
                return <circle key={`d${r}_${c}`} cx={c*CELL} cy={r*CELL} r={1.5}
                  fill={snapPt&&snapPt.x===c*CELL&&snapPt.y===r*CELL?"#2E5A3D":"#b8b0a0"}/>;
              }))}
              {/* metre labels — show metres relative to garden origin (padCells offset) */}
              {Array.from({length:Math.floor((gardenW+PAD2*2)/2)+1},(_,i)=>{
                const c=Math.floor(vxD/CELL)+i*2;
                const mVal=Math.round((c-padCells)*0.5);
                return <text key={`m${i}`} x={c*CELL} y={vyD+vhD-2} fontSize={8} fill="#aaa" textAnchor="middle">{mVal}m</text>;
              })}
              {Array.from({length:Math.floor((gardenH+PAD2*2)/2)+1},(_,i)=>{
                const r=Math.floor(vyD/CELL)+i*2;
                const mVal=Math.round((r-padCells)*0.5);
                return <text key={`mr${i}`} x={vxD+2} y={r*CELL+3} fontSize={8} fill="#aaa" textAnchor="start">{mVal}m</text>;
              })}
              {gardenMap.gardenBreedte&&gardenMap.gardenHoogte&&outline.length===0&&(()=>{
                const padCells=4;
                const tw=Math.round(gardenMap.gardenBreedte/0.5);
                const th=Math.round(gardenMap.gardenHoogte/0.5);
                const x=padCells*CELL, y=padCells*CELL;
                const w=tw*CELL, h=th*CELL;
                return(<g>
                  <rect x={x} y={y} width={w} height={h} fill="rgba(46,90,61,.06)" stroke="#2E5A3D" strokeWidth={1.5} strokeDasharray="8 4" rx={4}/>
                  <text x={x+w/2} y={y+h/2} textAnchor="middle" fontSize={11} fill="#2E5A3D" fontWeight="700" fontFamily="-apple-system,sans-serif" opacity={.7}>{gardenMap.gardenBreedte}m × {gardenMap.gardenHoogte}m</text>
                </g>);
              })()}
              {outline.length>1&&<polyline points={outlinePts} fill="none" stroke="#2E5A3D" strokeWidth={2} strokeLinejoin="round"/>}
              {outline.length>0&&snapPt&&(()=>{
                const last=outline[outline.length-1];
                const dx=(snapPt.x-last.x)/CELL*0.5, dy=(snapPt.y-last.y)/CELL*0.5;
                const distM=Math.sqrt(dx*dx+dy*dy);
                const mx=(last.x+snapPt.x)/2, my=(last.y+snapPt.y)/2;
                const len=Math.hypot(snapPt.x-last.x,snapPt.y-last.y)||1;
                const nx=-(snapPt.y-last.y)/len*10, ny=(snapPt.x-last.x)/len*10;
                const label=distM<0.05?"":distM.toFixed(1)+"m";
                return(<g>
                  <line x1={last.x} y1={last.y} x2={snapPt.x} y2={snapPt.y} stroke="#2E5A3D" strokeWidth={1.5} strokeDasharray="5 4" opacity={.7}/>
                  {label&&<><rect x={mx+nx-14} y={my+ny-8} width={28} height={14} rx={4} fill="#1F3A2A" opacity={.82}/><text x={mx+nx} y={my+ny+4} textAnchor="middle" fontSize={9} fill="#F3EBDD" fontWeight="700" fontFamily="-apple-system,sans-serif">{label}</text></>}
                </g>);
              })()}
              {outline.map((pt,i)=>{
                const isFirst=i===0;
                const isNear=isFirst&&snapPt&&Math.hypot(snapPt.x-pt.x,snapPt.y-pt.y)<=CELL*1.2;
                return(<g key={i}>
                  <circle cx={pt.x} cy={pt.y} r={isFirst?8:5} fill={isFirst?"#2E5A3D":"#5b7c4f"} stroke="#fff" strokeWidth={1.5}/>
                  {isFirst&&<text x={pt.x} y={pt.y+4} textAnchor="middle" fontSize={9} fill="#fff" fontWeight="bold">1</text>}
                  {isFirst&&isNear&&<circle cx={pt.x} cy={pt.y} r={12} fill="none" stroke="#2E5A3D" strokeWidth={1.5} strokeDasharray="4 3" opacity={.7}/>}
                </g>);
              })}
              {snapPt&&!outline.some(p=>p.x===snapPt.x&&p.y===snapPt.y)&&(
                <circle cx={snapPt.x} cy={snapPt.y} r={5} fill="none" stroke="#2E5A3D" strokeWidth={2}/>
              )}
            </svg>
            </div>
          );
        })()}

        {/* Omtrek-preview: raster exact 1 cel aan elke kant breder dan omtrek, zoom-to-fit */}
        {outlineClosed&&outline.length>=3&&(()=>{
          // PAD=1: exact 1 cel marge aan elke kant (= 2 cellen breder totaal)
          const PAD = 1;
          const xs=outline.map(p=>Math.floor(p.x/CELL)), ys=outline.map(p=>Math.floor(p.y/CELL));
          const c0=Math.max(0,Math.min(...xs)-PAD), c1=Math.min(cols-1,Math.max(...xs)+PAD);
          const r0=Math.max(0,Math.min(...ys)-PAD), r1=Math.min(rows-1,Math.max(...ys)+PAD);
          // +2 voor de meterlabels-rij onderaan, +1 voor rechter rand
          const vxV=c0*CELL, vyV=r0*CELL, vwV=(c1-c0+1)*CELL, vhV=(r1-r0+2)*CELL+12;
          return(
            <svg viewBox={`${vxV} ${vyV} ${vwV} ${vhV}`}
              style={{display:"block",width:"100%",maxHeight:"60vh",background:"#d4cdc4"}}>
              {/* outside tint — covers full viewBox */}
              <rect x={vxV} y={vyV} width={vwV} height={vhV} fill="#d4cdc4"/>
              {/* light grid over entire viewBox area — only the cells in range */}
              {Array.from({length:r1-r0+2},(_,ri)=>Array.from({length:c1-c0+2},(_,ci)=>{
                const r=r0+ri, c=c0+ci;
                return <rect key={`bg_${r}_${c}`} x={c*CELL} y={r*CELL} width={CELL} height={CELL} fill="none" stroke="rgba(160,155,148,.25)" strokeWidth={.3}/>;
              }))}
              {/* outline fill */}
              <polygon points={outlinePts} fill="rgba(240,236,226,.95)" stroke="none"/>
              {/* fine grid inside outline */}
              {Array.from({length:r1-r0+2},(_,ri)=>Array.from({length:c1-c0+2},(_,ci)=>{
                const r=r0+ri, c=c0+ci;
                if(!cellInOutline(r,c)) return null;
                return <rect key={`g_${r}_${c}`} x={c*CELL} y={r*CELL} width={CELL} height={CELL} fill="transparent" stroke="rgba(180,170,155,.4)" strokeWidth={.3}/>;
              }))}
              {/* metre labels every 2 cells (= 1m per 2 cells at 0.5m/cell) */}
              {Array.from({length:Math.floor((c1-c0+1)/2)+1},(_,i)=>{
                const mc=c0+i*2; if(mc>c1+1) return null;
                return <text key={`ml${i}`} x={(mc+.5)*CELL} y={(r1+1)*CELL+10} fontSize={7} fill="#999" textAnchor="middle">{Math.round(mc*0.5)}m</text>;
              })}
              {/* outline border */}
              <polygon points={outlinePts} fill="none" stroke="#2E5A3D" strokeWidth={1.5} strokeLinejoin="round"/>
              {/* corner dots */}
              {outline.map((pt,i)=>(
                <circle key={i} cx={pt.x} cy={pt.y} r={2.5} fill="#2E5A3D" stroke="#fff" strokeWidth={.8}/>
              ))}
            </svg>
          );
        })()}
      </div>
    </StepBlock>

    {/* ══════════════════════════════════════════════════════
        STAP 3 — EIGENSCHAPPEN (zones) — eigen SVG met zoom
    ══════════════════════════════════════════════════════ */}
    <StepBlock n={3} icon="🗺️" title="Eigenschappen toekennen" doneLabel={zonesConfirmed?`${paintedCount} vakken opgeslagen`:paintedCount>0?`${paintedCount} vakken (niet opgeslagen)`:null}>
      {<div style={{position:"relative"}}>
      {!outlineClosed&&<div style={{position:"absolute",inset:0,zIndex:10,background:"rgba(243,235,221,.82)",borderRadius:8,display:"flex",alignItems:"center",justifyContent:"center",backdropFilter:"blur(2px)",pointerEvents:"all"}}>
        <div style={{textAlign:"center",padding:"16px 24px",background:"#fff",borderRadius:10,border:`1px solid ${K.border}`,boxShadow:"0 2px 12px rgba(0,0,0,.08)"}}>
          <div style={{fontSize:20,marginBottom:6}}>✏️</div>
          <div style={{fontSize:13,fontWeight:700,color:K.text,marginBottom:3}}>Teken eerst je omtrek</div>
          <div style={{fontSize:12,color:K.muted}}>Sluit de tuinomtrek in stap 2.</div>
        </div>
      </div>}
      <>
      <div style={{fontSize:12,color:K.muted,marginBottom:10}}>Selecteer een zone en klik-sleep op de kaart om vakken in te kleuren.</div>
      <div style={{display:"flex",gap:5,flexWrap:"wrap",marginBottom:8}}>
        {Object.entries(ZONE_DEF).map(([k,v])=>(
          <button key={k} onClick={()=>setTool(k)} style={{
            padding:"5px 11px",borderRadius:16,fontSize:11,fontWeight:600,cursor:"pointer",
            border:`2px solid ${tool===k?v.stroke:K.border}`,
            background:tool===k?v.stroke:"#fff",color:tool===k?"#fff":K.text,transition:"all .15s"}}>
            {v.label}
          </button>
        ))}
        <button onClick={()=>setTool("eraser")} style={{
          padding:"5px 11px",borderRadius:16,fontSize:11,fontWeight:600,cursor:"pointer",
          border:`2px solid ${tool==="eraser"?K.danger:K.border}`,
          background:tool==="eraser"?K.danger:"#fff",color:tool==="eraser"?"#fff":K.text,transition:"all .15s"}}>
          🧹 Wissen
        </button>
      </div>
      {tool!=="pin"&&tool!=="muis"&&tool!=="eraser"&&<div style={{fontSize:11,color:K.accent,background:K.accentLight,padding:"5px 10px",borderRadius:6,marginBottom:8}}>
        ✏️ Actief: <strong>{ZONE_DEF[tool]?.label||tool}</strong> — klik en sleep op de kaart hieronder
      </div>}
      {/* Zoom bar */}
      <div style={{display:"flex",alignItems:"center",gap:8,marginBottom:6,padding:"4px 8px",background:"#f5f0e8",borderRadius:7,border:`1px solid ${K.border}`}}>
        <span style={{fontSize:10,color:K.muted}}>Zoom</span>
        <button style={{width:22,height:22,border:`1px solid ${K.border}`,borderRadius:4,cursor:"pointer",background:"#fff"}} onClick={()=>setZoom3(z=>Math.max(.4,Math.round((z-.2)*10)/10))}>−</button>
        <span style={{fontSize:11,fontWeight:700,minWidth:32,textAlign:"center"}}>{Math.round(zoom3*100)}%</span>
        <button style={{width:22,height:22,border:`1px solid ${K.border}`,borderRadius:4,cursor:"pointer",background:"#fff"}} onClick={()=>setZoom3(z=>Math.min(4,Math.round((z+.2)*10)/10))}>+</button>
        <input type="range" min="40" max="400" step="10" value={Math.round(zoom3*100)} onChange={e=>setZoom3(parseInt(e.target.value)/100)} style={{flex:1}}/>
        <button style={{fontSize:10,padding:"2px 6px",border:`1px solid ${K.border}`,borderRadius:4,cursor:"pointer",background:"#fff",color:K.muted}} onClick={()=>setZoom3(1)}>Reset</button>
      </div>
      {/* Zone SVG */}
      {(()=>{
        const PAD=2;
        const padC=4;
        const gW=gardenMap.gardenBreedte?Math.round(gardenMap.gardenBreedte/0.5):cols;
        const gH=gardenMap.gardenHoogte?Math.round(gardenMap.gardenHoogte/0.5):rows;
        const xs=outline.length>0?outline.map(p=>Math.floor(p.x/CELL)):[padC,padC+gW];
        const ys=outline.length>0?outline.map(p=>Math.floor(p.y/CELL)):[padC,padC+gH];
        const c0t=Math.max(0,Math.min(...xs)-PAD), c1t=Math.min(cols-1,Math.max(...xs)+PAD);
        const r0t=Math.max(0,Math.min(...ys)-PAD), r1t=Math.min(rows-1,Math.max(...ys)+PAD);
        const vx=c0t*CELL, vy=r0t*CELL, vw=(c1t-c0t+1)*CELL, vh=(r1t-r0t+1)*CELL;
        return(
          <div style={{borderRadius:8,overflow:"hidden",border:`1px solid ${K.border}`}}>
          <div style={{overflow:"auto"}}>
          <div style={{display:"inline-block",userSelect:"none",transformOrigin:"top left",transform:`scale(${zoom3})`,transition:"transform .15s"}}>
          <svg ref={svgRef3}
            viewBox={`${vx} ${vy} ${vw} ${vh}`}
            style={{display:"block",width:`${vw}px`,maxHeight:"65vh",background:"#d4cdc4",cursor:tool==="eraser"||ZONE_DEF[tool]?"crosshair":"default"}}
            onMouseDown={e=>{
              if(tool==="pin"||tool==="muis") return;
              e.preventDefault();
              const cell=getSVGCell(e,svgRef3); if(!cell) return;
              setPainting(true); setDragStart(cell); setDragEnd(cell); setHoveredCell(cell);
            }}
            onMouseMove={e=>{
              const cell=getSVGCell(e,svgRef3); if(!cell) return;
              setHoveredCell(cell);
              if(painting&&tool!=="pin"&&tool!=="muis") setDragEnd(cell);
            }}
            onMouseUp={()=>{if(painting&&dragStart&&dragEnd) commitDrag();setPainting(false);setDragStart(null);setDragEnd(null);}}
            onMouseLeave={()=>{if(painting&&dragStart&&dragEnd) commitDrag();setPainting(false);setDragStart(null);setDragEnd(null);setHoveredCell(null);}}
          >
            <rect x={vx} y={vy} width={vw} height={vh} fill="#d4cdc4"/>
            <polygon points={outlinePts} fill="rgba(240,236,226,.95)" stroke="none"/>
            {Array.from({length:rows},(_,r)=>Array.from({length:cols},(_,c)=>{
              const inOL=cellInOutline(r,c);
              const z=getZone(r,c); const zd=z?ZONE_DEF[z]:null;
              const isHov=hoveredCell?.r===r&&hoveredCell?.c===c;
              if(!inOL) return null;
              return(<g key={`${r}_${c}`} style={{cursor:"crosshair",pointerEvents:"auto"}}>
                <rect x={c*CELL} y={r*CELL} width={CELL} height={CELL}
                  fill={zd?zd.fill:"transparent"} stroke={zd?zd.stroke:"rgba(180,170,155,.35)"} strokeWidth={zd?1.2:0.3}/>
                {isHov&&<rect x={c*CELL+1} y={r*CELL+1} width={CELL-2} height={CELL-2}
                  fill={tool==="eraser"?"rgba(192,58,63,.18)":"rgba(46,90,61,.16)"} rx={2}/>}
              </g>);
            }))}
            {/* Drag preview */}
            {painting&&dragStart&&dragEnd&&(()=>{
              const r0=Math.min(dragStart.r,dragEnd.r),r1=Math.max(dragStart.r,dragEnd.r);
              const c0=Math.min(dragStart.c,dragEnd.c),c1=Math.max(dragStart.c,dragEnd.c);
              const zd=ZONE_DEF[tool];
              return(<g style={{pointerEvents:"none"}}>
                <rect x={c0*CELL} y={r0*CELL} width={(c1-c0+1)*CELL} height={(r1-r0+1)*CELL}
                  fill={zd?"rgba(255,255,255,.3)":"rgba(46,90,61,.25)"}
                  stroke={zd?zd.stroke:K.accent} strokeWidth={2} strokeDasharray="6 3" rx={2}/>
              </g>);
            })()}
            <polygon points={outlinePts} fill="none" stroke="#2E5A3D" strokeWidth={2} strokeLinejoin="round"/>
            {Array.from({length:rows+1},(_,r)=><line key={`h${r}`} x1={vx} y1={r*CELL} x2={vx+vw} y2={r*CELL} stroke="rgba(180,170,155,.3)" strokeWidth={.3}/>)}
            {Array.from({length:cols+1},(_,c)=><line key={`v${c}`} x1={c*CELL} y1={vy} x2={c*CELL} y2={vy+vh} stroke="rgba(180,170,155,.3)" strokeWidth={.3}/>)}
          </svg>
          </div></div></div>
        );
      })()}
      {/* Opslaan knop */}
      {outlineClosed&&<div style={{marginTop:12,display:"flex",alignItems:"center",gap:10,padding:"10px 14px",background:zonesConfirmed?"#f0faf4":"#fffcf4",borderRadius:8,border:`1.5px solid ${zonesConfirmed?"#b8dfc4":"#e8c870"}`}}>
        {zonesConfirmed
          ? <><span style={{fontSize:13,color:"#2E5A3D",fontWeight:600}}>✅ Eigenschappen opgeslagen — ga naar stap 4 om planten te pinnen.</span>
              <button onClick={()=>{setZonesConfirmed(false);setGardenMap(p=>({...p,zonesConfirmed:false}));}} style={{marginLeft:"auto",padding:"5px 12px",borderRadius:7,border:`1px solid ${K.border}`,background:"#fff",fontSize:12,cursor:"pointer",color:K.muted,fontFamily:"inherit"}}>✏️ Aanpassen</button></>
          : <><span style={{fontSize:13,color:"#7a6010",flex:1}}>Ken eigenschappen toe aan je vakken, dan klik je op <strong>Opslaan</strong> om door te gaan naar stap 4.</span>

        <div style={{textAlign:"center",padding:"16px 24px",background:"#fff",borderRadius:10,border:`1px solid ${K.border}`,boxShadow:"0 2px 12px rgba(0,0,0,.08)"}}>

        </div>
      </div>}
      <>
      <div style={{fontSize:12,color:K.muted,marginBottom:8}}>Pin planten, bomen, bollen & knollen. Gebruik de inspecteer-knop om details te bekijken.</div>

        <button onClick={()=>setTool(tool==="pin"?"zon":"pin")} style={{
          padding:"7px 14px",borderRadius:8,fontSize:12,fontWeight:700,cursor:"pointer",
          border:`2px solid ${tool==="pin"?K.accent:K.border}`,
          background:tool==="pin"?K.accent:"#fff",color:tool==="pin"?"#fff":K.text,
          transition:"all .15s",boxShadow:tool==="pin"?"0 2px 8px rgba(46,90,61,.3)":"none"}}>

        </button>
        <button onClick={()=>setTool(tool==="muis"?"zon":"muis")} style={{
          padding:"7px 14px",borderRadius:8,fontSize:12,fontWeight:700,cursor:"pointer",
          border:`2px solid ${tool==="muis"?"#5A3A8A":K.border}`,
          background:tool==="muis"?"#5A3A8A":"#fff",color:tool==="muis"?"#fff":K.text,
          transition:"all .15s",boxShadow:tool==="muis"?"0 2px 8px rgba(90,58,138,.3)":"none"}}>

      </div>
      {pinnedSpecies.length>0&&<div style={{marginBottom:10}}>

            <div key={pin.plantId} style={{display:"flex",alignItems:"center",gap:5,padding:"3px 9px",borderRadius:12,background:"#fff",border:`1.5px solid ${pin.color}`,fontSize:12}}>

        </div>
      </div>}
      {/* Zoom bar */}

        <button style={{width:22,height:22,border:`1px solid ${K.border}`,borderRadius:4,cursor:"pointer",background:"#fff"}} onClick={()=>setZoom4(z=>Math.max(.4,Math.round((z-.2)*10)/10))}>−</button>
        <span style={{fontSize:11,fontWeight:700,minWidth:32,textAlign:"center"}}>{Math.round(zoom4*100)}%</span>
        <button style={{width:22,height:22,border:`1px solid ${K.border}`,borderRadius:4,cursor:"pointer",background:"#fff"}} onClick={()=>setZoom4(z=>Math.min(4,Math.round((z+.2)*10)/10))}>+</button>

        <button style={{fontSize:10,padding:"2px 6px",border:`1px solid ${K.border}`,borderRadius:4,cursor:"pointer",background:"#fff",color:K.muted}} onClick={()=>setZoom4(1)}>Reset</button>
      </div>
      {/* Pin SVG */}
      {(()=>{
        const PAD=2;
        const padC=4;
        const gW=gardenMap.gardenBreedte?Math.round(gardenMap.gardenBreedte/0.5):cols;
        const gH=gardenMap.gardenHoogte?Math.round(gardenMap.gardenHoogte/0.5):rows;
        const xs=outline.length>0?outline.map(p=>Math.floor(p.x/CELL)):[padC,padC+gW];
        const ys=outline.length>0?outline.map(p=>Math.floor(p.y/CELL)):[padC,padC+gH];
        const c0t=Math.max(0,Math.min(...xs)-PAD), c1t=Math.min(cols-1,Math.max(...xs)+PAD);
        const r0t=Math.max(0,Math.min(...ys)-PAD), r1t=Math.min(rows-1,Math.max(...ys)+PAD);
        const vx=c0t*CELL, vy=r0t*CELL, vw=(c1t-c0t+1)*CELL, vh=(r1t-r0t+1)*CELL;
        return(
          <div style={{borderRadius:8,overflow:"hidden",border:`1px solid ${K.border}`}}>

            onClick={e=>{if(tool==="pin"||tool==="muis"){const cell=getSVGCell(e,svgRef4);if(cell)clickCell(cell.r,cell.c);}}}
            onMouseMove={e=>{const cell=getSVGCell(e,svgRef4);if(cell)setHoveredCell(cell);}}
            onMouseLeave={()=>setHoveredCell(null)}

            <rect x={vx} y={vy} width={vw} height={vh} fill="#d4cdc4"/>
            <polygon points={outlinePts} fill="rgba(240,236,226,.95)" stroke="none"/>
            {Array.from({length:rows},(_,r)=>Array.from({length:cols},(_,c)=>{
              const inOL=cellInOutline(r,c);
              if(!inOL) return null;
              const z=getZone(r,c); const zd=z?ZONE_DEF[z]:null;
              const isHov=hoveredCell?.r===r&&hoveredCell?.c===c;
              const cellPins=getPinsAt(r,c);
              return(<g key={`${r}_${c}`} style={{cursor:"cell",pointerEvents:"auto"}}>
                <rect x={c*CELL} y={r*CELL} width={CELL} height={CELL}
                  fill={zd?zd.fill:"transparent"} stroke="rgba(180,170,155,.35)" strokeWidth={.3}/>
                {isHov&&cellPins.length===0&&<rect x={c*CELL+1} y={r*CELL+1} width={CELL-2} height={CELL-2} fill="rgba(46,90,61,.16)" rx={2}/>}
                {cellPins.length===1&&(()=>{
                  const p=cellPins[0];
                  const isHovCell=hoveredCell?.r===r&&hoveredCell?.c===c;
                  return(<g>
                    <ellipse cx={c*CELL+CELL/2} cy={r*CELL+CELL-3} rx={4} ry={2} fill="rgba(0,0,0,.18)"/>
                    <path d={`M${c*CELL+CELL/2} ${r*CELL+CELL-4} C${c*CELL+CELL/2-5} ${r*CELL+CELL-9} ${c*CELL+CELL/2-6} ${r*CELL+4} ${c*CELL+CELL/2} ${r*CELL+3} C${c*CELL+CELL/2+6} ${r*CELL+4} ${c*CELL+CELL/2+5} ${r*CELL+CELL-9} ${c*CELL+CELL/2} ${r*CELL+CELL-4}Z`}
                      fill={p.color} stroke="#fff" strokeWidth={1.5}/>
                    <circle cx={c*CELL+CELL/2} cy={r*CELL+7} r={3} fill="#fff" opacity={.9}/>
                    {isHovCell&&(tool==="pin"||tool==="muis")&&<>
                      <circle cx={c*CELL+CELL-3} cy={r*CELL+3} r={5} fill={tool==="muis"?"#5A3A8A":K.danger} stroke="#fff" strokeWidth={1}/>
                      <text x={c*CELL+CELL-3} y={r*CELL+6.5} textAnchor="middle" fontSize={7} fill="#fff" fontWeight="bold">{tool==="muis"?"i":"✕"}</text>
                    </>}
                  </g>);
                })()}
                {cellPins.length>1&&(()=>{
                  const positions=[[.25,.25],[.75,.25],[.25,.75],[.75,.75]];
                  const isHovCell=hoveredCell?.r===r&&hoveredCell?.c===c;
                  return(<g>
                    {cellPins.slice(0,4).map((p,pi)=>{const [fx,fy]=positions[pi]||[.5,.5];return(<circle key={p.id} cx={c*CELL+fx*CELL} cy={r*CELL+fy*CELL} r={4} fill={p.color} stroke="#fff" strokeWidth={1.2}/>);})}
                    {cellPins.length>4&&<text x={c*CELL+CELL-3} y={r*CELL+CELL-2} fontSize={8} fill={K.muted} textAnchor="end">+{cellPins.length-4}</text>}
                    {isHovCell&&(tool==="pin"||tool==="muis")&&<>
                      <rect x={c*CELL+CELL-13} y={r*CELL} width={13} height={10} rx={3} fill={tool==="muis"?"#5A3A8A":K.danger}/>
                      <text x={c*CELL+CELL-6.5} y={r*CELL+7.5} textAnchor="middle" fontSize={7} fill="#fff" fontWeight="bold">{tool==="muis"?"i":"✕"}</text>
                    </>}
                  </g>);
                })()}
              </g>);
            }))}
            <polygon points={outlinePts} fill="none" stroke="#2E5A3D" strokeWidth={2} strokeLinejoin="round"/>
            {Array.from({length:rows+1},(_,r)=><line key={`h${r}`} x1={vx} y1={r*CELL} x2={vx+vw} y2={r*CELL} stroke="rgba(180,170,155,.3)" strokeWidth={.3}/>)}
            {Array.from({length:cols+1},(_,c)=><line key={`v${c}`} x1={c*CELL} y1={vy} x2={c*CELL} y2={vy+vh} stroke="rgba(180,170,155,.3)" strokeWidth={.3}/>)}
          </svg>
          </div></div></div>
        );
      })()}
      {/* Opslaan knop beplanting */}
      {outlineClosed&&zonesConfirmed&&<div style={{marginTop:12,display:"flex",alignItems:"center",gap:10,padding:"10px 14px",background:beplantingConfirmed?"#f0faf4":"#fffcf4",borderRadius:8,border:`1.5px solid ${beplantingConfirmed?"#b8dfc4":"#e8c870"}`}}>
        {beplantingConfirmed
          ? <><span style={{fontSize:13,color:"#2E5A3D",fontWeight:600}}>✅ Beplanting opgeslagen.</span>
              <button onClick={()=>{setBeplantingConfirmed(false);setGardenMap(p=>({...p,beplantingConfirmed:false}));}} style={{marginLeft:"auto",padding:"5px 12px",borderRadius:7,border:`1px solid ${K.border}`,background:"#fff",fontSize:12,cursor:"pointer",color:K.muted,fontFamily:"inherit"}}>✏️ Aanpassen</button></>
          : <><span style={{fontSize:13,color:"#7a6010",flex:1}}>Pin planten op de kaart, dan klik je op <strong>Opslaan</strong> om te bevestigen.</span>
              <button onClick={()=>{setBeplantingConfirmed(true);setGardenMap(p=>({...p,beplantingConfirmed:true}));}} style={{padding:"7px 18px",borderRadius:8,border:"none",background:K.accent,color:"#fff",fontSize:13,fontWeight:700,cursor:"pointer",fontFamily:"inherit",flexShrink:0}}>💾 Opslaan</button></>
        }
      </div>}
      </>}
      </div>}
    </StepBlock>

    {/* ── FLOATING SCALE BAR ── */}
    <div style={{
      position:"fixed",bottom:16,left:"50%",transform:"translateX(-50%)",zIndex:500,
      background:"rgba(31,58,42,.92)",backdropFilter:"blur(8px)",color:"#F3EBDD",
      borderRadius:24,padding:"7px 18px",display:"flex",alignItems:"center",gap:14,
      boxShadow:"0 4px 20px rgba(0,0,0,.35)",fontSize:12,fontWeight:600,
      pointerEvents:"none",whiteSpace:"nowrap",
    }}>
      <div style={{display:"flex",alignItems:"center",gap:5}}>
        <svg width={CELL*2} height={10} style={{flexShrink:0}}>
          <line x1={0} y1={5} x2={CELL*2} y2={5} stroke="#F3EBDD" strokeWidth={2}/>
          <line x1={0} y1={2} x2={0} y2={8} stroke="#F3EBDD" strokeWidth={1.5}/>
          <line x1={CELL*2} y1={2} x2={CELL*2} y2={8} stroke="#F3EBDD" strokeWidth={1.5}/>

        <span style={{opacity:.85}}>1 m</span>
      </div>

    {/* Cell Info Modal */}
    {showCellInfo&&selectedCell&&<Modal open={showCellInfo} onClose={()=>setShowCellInfo(false)} title={`Cel (${selectedCell.c+1}, ${selectedCell.r+1}) — ${((selectedCell.c)*.5).toFixed(1)}m × ${((selectedCell.r)*.5).toFixed(1)}m`}>
      {(()=>{
        const {r,c}=selectedCell;
        const zone=getZone(r,c);
        const cellPins=getPinsAt(r,c);
        const zoneDef=zone?ZONE_DEF[zone]:null;
        return(<div>
          <div style={{marginBottom:12}}>
            <div style={{fontSize:11,fontWeight:700,color:K.muted,textTransform:"uppercase",letterSpacing:.4,marginBottom:6}}>Zone</div>
            {zoneDef
              ?<div style={{display:"inline-flex",alignItems:"center",gap:8,padding:"6px 14px",borderRadius:10,
                  background:zoneDef.fill,border:`1.5px solid ${zoneDef.stroke}`,fontSize:13,fontWeight:600}}>
                  {zoneDef.label}
                </div>
              :<div style={{fontSize:13,color:K.muted,fontStyle:"italic"}}>Geen zone ingekleurd</div>
            }
          </div>
          <div style={{marginBottom:16}}>
            <div style={{fontSize:11,fontWeight:700,color:K.muted,textTransform:"uppercase",letterSpacing:.4,marginBottom:6}}>Planten in deze cel ({cellPins.length})</div>
            {cellPins.length===0
              ?<div style={{fontSize:13,color:K.muted,fontStyle:"italic"}}>Geen planten gepind</div>
              :<div style={{display:"flex",flexDirection:"column",gap:6}}>
                {cellPins.map(p=>(
                  <div key={p.id} style={{display:"flex",alignItems:"center",gap:10,padding:"8px 10px",
                    borderRadius:8,background:"#fff",border:`1.5px solid ${p.color}`}}>
                    <span style={{width:12,height:12,borderRadius:"50%",background:p.color,flexShrink:0}}/>
                    <span style={{flex:1,fontSize:13,fontWeight:600}}>{p.naam}</span>
                    <button onClick={()=>{setGardenMap(prev=>({...prev,pins:(prev.pins||[]).filter(x=>x.id!==p.id),beplantingConfirmed:false}));setBeplantingConfirmed(false);}}
                      style={{padding:"2px 8px",borderRadius:6,border:"none",background:K.dangerLight,
                        color:K.danger,fontSize:11,cursor:"pointer",fontWeight:600}}>
                      Verwijderen
                    </button>
                  </div>
                ))}
              </div>
            }
          </div>
          <div style={{display:"flex",gap:8,justifyContent:"space-between"}}>
            <Button small onClick={()=>{setShowCellInfo(false);setTool("pin");setPendingCell(selectedCell);setShowPinPicker(true);setPinSearch("");}}>
              📍 Pin toevoegen
            </Button>
            <Button small variant="secondary" onClick={()=>setShowCellInfo(false)}>Sluiten</Button>
          </div>
        </div>);
      })()}
    </Modal>}

    {/* Pin plant picker modal — met categorie-tabs */}
    <Modal open={showPinPicker} onClose={()=>{setShowPinPicker(false);setPendingCell(null);}} title="Plant kiezen voor pin">
      {/* Categorie tabs */}
      {(()=>{
        const cats=[
          {key:"sier",  label:"🌸 Sierplanten", list:plants||[]},
          {key:"boom",  label:"🌳 Bomen/Struiken", list:trees||[]},
          {key:"bol",   label:"🌷 Bollen/Knollen", list:bulbs||[]},
          {key:"vijver",label:"💧 Vijverplanten",  list:pondPlants||[]},
          {key:"moes",  label:"🥕 Moestuin",       list:veggies||[]},
        ].filter(c=>c.list.length>0);
        const activeCat=cats.find(c=>c.key===pinCategory)||cats[0];
        const activeList=(activeCat?.list||[]).filter(p=>{
          const q=pinSearch.toLowerCase();
          return !q||p.naam?.toLowerCase().includes(q)||p.latijn?.toLowerCase().includes(q);
        });
        return(<>
          <div style={{display:"flex",gap:4,flexWrap:"wrap",marginBottom:10}}>
            {cats.map(c=>(
              <button key={c.key} onClick={()=>setPinCategory(c.key)} style={{
                padding:"4px 10px",borderRadius:14,fontSize:11,fontWeight:600,cursor:"pointer",
                border:`2px solid ${pinCategory===c.key?K.accent:K.border}`,
                background:pinCategory===c.key?K.accent:"#fff",
                color:pinCategory===c.key?"#fff":K.text,transition:"all .15s"}}>

              </button>
            ))}
          </div>
          <div style={{marginBottom:10}}>
            <input value={pinSearch} onChange={e=>setPinSearch(e.target.value)} placeholder={`Zoek in ${activeCat?.label||""}...`}
              style={{width:"100%",padding:"8px 12px",border:`2px solid ${K.border}`,borderRadius:8,
                fontSize:13,fontFamily:"inherit",boxSizing:"border-box",outline:"none"}}/>
          </div>
          {(activeCat?.list||[]).length===0&&<div style={{padding:"20px",textAlign:"center",fontSize:13,color:K.muted}}>

                    {p.latijn&&<div style={{fontSize:11,color:K.muted,fontStyle:"italic"}}>{p.latijn}</div>}

                  {cnt>0&&<span style={{fontSize:10,fontWeight:700,padding:"1px 7px",
                    borderRadius:10,background:K.accentLight,color:K.accent}}>{cnt}×</span>}
                </div>
              );

            {activeList.length===0&&(activeCat?.list||[]).length>0&&
              <div style={{padding:16,textAlign:"center",fontSize:13,color:K.muted}}>Geen resultaten</div>}
          </div>

      const ei = plant?getBloeiMonthIdx(plant.bloeiEind):-1;
      const bloeiStr = si>=0&&ei>=0 ? `${BLOEI_MONTHS_SHORT[si]} – ${BLOEI_MONTHS_SHORT[ei]}` : "Onbekend";
      const isBlooming = isPinBloeiend(pinDetailPopup);
      return(
        <div style={{position:"fixed",inset:0,background:"rgba(0,0,0,.45)",zIndex:3000,display:"flex",alignItems:"center",justifyContent:"center",padding:16}}
